---
# k8s-prereq role: Kubernetes 노드 사전 설정

- name: 커널 모듈 로드 설정
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

- name: 커널 모듈 로드
  modprobe:
    name: "{{ item }}"
  loop:
    - overlay
    - br_netfilter

- name: sysctl 네트워크 설정
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    mode: "0644"
  notify: apply sysctl

- name: swap 비활성화
  command: swapoff -a
  changed_when: false

- name: swap fstab에서 제거
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s.*)$'
    replace: '# \1'

- name: 필수 패키지 설치
  apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - nfs-common
      - open-iscsi
      - sshpass
    state: present
    update_cache: true

- name: containerd 설치
  apt:
    name: containerd
    state: present

- name: containerd 설정 디렉토리
  file:
    path: /etc/containerd
    state: directory

- name: containerd 기본 설정 생성
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: containerd SystemdCgroup 활성화
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart containerd

- name: kubelet 컨테이너 로그 제한
  blockinfile:
    path: /var/lib/kubelet/config.yaml
    block: |
      containerLogMaxSize: 100Mi
      containerLogMaxFiles: 3
    marker: "# {mark} ANSIBLE MANAGED - container log limits"
  notify: restart kubelet
  ignore_errors: true
