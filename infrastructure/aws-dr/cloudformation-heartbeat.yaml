# Heartbeat 모니터링 인프라 (Lambda + EventBridge + IAM + S3)
# Active-Passive On-Demand DR: 장애 감지 시 GitHub Actions를 통해 EKS 자동 프로비저닝
#
# 적용: aws cloudformation deploy --template-file infrastructure/aws-dr/cloudformation-heartbeat.yaml \
#         --stack-name k8s-idp-heartbeat --capabilities CAPABILITY_NAMED_IAM \
#         --region us-west-2 \
#         --parameter-overrides DiscordWebhookUrl=<WEBHOOK_URL> GitHubToken=<PAT_TOKEN>
# 삭제: aws cloudformation delete-stack --stack-name k8s-idp-heartbeat --region us-west-2
---
AWSTemplateFormatVersion: "2010-09-09"
Description: "k8s-idp On-Prem Heartbeat Monitor - Active-Passive On-Demand DR"

Parameters:
  DiscordWebhookUrl:
    Type: String
    NoEcho: true
    Description: Discord Webhook URL for alerts
  GitHubToken:
    Type: String
    NoEcho: true
    Description: GitHub PAT with workflow dispatch permission (repo scope)
  GitHubRepo:
    Type: String
    Default: sydk-ktcloud/k8s-idp
    Description: GitHub repository (owner/repo)
  S3Bucket:
    Type: String
    Default: sydk-velero-dr-usw2
    Description: S3 bucket for heartbeat and DR backups
  ThresholdMinutes:
    Type: Number
    Default: 15
    Description: Minutes without heartbeat before alerting
  SummaryIntervalMinutes:
    Type: Number
    Default: 60
    Description: Interval for periodic OK summary to Discord

Resources:
  # --- S3 Buckets ---
  VeleroDRBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: sydk-velero-dr-usw2
      Tags:
        - Key: system
          Value: dr
        - Key: team
          Value: platform

  LonghornDRBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: sydk-longhorn-dr-usw2
      Tags:
        - Key: system
          Value: dr
        - Key: team
          Value: platform

  # --- IAM Role ---
  HeartbeatLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: heartbeat-monitor-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: heartbeat-s3-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:HeadObject
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}/heartbeat/*"

  # --- Lambda Function ---
  HeartbeatMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: heartbeat-monitor
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt HeartbeatLambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          S3_BUCKET: !Ref S3Bucket
          S3_KEY: heartbeat/heartbeat.json
          STATE_KEY: heartbeat/monitor-state.json
          THRESHOLD_MINUTES: !Ref ThresholdMinutes
          SUMMARY_INTERVAL_MINUTES: !Ref SummaryIntervalMinutes
          DISCORD_WEBHOOK_URL: !Ref DiscordWebhookUrl
          GITHUB_TOKEN: !Ref GitHubToken
          GITHUB_REPO: !Ref GitHubRepo
      Code:
        ZipFile: |
          import json
          import os
          import urllib.request
          import boto3
          from datetime import datetime, timezone

          s3 = boto3.client('s3', region_name='us-west-2')

          def lambda_handler(event, context):
              bucket = os.environ.get('S3_BUCKET')
              key = os.environ.get('S3_KEY')
              state_key = os.environ.get('STATE_KEY')
              threshold = int(os.environ.get('THRESHOLD_MINUTES', '15'))
              summary_interval = int(os.environ.get('SUMMARY_INTERVAL_MINUTES', '60'))
              webhook = os.environ.get('DISCORD_WEBHOOK_URL', '')
              github_token = os.environ.get('GITHUB_TOKEN', '')
              github_repo = os.environ.get('GITHUB_REPO', '')
              now = datetime.now(timezone.utc)
              state = load_state(bucket, state_key)

              try:
                  resp = s3.head_object(Bucket=bucket, Key=key)
                  last_mod = resp['LastModified']
                  age = (now - last_mod).total_seconds() / 60

                  was_alert = state.get('status') == 'ALERT'
                  dr_triggered = state.get('dr_triggered', False)
                  last_alert_time = state.get('last_alert', '')
                  last_summary = state.get('last_summary', '')

                  if age > threshold:
                      # ── 장애 감지: ALERT 상태 ──

                      # 첫 번째 장애 감지 → DR 자동 트리거
                      if not was_alert:
                          msg = (
                              ":rotating_light: **온프레미스 클러스터 장애 감지**\n"
                              f"Heartbeat가 **{int(age)}분** 동안 갱신되지 않았습니다.\n"
                              f"마지막 수신: {last_mod.strftime('%Y-%m-%d %H:%M:%S UTC')}\n"
                              f"임계값: {threshold}분\n\n"
                          )

                          # DR 자동 프로비저닝 트리거
                          dr_success = trigger_dr_workflow(github_token, github_repo, int(age))
                          if dr_success:
                              msg += (
                                  ":gear: **DR 자동 활성화 트리거됨**\n"
                                  "GitHub Actions `dr-activate` 워크플로우가 시작되었습니다.\n"
                                  "EKS DR 클러스터가 자동으로 프로비저닝됩니다."
                              )
                          else:
                              msg += (
                                  ":warning: **DR 자동 트리거 실패**\n"
                                  "수동으로 DR을 활성화하세요:\n"
                                  "`./scripts/dr-activate.sh`"
                              )

                          send_discord(webhook, msg)
                          save_state(bucket, state_key, {
                              'last_alert': now.isoformat(),
                              'status': 'ALERT',
                              'dr_triggered': dr_success,
                              'dr_triggered_at': now.isoformat() if dr_success else ''
                          })
                          return {'status': 'ALERT', 'age_minutes': int(age), 'dr_triggered': dr_success}

                      # 반복 알림 (60분 간격)
                      if last_alert_time:
                          try:
                              mins_since_alert = (now - datetime.fromisoformat(last_alert_time)).total_seconds() / 60
                          except: mins_since_alert = float('inf')
                          if mins_since_alert < summary_interval:
                              return {'status': 'ALERT', 'age_minutes': int(age), 'suppressed': True}

                      dr_status = "DR 프로비저닝 진행 중" if dr_triggered else "DR 수동 활성화 필요"
                      msg = (
                          ":rotating_light: **장애 지속 중**\n"
                          f"Heartbeat **{int(age)}분** 미갱신\n"
                          f"DR 상태: {dr_status}\n"
                          f"시각: {now.strftime('%Y-%m-%d %H:%M UTC')}"
                      )
                      send_discord(webhook, msg)
                      save_state(bucket, state_key, {
                          'last_alert': now.isoformat(),
                          'status': 'ALERT',
                          'dr_triggered': dr_triggered,
                          'dr_triggered_at': state.get('dr_triggered_at', '')
                      })
                      return {'status': 'ALERT', 'age_minutes': int(age)}

                  # ── Heartbeat 정상 ──
                  mins_since = float('inf')
                  if last_summary:
                      try:
                          mins_since = (now - datetime.fromisoformat(last_summary)).total_seconds() / 60
                      except: pass

                  if was_alert:
                      # ALERT → OK 전환: 복구 알림
                      dr_note = ""
                      if dr_triggered:
                          dr_note = "\n:warning: DR 클러스터가 활성화되었을 수 있습니다. Failback을 실행하세요:\n`./scripts/dr-failback.sh`"

                      msg = (
                          ":white_check_mark: **온프레미스 클러스터 복구 확인**\n"
                          f"Heartbeat 정상 수신 재개 ({int(age)}분 전 갱신)\n"
                          f"시각: {now.strftime('%Y-%m-%d %H:%M UTC')}"
                          f"{dr_note}"
                      )
                      send_discord(webhook, msg)
                      save_state(bucket, state_key, {
                          'last_summary': now.isoformat(),
                          'status': 'OK',
                          'dr_triggered': False
                      })
                  elif mins_since >= summary_interval:
                      # 정기 OK 요약
                      msg = (
                          ":green_circle: **클러스터 정상 운영 중**\n"
                          f"마지막 Heartbeat: {int(age)}분 전\n"
                          f"시각: {now.strftime('%Y-%m-%d %H:%M UTC')}"
                      )
                      send_discord(webhook, msg)
                      save_state(bucket, state_key, {
                          'last_summary': now.isoformat(),
                          'status': 'OK',
                          'dr_triggered': False
                      })

                  return {'status': 'OK', 'age_minutes': int(age)}

              except s3.exceptions.ClientError as e:
                  if e.response['Error']['Code'] == '404':
                      send_discord(webhook, ":rotating_light: **Heartbeat 파일 없음** - 클러스터 상태 확인 필요")
                      return {'status': 'ALERT', 'reason': 'no_heartbeat_file'}
                  raise
              except Exception as e:
                  return {'status': 'ERROR', 'error': str(e)}

          def trigger_dr_workflow(token, repo, age_minutes):
              """GitHub Actions workflow_dispatch로 DR 활성화 트리거"""
              if not token or not repo:
                  return False
              try:
                  url = f"https://api.github.com/repos/{repo}/actions/workflows/dr-activate.yaml/dispatches"
                  data = json.dumps({
                      'ref': 'main',
                      'inputs': {
                          'trigger_source': 'lambda-auto',
                          'heartbeat_age_minutes': str(age_minutes)
                      }
                  }).encode()
                  req = urllib.request.Request(url, data=data, headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github.v3+json',
                      'Content-Type': 'application/json',
                      'User-Agent': 'k8s-idp-heartbeat/2.0'
                  })
                  urllib.request.urlopen(req)
                  return True
              except Exception as e:
                  print(f"DR workflow trigger failed: {e}")
                  return False

          def load_state(bucket, key):
              try:
                  obj = s3.get_object(Bucket=bucket, Key=key)
                  return json.loads(obj['Body'].read().decode())
              except: return {}

          def save_state(bucket, key, data):
              s3.put_object(Bucket=bucket, Key=key, Body=json.dumps(data).encode(), ContentType='application/json')

          def send_discord(url, message):
              if not url: return
              req = urllib.request.Request(url, data=json.dumps({'content': message}).encode(),
                  headers={'Content-Type': 'application/json', 'User-Agent': 'k8s-idp-heartbeat/2.0'})
              urllib.request.urlopen(req)

      Tags:
        - Key: system
          Value: dr
        - Key: team
          Value: platform

  # --- EventBridge Rule (5분마다 Lambda 트리거) ---
  HeartbeatCheckRule:
    Type: AWS::Events::Rule
    Properties:
      Name: heartbeat-check
      ScheduleExpression: "rate(5 minutes)"
      State: ENABLED
      Targets:
        - Id: heartbeat-monitor
          Arn: !GetAtt HeartbeatMonitorFunction.Arn

  # --- Lambda Permission for EventBridge ---
  HeartbeatLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HeartbeatMonitorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HeartbeatCheckRule.Arn

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt HeartbeatMonitorFunction.Arn
  EventBridgeRuleArn:
    Value: !GetAtt HeartbeatCheckRule.Arn
  VeleroBucket:
    Value: !Ref VeleroDRBucket
  LonghornBucket:
    Value: !Ref LonghornDRBucket
