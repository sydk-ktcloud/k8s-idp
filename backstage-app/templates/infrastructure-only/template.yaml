apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: infrastructure-only-template
  title: 인프라 프로비저닝
  description: GCP 리소스(VM, GCS, GKE, Cloud SQL)를 프로비저닝합니다
  tags:
    - infrastructure
    - gcp
spec:
  owner: user:guest
  type: resource

  parameters:
    - title: 기본 정보
      required:
        - componentName
      properties:
        componentName:
          title: 리소스 이름
          type: string
          description: "리소스를 구분할 영문 이름 (소문자와 하이픈만 사용, 예: my-server-01)"
          ui:field: EntityNamePicker
          ui:autofocus: true

    - title: 리소스 유형 선택
      required:
        - resourceType
      properties:
        resourceType:
          title: 리소스 유형
          type: string
          enum:
            - gcpinstance
            - bucket
            - cluster
            - database
          enumNames:
            - "GCP VM 서버 – 애플리케이션을 실행할 서버"
            - "GCS 버킷 – 파일·이미지·동영상 저장소"
            - "GKE 클러스터 – 컨테이너 실행 환경 (Kubernetes)"
            - "Cloud SQL – 관계형 데이터베이스 (PostgreSQL / MySQL)"
          description: 생성할 GCP 리소스 유형을 선택하세요
          default: gcpinstance

    - title: VM 서버 설정
      required:
        - vmMachineType
        - vmRegion
        - vmDiskSize
      properties:
        vmMachineType:
          title: 서버 크기
          type: string
          default: e2-medium
          enum:
            - e2-small
            - e2-medium
            - e2-standard-4
          enumNames:
            - "소형 (1 vCPU · 2 GB RAM – 개발/테스트용)"
            - "중형 (2 vCPU · 4 GB RAM – 일반 서비스용)  ← 권장"
            - "대형 (4 vCPU · 16 GB RAM – 고성능용)"
          description: 서버 규모를 선택하세요. 잘 모르겠으면 '중형'을 선택하세요.
        vmRegion:
          title: 서버 위치 (리전)
          type: string
          default: us-central1
          enum:
            - us-central1
            - asia-northeast3
            - us-west1
            - europe-west1
          enumNames:
            - "미국 중부 (Iowa)  ← 권장"
            - "한국 (서울)"
            - "미국 서부 (Oregon)"
            - "유럽 서부 (Belgium)"
          description: 서버가 실제로 위치할 데이터센터 지역입니다. 서비스 이용자와 가까운 곳을 선택하세요.
        vmDiskSize:
          title: 저장 공간
          type: number
          default: 50
          enum:
            - 20
            - 50
            - 100
            - 200
          enumNames:
            - "20 GB – 가벼운 앱"
            - "50 GB – 일반 앱  ← 권장"
            - "100 GB – 대용량 앱"
            - "200 GB – 빅데이터/ML용"
          description: 서버 디스크 크기입니다. 운영체제 + 설치 파일 + 데이터를 모두 포함합니다.
      visible: ${{ parameters.resourceType === 'gcpinstance' }}

    - title: 스토리지 버킷 설정
      required:
        - bucketLocation
        - bucketStorageClass
        - bucketVersioning
      properties:
        bucketLocation:
          title: 저장 위치
          type: string
          default: US
          enum:
            - US
            - ASIA
            - EU
          enumNames:
            - "미국 (US)  ← 권장"
            - "아시아 (ASIA)"
            - "유럽 (EU)"
          description: 파일이 저장될 데이터센터 위치입니다.
        bucketStorageClass:
          title: 스토리지 유형
          type: string
          default: STANDARD
          enum:
            - STANDARD
            - NEARLINE
            - COLDLINE
            - ARCHIVE
          enumNames:
            - "일반 (자주 접근하는 파일용)  ← 권장"
            - "저빈도 (월 1회 이하 접근 – 비용 저렴)"
            - "아카이브 (분기 1회 이하 접근 – 더 저렴)"
            - "장기 보관 (연 1회 이하, 백업용 – 가장 저렴)"
          description: 파일에 얼마나 자주 접근하는지에 따라 요금이 달라집니다. 잘 모르면 '일반'을 선택하세요.
        bucketVersioning:
          title: 이전 버전 보관
          type: boolean
          default: false
          description: 켜면 파일을 덮어쓰거나 삭제해도 이전 버전으로 복구할 수 있습니다.
      visible: ${{ parameters.resourceType === 'bucket' }}

    - title: GKE 클러스터 설정
      required:
        - clusterLocation
        - clusterNodeCount
        - clusterMachineType
      properties:
        clusterLocation:
          title: 클러스터 위치 (리전)
          type: string
          default: us-central1
          enum:
            - us-central1
            - asia-northeast3
            - us-west1
            - europe-west1
          enumNames:
            - "미국 중부 (Iowa)  ← 권장"
            - "한국 (서울)"
            - "미국 서부 (Oregon)"
            - "유럽 서부 (Belgium)"
          description: 클러스터가 위치할 지역입니다. 서비스 이용자와 가까운 곳을 선택하세요.
        clusterNodeCount:
          title: 서버 노드 수
          type: number
          default: 3
          enum:
            - 1
            - 3
            - 5
          enumNames:
            - "1개 (테스트/개발용 – 장애 시 중단 가능)"
            - "3개 (기본 운영용)  ← 권장"
            - "5개 (고가용성 – 트래픽이 많을 때)"
          description: 클러스터를 구성하는 서버 대수입니다. 많을수록 안정적이지만 비용이 늘어납니다.
        clusterMachineType:
          title: 노드 서버 크기
          type: string
          default: e2-medium
          enum:
            - e2-small
            - e2-medium
            - e2-standard-4
          enumNames:
            - "소형 (1 vCPU · 2 GB RAM – 가벼운 컨테이너용)"
            - "중형 (2 vCPU · 4 GB RAM – 일반 서비스용)  ← 권장"
            - "대형 (4 vCPU · 16 GB RAM – 리소스 집약적 서비스용)"
          description: 각 노드 서버의 사양입니다.
      visible: ${{ parameters.resourceType === 'cluster' }}

    - title: 데이터베이스 설정
      required:
        - dbDatabaseVersion
        - dbTier
        - dbRegion
        - dbDiskSize
      properties:
        dbDatabaseVersion:
          title: 데이터베이스 종류
          type: string
          default: POSTGRES_15
          enum:
            - POSTGRES_15
            - POSTGRES_14
            - POSTGRES_13
            - MYSQL_8_0
            - MYSQL_5_7
          enumNames:
            - "PostgreSQL 15 (최신)  ← 권장"
            - "PostgreSQL 14"
            - "PostgreSQL 13"
            - "MySQL 8.0"
            - "MySQL 5.7"
          description: 사용할 데이터베이스 엔진입니다. 잘 모르면 'PostgreSQL 15'를 선택하세요.
        dbTier:
          title: DB 서버 크기
          type: string
          default: db-custom-1-3840
          enum:
            - db-custom-1-3840
            - db-custom-2-7680
            - db-custom-4-15360
          enumNames:
            - "소형 (1 vCPU · 3.75 GB – 개발/테스트용)  ← 권장"
            - "중형 (2 vCPU · 7.5 GB – 일반 서비스용)"
            - "대형 (4 vCPU · 15 GB – 고성능 서비스용)"
          description: 데이터베이스 서버의 사양입니다.
        dbRegion:
          title: DB 위치 (리전)
          type: string
          default: us-central1
          enum:
            - us-central1
            - asia-northeast3
            - us-west1
            - europe-west1
          enumNames:
            - "미국 중부 (Iowa)  ← 권장"
            - "한국 (서울)"
            - "미국 서부 (Oregon)"
            - "유럽 서부 (Belgium)"
          description: 데이터베이스 서버가 위치할 지역입니다. 애플리케이션 서버와 같은 지역을 선택하면 빠릅니다.
        dbDiskSize:
          title: DB 저장 공간
          type: number
          default: 20
          enum:
            - 20
            - 50
            - 100
            - 200
          enumNames:
            - "20 GB – 소규모 앱  ← 권장"
            - "50 GB – 중규모 앱"
            - "100 GB – 대규모 앱"
            - "200 GB – 빅데이터용"
          description: 데이터베이스 디스크 크기입니다.
      visible: ${{ parameters.resourceType === 'database' }}

    - title: 수명주기 설정
      description: "이 플랫폼의 모든 클라우드 리소스는 **수명주기 정책**의 적용을 받습니다. 아래 항목을 설정하고 정책에 동의해야 다음 단계로 진행할 수 있습니다."
      required:
        - lifecycleTier
        - costCenter
        - owner
        - acknowledge
      properties:
        lifecycleTier:
          title: 환경 티어
          type: string
          default: dev
          description: "dev: 최대 30일 · staging: 최대 90일 · prod: 무제한 (플랫폼팀 PR 승인 필수) — 제한 초과 시 생성이 거부됩니다"
          enum:
            - dev
            - staging
            - prod
          enumNames:
            - "dev — 기본 7일, 최대 30일"
            - "staging — 기본 30일, 최대 90일"
            - "prod — 무제한 (플랫폼팀 승인 필요)"
        expiresAt:
          title: 만료일
          type: string
          description: "비워두면 티어 기본값이 적용됩니다 (dev: 7일, staging: 30일). 만료된 리소스는 매일 자동 삭제됩니다."
          ui:widget: date
        owner:
          title: 담당자 (GitHub username)
          type: string
        team:
          title: 팀
          type: string
          default: platform
          enum:
            - platform
            - developer
            - sre
            - finops
            - security
          description: 리소스를 소유하는 팀을 선택하세요.
        costCenter:
          title: 비용 센터
          type: string
          enum:
            - platform
            - developer
            - sre
            - finops
            - security
        acknowledge:
          title: 수명주기 정책에 동의합니다
          type: boolean
          enum:
            - true
          ui:widget: checkbox
          description: "만료된 리소스는 자동 삭제됩니다. 삭제 3일 전·당일 Discord #lifecycle-alerts로 알림이 발송됩니다. 연장 필요 시 /extend 커맨드를 사용하세요 (platform/sre 팀 승인 필요)."

    - title: 저장소 설정
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 저장소 위치
          type: string
          description: Pull Request를 생성할 저장소
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: 템플릿 가져오기
      action: fetch:template
      input:
        url: ./content
        values:
          componentName: ${{ parameters.componentName }}
          namespace: ${{ parameters.componentName }}
          resourceType: ${{ parameters.resourceType }}
          vmMachineType: ${{ parameters.vmMachineType }}
          vmRegion: ${{ parameters.vmRegion }}
          vmZone: ${{ parameters.vmRegion }}-a
          vmDiskSize: ${{ parameters.vmDiskSize }}
          bucketLocation: ${{ parameters.bucketLocation }}
          bucketStorageClass: ${{ parameters.bucketStorageClass }}
          bucketVersioning: ${{ parameters.bucketVersioning }}
          clusterLocation: ${{ parameters.clusterLocation }}
          clusterNodeCount: ${{ parameters.clusterNodeCount }}
          clusterMachineType: ${{ parameters.clusterMachineType }}
          dbDatabaseVersion: ${{ parameters.dbDatabaseVersion }}
          dbTier: ${{ parameters.dbTier }}
          dbRegion: ${{ parameters.dbRegion }}
          dbDiskSize: ${{ parameters.dbDiskSize }}
          lifecycleTier: ${{ parameters.lifecycleTier }}
          expiresAt: ${{ parameters.expiresAt }}
          owner: ${{ parameters.owner }}
          team: ${{ parameters.team }}
          costCenter: ${{ parameters.costCenter }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Pull Request 생성
      action: publish:github:pull-request
      input:
        title: "infra: ${{ parameters.componentName }} (${{ parameters.resourceType }})"
        description: "인프라 리소스 프로비저닝: ${{ parameters.componentName }} (${{ parameters.resourceType }})"
        repoUrl: ${{ parameters.repoUrl }}
        branchName: infra/${{ parameters.componentName }}
        targetPath: apps/${{ parameters.componentName }}

  output:
    links:
      - title: Pull Request
        url: ${{ steps['publish'].output.remoteUrl }}
