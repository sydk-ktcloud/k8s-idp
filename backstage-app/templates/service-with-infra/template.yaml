apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-with-infra
  title: 서비스 + 인프라 묶음 생성
  description: 서비스와 필요한 인프라를 한 번에 생성합니다
  tags:
    - service
    - infrastructure
    - recommended
spec:
  owner: user:guest
  type: service

  parameters:
    - title: 서비스 정보
      required:
        - componentName
      properties:
        componentName:
          title: 서비스 이름
          type: string
          description: "서비스의 고유 이름 (소문자와 하이픈만 사용, 예: my-api-server)"
          ui:field: EntityNamePicker
          ui:autofocus: true
        description:
          title: 설명
          type: string
          description: 이 서비스가 무엇을 하는지 간단히 설명하세요
          ui:options:
            rows: 3
        owner:
          title: 소유자
          type: string
          description: 서비스 소유자
          default: user:guest
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - User
              - Group

    - title: 언어 및 프레임워크 선택
      required:
        - language
      properties:
        language:
          title: 프로그래밍 언어
          type: string
          description: 서비스에 사용할 언어를 선택하세요
          default: nodejs
          enum:
            - nodejs
            - python
            - go
          enumNames:
            - Node.js (Express)
            - Python (Flask)
            - Go (net/http)

    - title: 인프라 설정
      required:
        - resourceType
      properties:
        resourceType:
          title: 함께 생성할 인프라
          type: string
          description: 서비스와 함께 생성할 인프라를 선택하세요. 잘 모르면 'Cloud SQL 데이터베이스'를 선택하세요.
          default: database
          enum:
            - database
            - bucket
            - gcpinstance
            - cluster
          enumNames:
            - "Cloud SQL 데이터베이스 – 정형 데이터 저장 (사용자 정보, 주문 등)  ← 권장"
            - "GCS 버킷 – 파일/이미지/동영상 저장"
            - "GCP VM 서버 – 독립 서버가 추가로 필요할 때"
            - "GKE 클러스터 – 컨테이너 오케스트레이션 환경"

    - title: 데이터베이스 설정
      properties:
        databaseVersion:
          title: 데이터베이스 종류
          type: string
          default: POSTGRES_15
          enum:
            - POSTGRES_15
            - POSTGRES_14
            - MYSQL_8_0
          enumNames:
            - "PostgreSQL 15 (최신)  ← 권장"
            - "PostgreSQL 14"
            - "MySQL 8.0"
          description: 잘 모르면 'PostgreSQL 15'를 선택하세요.
        tier:
          title: DB 서버 크기
          type: string
          default: db-custom-1-3840
          enum:
            - db-custom-1-3840
            - db-custom-2-7680
            - db-custom-4-15360
          enumNames:
            - "소형 (1 vCPU · 3.75 GB – 개발/테스트용)  ← 권장"
            - "중형 (2 vCPU · 7.5 GB – 일반 서비스용)"
            - "대형 (4 vCPU · 15 GB – 고성능 서비스용)"
        dbRegion:
          title: DB 위치 (리전)
          type: string
          default: us-central1
          enum:
            - us-central1
            - asia-northeast3
            - us-west1
            - europe-west1
          enumNames:
            - "미국 중부 (Iowa)  ← 권장"
            - "한국 (서울)"
            - "미국 서부 (Oregon)"
            - "유럽 서부 (Belgium)"
          description: 애플리케이션 서버와 같은 지역을 선택하면 빠릅니다.
        dbDiskSize:
          title: DB 저장 공간
          type: integer
          default: 20
          enum:
            - 20
            - 50
            - 100
          enumNames:
            - "20 GB – 소규모 앱  ← 권장"
            - "50 GB – 중규모 앱"
            - "100 GB – 대규모 앱"
      visible: ${{ parameters.resourceType === 'database' }}

    - title: 스토리지 버킷 설정
      properties:
        location:
          title: 저장 위치
          type: string
          default: US
          enum:
            - US
            - ASIA
            - EU
          enumNames:
            - "미국 (US)  ← 권장"
            - "아시아 (ASIA)"
            - "유럽 (EU)"
        storageClass:
          title: 스토리지 유형
          type: string
          default: STANDARD
          enum:
            - STANDARD
            - NEARLINE
            - COLDLINE
          enumNames:
            - "일반 (자주 접근하는 파일용)  ← 권장"
            - "저빈도 (월 1회 이하 접근 – 비용 저렴)"
            - "아카이브 (분기 1회 이하 접근 – 더 저렴)"
          description: 파일에 얼마나 자주 접근하는지에 따라 요금이 달라집니다.
      visible: ${{ parameters.resourceType === 'bucket' }}

    - title: VM 서버 설정
      properties:
        machineType:
          title: 서버 크기
          type: string
          default: e2-medium
          enum:
            - e2-small
            - e2-medium
            - e2-standard-4
          enumNames:
            - "소형 (1 vCPU · 2 GB RAM – 개발/테스트용)"
            - "중형 (2 vCPU · 4 GB RAM – 일반 서비스용)  ← 권장"
            - "대형 (4 vCPU · 16 GB RAM – 고성능용)"
        vmRegion:
          title: 서버 위치 (리전)
          type: string
          default: us-central1
          enum:
            - us-central1
            - asia-northeast3
            - us-west1
            - europe-west1
          enumNames:
            - "미국 중부 (Iowa)  ← 권장"
            - "한국 (서울)"
            - "미국 서부 (Oregon)"
            - "유럽 서부 (Belgium)"
        vmDiskSize:
          title: 저장 공간
          type: integer
          default: 50
          enum:
            - 20
            - 50
            - 100
            - 200
          enumNames:
            - "20 GB – 가벼운 앱"
            - "50 GB – 일반 앱  ← 권장"
            - "100 GB – 대용량 앱"
            - "200 GB – 빅데이터/ML용"
      visible: ${{ parameters.resourceType === 'gcpinstance' }}

    - title: GKE 클러스터 설정
      properties:
        clusterLocation:
          title: 클러스터 위치 (리전)
          type: string
          default: us-central1
          enum:
            - us-central1
            - asia-northeast3
            - us-west1
            - europe-west1
          enumNames:
            - "미국 중부 (Iowa)  ← 권장"
            - "한국 (서울)"
            - "미국 서부 (Oregon)"
            - "유럽 서부 (Belgium)"
        nodeCount:
          title: 서버 노드 수
          type: integer
          default: 3
          enum:
            - 1
            - 3
            - 5
          enumNames:
            - "1개 (테스트/개발용)"
            - "3개 (기본 운영용)  ← 권장"
            - "5개 (고가용성)"
        nodeMachineType:
          title: 노드 서버 크기
          type: string
          default: e2-medium
          enum:
            - e2-small
            - e2-medium
            - e2-standard-4
          enumNames:
            - "소형 (1 vCPU · 2 GB RAM)"
            - "중형 (2 vCPU · 4 GB RAM)  ← 권장"
            - "대형 (4 vCPU · 16 GB RAM)"
      visible: ${{ parameters.resourceType === 'cluster' }}

    - title: 저장소 설정
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 저장소 위치
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: 템플릿 가져오기
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.componentName }}
          description: ${{ parameters.description or parameters.componentName }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          resourceType: ${{ parameters.resourceType }}
          namespace: default
          databaseVersion: ${{ parameters.databaseVersion }}
          tier: ${{ parameters.tier }}
          dbRegion: ${{ parameters.dbRegion }}
          dbDiskSize: ${{ parameters.dbDiskSize }}
          location: ${{ parameters.location }}
          storageClass: ${{ parameters.storageClass }}
          machineType: ${{ parameters.machineType }}
          vmRegion: ${{ parameters.vmRegion }}
          zone: ${{ parameters.vmRegion }}-a
          vmDiskSize: ${{ parameters.vmDiskSize }}
          clusterLocation: ${{ parameters.clusterLocation }}
          nodeCount: ${{ parameters.nodeCount }}
          nodeMachineType: ${{ parameters.nodeMachineType }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: publish
      name: 저장소 생성
      action: publish:github
      input:
        description: ${{ parameters.description or parameters.componentName }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: 'main'
        targetPath: apps/${{ parameters.componentName }}

    - id: register
      name: 카탈로그 등록
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: 저장소
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Pull Request
        url: ${{ steps['publish'].output.remoteUrl }}/pulls
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
