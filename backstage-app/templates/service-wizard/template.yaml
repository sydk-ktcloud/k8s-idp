apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-wizard
  title: "서비스 환경 구성 마법사"
  description: "몇 가지 질문으로 필요한 GCP 인프라를 자동으로 구성합니다"
  tags:
    - wizard
    - recommended
    - beginner
    - gcp
spec:
  owner: user:guest
  type: service

  parameters:
    # ── Step 1: 어떤 서비스인가요? ─────────────────────────────
    - title: "어떤 서비스를 만드시나요?"
      required:
        - serviceType
      properties:
        serviceType:
          title: 서비스 유형
          type: string
          default: web-api
          enum:
            - web-api
            - file-service
            - container-app
            - event-driven
            - data-processing
          enumNames:
            - "🌐 웹 API 서버  –  REST API, GraphQL 백엔드 (VM + DB 자동 생성)"
            - "🗄️ 파일 저장 서비스  –  이미지, 영상, 문서 저장 (GCS 버킷 자동 생성)"
            - "📦 컨테이너 앱  –  Docker 컨테이너 배포 (GKE 클러스터 자동 생성)"
            - "⚡ 이벤트 기반 서비스  –  비동기 메시지 처리 (Pub/Sub 자동 생성)"
            - "📊 데이터 처리  –  배치 작업, ETL, ML (고성능 VM 자동 생성)"

    # ── Step 2: 동시 접속자 수 ──────────────────────────────────
    - title: "평소에 몇 명이 동시에 사용하나요?"
      required:
        - userCount
      properties:
        userCount:
          title: 예상 동시 접속자 수
          type: string
          default: small
          description: >
            서비스가 운영될 때 동시에 접속하는 사람이 몇 명인지 선택해주세요.
            확실하지 않다면 실제보다 한 단계 위를 선택하는 게 안전합니다.
          enum:
            - micro
            - small
            - medium
            - large
          enumNames:
            - "👤 나 혼자 또는 팀 내부 (1~10명)  –  개발·테스트 전용"
            - "👥 소규모 서비스 (10~100명 동시)  –  사내 도구, 초기 런칭  ← 권장"
            - "🏢 일반 서비스 (100~1,000명 동시)  –  운영 중인 서비스"
            - "🏟️ 대규모 서비스 (1,000명 이상)  –  트래픽이 많은 서비스"

    # ── Step 3: 트래픽 패턴 ────────────────────────────────────
    - title: "트래픽이 어떤 패턴으로 발생하나요?"
      required:
        - trafficPattern
      properties:
        trafficPattern:
          title: 트래픽 패턴
          type: string
          default: steady
          description: >
            갑자기 사람이 몰릴 때 서버가 버틸 수 있도록 여유를 잡는 데 사용됩니다.
          enum:
            - batch
            - steady
            - spiky
          enumNames:
            - "🌙 정해진 시간에만 실행 (배치/야간 작업)  –  주기적으로 돌리는 작업"
            - "☀️ 하루 종일 고르게 사용 (상시 운영)  –  업무 시간 내내 쓰는 서비스  ← 권장"
            - "⚡ 특정 시간에 폭발적으로 몰림 (이벤트/프로모션)  –  순간 트래픽이 평소의 10배 이상"

    # ── Step 4: 가용성 요구사항 ────────────────────────────────
    - title: "서비스가 잠깐 멈춰도 괜찮은가요?"
      required:
        - availability
      properties:
        availability:
          title: 서비스 중단 허용 수준
          type: string
          default: standard
          description: >
            서버 점검이나 장애로 서비스가 잠깐 멈출 때 어느 정도까지 괜찮은지 선택해주세요.
            중단이 허용되지 않을수록 이중화 구성이 필요해 비용이 올라갑니다.
          enum:
            - low
            - standard
            - high
          enumNames:
            - "😴 가끔 멈춰도 됨 (개발 중이거나 내부 도구)  –  재시작해도 불편함이 없음"
            - "⚠️ 짧은 중단은 허용 (일반 서비스)  –  5분 이내 복구면 OK  ← 권장"
            - "🚨 절대 멈추면 안 됨 (결제·인증·핵심 API)  –  1분도 허용 안 됨"

    # ── Step 5: 서비스 이름 & 배포 위치 ──────────────────────────
    - title: "서비스 이름을 정해주세요"
      required:
        - componentName
        - region
      properties:
        componentName:
          title: 서비스 이름
          type: string
          description: "영문 소문자와 하이픈만 사용 (예: my-api-server)"
          ui:field: EntityNamePicker
          ui:autofocus: true
        description:
          title: 서비스 설명 (선택)
          type: string
          description: 이 서비스가 무엇을 하는지 간단히 설명하세요
          ui:widget: textarea
          ui:options:
            rows: 2
        region:
          title: 서버 위치 (리전)
          type: string
          default: asia-northeast3
          description: >
            서비스를 운영할 GCP 데이터센터 위치를 선택하세요.
            사용자와 가까운 리전일수록 응답 속도가 빠릅니다.
          enum:
            - asia-northeast3
            - asia-northeast1
            - asia-northeast2
            - asia-southeast1
            - us-central1
            - us-east1
            - europe-west1
            - europe-west4
          enumNames:
            - "🇰🇷 한국 서울 (asia-northeast3)  ← 권장"
            - "🇯🇵 일본 도쿄 (asia-northeast1)"
            - "🇯🇵 일본 오사카 (asia-northeast2)"
            - "🌏 싱가포르 (asia-southeast1)"
            - "🇺🇸 미국 아이오와 (us-central1)"
            - "🇺🇸 미국 버지니아 (us-east1)"
            - "🇪🇺 벨기에 (europe-west1)"
            - "🇪🇺 네덜란드 (europe-west4)"

    # ── Step 6: 수명주기 설정 ─────────────────────────────────
    - title: "수명주기 설정"
      description: "이 플랫폼의 모든 클라우드 리소스는 **수명주기 정책**의 적용을 받습니다. 아래 항목을 설정하고 정책에 동의해야 다음 단계로 진행할 수 있습니다."
      required:
        - lifecycleTier
        - costCenter
        - owner
        - acknowledge
      properties:
        lifecycleTier:
          title: 환경 티어
          type: string
          default: dev
          description: "dev: 최대 30일 · staging: 최대 90일 · prod: 무제한 (플랫폼팀 PR 승인 필수) — 제한 초과 시 생성이 거부됩니다"
          enum:
            - dev
            - staging
            - prod
          enumNames:
            - "dev — 기본 7일, 최대 30일"
            - "staging — 기본 30일, 최대 90일"
            - "prod — 무제한 (플랫폼팀 승인 필요)"
        expiresAt:
          title: 만료일
          type: string
          description: "비워두면 티어 기본값이 적용됩니다 (dev: 7일, staging: 30일). 만료된 리소스는 매일 자동 삭제됩니다."
          ui:widget: date
        owner:
          title: 담당자 (GitHub username)
          type: string
        costCenter:
          title: 비용 센터
          type: string
          enum:
            - platform
            - developer
            - sre
            - finops
            - security
        acknowledge:
          title: 수명주기 정책에 동의합니다
          type: boolean
          enum:
            - true
          ui:widget: checkbox
          description: "만료된 리소스는 자동 삭제됩니다. 삭제 3일 전·당일 Discord #라이프사이클-알림로 알림이 발송됩니다. 연장 필요 시 /extend 커맨드를 사용하세요 (platform/sre 팀 승인 필요)."

    # ── Step 7: 저장소 선택 ────────────────────────────────────
    - title: "저장소를 선택하세요"
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitHub 저장소
          type: string
          description: 인프라 설정 파일을 커밋할 저장소를 선택하세요
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: 인프라 설정 파일 생성
      action: fetch:template
      input:
        url: ./content
        templateFileExtension: '.tmpl'
        values:
          componentName: ${{ parameters.componentName }}
          description: ${{ parameters.description or parameters.componentName }}
          namespace: ${{ parameters.componentName }}
          serviceType: ${{ parameters.serviceType }}
          userCount: ${{ parameters.userCount }}
          trafficPattern: ${{ parameters.trafficPattern }}
          availability: ${{ parameters.availability }}
          region: ${{ parameters.region }}
          lifecycleTier: ${{ parameters.lifecycleTier }}
          expiresAt: ${{ parameters.expiresAt }}
          owner: ${{ parameters.owner }}
          costCenter: ${{ parameters.costCenter }}
          repoOwner: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: apply-namespace
      name: 네임스페이스 즉시 생성
      action: kubernetes:apply
      input:
        manifest: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${{ parameters.componentName }}
            labels:
              owner: ${{ parameters.owner }}
              cost-center: ${{ parameters.costCenter }}
              lifecycle-tier: ${{ parameters.lifecycleTier }}
              expires-at: "${{ parameters.expiresAt }}"
              backstage.io/kubernetes-id: ${{ parameters.componentName }}
              app.kubernetes.io/name: ${{ parameters.componentName }}
        clusterName: onprem

    - id: apply-claim
      name: Crossplane Claim 즉시 적용
      action: kubernetes:apply
      input:
        manifest: ${{ steps['fetch-base'].output.files['claim.yaml'] }}
        clusterName: onprem

    - id: publish
      name: Git 기록용 PR 생성 (자동 머지)
      action: publish:github:pull-request
      input:
        title: "[auto-merge] GCP 인프라: ${{ parameters.componentName }} (${{ parameters.serviceType }})"
        description: |
          > 이 PR은 기록용으로 자동 생성되었습니다. 리소스는 이미 프로비저닝 중입니다.

          - **서비스**: ${{ parameters.componentName }}
          - **유형**: ${{ parameters.serviceType }}
          - **담당자**: ${{ parameters.owner }}
          - **환경**: ${{ parameters.lifecycleTier }}
        repoUrl: ${{ parameters.repoUrl }}
        branchName: provision/${{ parameters.componentName }}
        targetPath: apps/${{ parameters.componentName }}
        labels:
          - auto-merge
          - provisioning

  output:
    text:
      - title: "✅ 프로비저닝이 시작되었습니다!"
        content: |
          서비스 유형 **${{ parameters.serviceType }}** 에 맞는 GCP 인프라가 **즉시 프로비저닝**되고 있습니다.
          PR 머지를 기다릴 필요 없이, Crossplane이 바로 리소스를 생성합니다.

          **프로비저닝 상태 확인 (약 5~15분 소요):**
          ```
          kubectl get ${{ parameters.serviceType == 'web-api' && 'webapp' || parameters.serviceType }} ${{ parameters.componentName }} -n ${{ parameters.componentName }}
          kubectl describe ${{ parameters.serviceType == 'web-api' && 'webapp' || parameters.serviceType }} ${{ parameters.componentName }} -n ${{ parameters.componentName }}
          ```
          Backstage 카탈로그에서도 Kubernetes 플러그인으로 실시간 상태를 확인할 수 있습니다.

          ## 접속 정보 확인
          - **Backstage 카탈로그** > 해당 리소스 > 개요 탭에서 접속 정보를 확인하세요
          - `kubectl get secret -n ${{ parameters.componentName }}`

          ## Git 기록
          아래 PR은 감사 추적용으로 자동 생성되었습니다. 별도 머지 작업은 불필요합니다.

          ## 수명주기 안내
          만료된 리소스는 자동 삭제됩니다. 삭제 3일 전·당일 Discord `#라이프사이클-알림`로 알림이 발송됩니다.
    links:
      - title: PR 확인 (기록용)
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: component:default/${{ parameters.componentName }}
