apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-wizard
  title: "서비스 환경 구성 마법사"
  description: "2가지 질문으로 필요한 인프라를 자동으로 구성합니다"
  tags:
    - wizard
    - recommended
    - beginner
spec:
  owner: user:guest
  type: service

  parameters:
    # ── Step 1: 어떤 서비스인가요? ─────────────────────────────
    - title: "어떤 서비스를 만드시나요?"
      required:
        - serviceType
      properties:
        serviceType:
          title: 서비스 유형
          type: string
          default: web-api
          enum:
            - web-api
            - file-service
            - container-app
            - event-driven
            - data-processing
          enumNames:
            - "🌐 웹 API 서버  –  REST API, GraphQL 백엔드 (VM + DB 자동 생성)"
            - "🗄️ 파일 저장 서비스  –  이미지, 영상, 문서 저장 (GCS 버킷 자동 생성)"
            - "📦 컨테이너 앱  –  Docker 컨테이너 배포 (GKE 클러스터 자동 생성)"
            - "⚡ 이벤트 기반 서비스  –  비동기 메시지 처리 (Pub/Sub 자동 생성)"
            - "📊 데이터 처리  –  배치 작업, ETL, ML (고성능 VM 자동 생성)"

    # ── Step 2: 어떤 규모인가요? ───────────────────────────────
    - title: "어느 정도 규모의 서비스인가요?"
      required:
        - scale
      properties:
        scale:
          title: 서비스 규모
          type: string
          default: standard
          enum:
            - dev
            - standard
            - large
          enumNames:
            - "👤 개발 / 테스트용  –  나 혼자 또는 팀 내부용  (월 ~$20)"
            - "👥 일반 서비스용  –  수십~수백 명 사용  (월 ~$60)  ← 권장"
            - "👥👥 대규모 서비스용  –  수천 명 이상  (월 ~$200)"

    # ── Step 3: 서비스 이름 ────────────────────────────────────
    - title: "서비스 이름을 정해주세요"
      required:
        - componentName
      properties:
        componentName:
          title: 서비스 이름
          type: string
          description: "영문 소문자와 하이픈만 사용 (예: my-api-server)"
          ui:field: EntityNamePicker
          ui:autofocus: true
        description:
          title: 서비스 설명 (선택)
          type: string
          description: 이 서비스가 무엇을 하는지 간단히 설명하세요
          ui:widget: textarea
          ui:options:
            rows: 2

    # ── Step 4: 저장소 선택 ────────────────────────────────────
    - title: "저장소를 선택하세요"
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitHub 저장소
          type: string
          description: 인프라 설정 파일을 커밋할 저장소를 선택하세요
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: 인프라 설정 파일 생성
      action: fetch:template
      input:
        url: ./content
        values:
          componentName: ${{ parameters.componentName }}
          description: ${{ parameters.description or parameters.componentName }}
          namespace: default
          serviceType: ${{ parameters.serviceType }}
          scale: ${{ parameters.scale }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: publish
      name: GitHub에 Pull Request 생성
      action: publish:github
      input:
        description: "[${{ parameters.serviceType }}] ${{ parameters.componentName }} 인프라 구성"
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        targetPath: apps/${{ parameters.componentName }}

    - id: register
      name: 카탈로그 등록
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    text:
      - title: "✅ 인프라 구성이 완료되었습니다!"
        content: |
          서비스 유형 **${{ parameters.serviceType }}** / 규모 **${{ parameters.scale }}** 에 맞는
          인프라가 자동으로 설정되었습니다.

          ArgoCD가 Pull Request를 감지하면 자동으로 배포가 시작됩니다.
    links:
      - title: Pull Request 확인하기
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
