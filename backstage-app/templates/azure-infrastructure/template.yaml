apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-infrastructure-template
  title: Azure 인프라 프로비저닝
  description: Azure 리소스(VM, Blob Storage, AKS, Database)를 프로비저닝합니다
  tags:
    - azure
    - infrastructure
spec:
  owner: user:guest
  type: resource

  parameters:
    - title: 기본 정보
      required:
        - componentName
        - resourceGroupName
      properties:
        componentName:
          title: 리소스 이름
          type: string
          description: "리소스를 구분할 영문 이름 (소문자와 하이픈만 사용, 예: my-server-01)"
          ui:field: EntityNamePicker
          ui:autofocus: true
        resourceGroupName:
          title: Azure Resource Group 이름
          type: string
          description: "리소스를 배치할 사전 생성된 Azure Resource Group 이름"

    - title: 리소스 유형 선택
      required:
        - resourceType
      properties:
        resourceType:
          title: 리소스 유형
          type: string
          enum:
            - azurevm
            - azureblobstorage
            - akscluster
            - azuredatabase
          enumNames:
            - "Azure VM – 애플리케이션을 실행할 가상 머신"
            - "Blob Storage – 파일·이미지·동영상 저장소"
            - "AKS 클러스터 – 컨테이너 실행 환경 (Kubernetes)"
            - "Azure Database – 관계형 데이터베이스 (PostgreSQL / MySQL)"
          description: 생성할 Azure 리소스 유형을 선택하세요
          default: azurevm

    - title: Azure VM 설정
      required:
        - vmSize
        - vmLocation
        - vmDiskSizeGb
      properties:
        vmSize:
          title: 서버 크기
          type: string
          default: Standard_B2ms
          enum:
            - Standard_B2s
            - Standard_B2ms
            - Standard_D4s_v3
          enumNames:
            - "소형 (2 vCPU · 4 GB RAM – 개발/테스트용)"
            - "중형 (2 vCPU · 8 GB RAM – 일반 서비스용)  ← 권장"
            - "대형 (4 vCPU · 16 GB RAM – 고성능용)"
          description: VM 서버 규모를 선택하세요.
        vmLocation:
          title: 서버 위치 (리전)
          type: string
          default: koreacentral
          enum:
            - koreacentral
            - eastus
            - westus2
            - westeurope
          enumNames:
            - "한국 중부 (서울)  ← 권장"
            - "미국 동부 (버지니아)"
            - "미국 서부 (워싱턴)"
            - "유럽 서부 (네덜란드)"
          description: VM이 위치할 Azure 리전입니다.
        vmDiskSizeGb:
          title: 저장 공간
          type: number
          default: 50
          enum:
            - 30
            - 50
            - 100
            - 200
          enumNames:
            - "30 GB – 가벼운 앱"
            - "50 GB – 일반 앱  ← 권장"
            - "100 GB – 대용량 앱"
            - "200 GB – 빅데이터/ML용"
          description: VM OS 디스크 크기입니다.
      visible: ${{ parameters.resourceType === 'azurevm' }}

    - title: Blob Storage 설정
      required:
        - blobLocation
        - blobReplication
      properties:
        blobLocation:
          title: 저장 위치 (리전)
          type: string
          default: koreacentral
          enum:
            - koreacentral
            - eastus
            - westus2
            - westeurope
          enumNames:
            - "한국 중부 (서울)  ← 권장"
            - "미국 동부 (버지니아)"
            - "미국 서부 (워싱턴)"
            - "유럽 서부 (네덜란드)"
          description: 파일이 저장될 Azure 리전입니다.
        blobReplication:
          title: 복제 유형
          type: string
          default: LRS
          enum:
            - LRS
            - GRS
            - ZRS
          enumNames:
            - "LRS – 로컬 중복 (단일 데이터센터)  ← 권장"
            - "GRS – 지역 중복 (다른 리전에도 복제)"
            - "ZRS – 가용성 영역 중복"
          description: 데이터 내구성을 위한 복제 방식입니다.
      visible: ${{ parameters.resourceType === 'azureblobstorage' }}

    - title: AKS 클러스터 설정
      required:
        - aksLocation
        - aksNodeCount
        - aksVmSize
        - aksDnsPrefix
      properties:
        aksLocation:
          title: 클러스터 위치 (리전)
          type: string
          default: koreacentral
          enum:
            - koreacentral
            - eastus
            - westus2
            - westeurope
          enumNames:
            - "한국 중부 (서울)  ← 권장"
            - "미국 동부 (버지니아)"
            - "미국 서부 (워싱턴)"
            - "유럽 서부 (네덜란드)"
          description: 클러스터가 위치할 Azure 리전입니다.
        aksNodeCount:
          title: 서버 노드 수
          type: number
          default: 3
          enum:
            - 1
            - 3
            - 5
          enumNames:
            - "1개 (테스트/개발용)"
            - "3개 (기본 운영용)  ← 권장"
            - "5개 (고가용성)"
          description: 워커 노드 수입니다.
        aksVmSize:
          title: 노드 서버 크기
          type: string
          default: Standard_B2ms
          enum:
            - Standard_B2s
            - Standard_B2ms
            - Standard_D4s_v3
          enumNames:
            - "소형 (Standard_B2s)"
            - "중형 (Standard_B2ms)  ← 권장"
            - "대형 (Standard_D4s_v3)"
          description: 각 워커 노드의 VM 크기입니다.
        aksDnsPrefix:
          title: DNS 프리픽스
          type: string
          description: "AKS 클러스터 DNS 프리픽스 (영문 소문자와 하이픈만, 예: my-cluster)"
      visible: ${{ parameters.resourceType === 'akscluster' }}

    - title: Azure Database 설정
      required:
        - dbEngine
        - dbSkuName
        - dbLocation
        - dbStorageMb
      properties:
        dbEngine:
          title: 데이터베이스 종류
          type: string
          default: postgres
          enum:
            - postgres
            - mysql
          enumNames:
            - "PostgreSQL 15  ← 권장"
            - "MySQL 8.0"
          description: 사용할 데이터베이스 엔진입니다.
        dbSkuName:
          title: DB 서버 크기
          type: string
          default: B_Standard_B1ms
          enum:
            - B_Standard_B1ms
            - B_Standard_B2ms
            - GP_Standard_D4ds_v4
          enumNames:
            - "소형 (B1ms – 1 vCPU · 2 GB – 개발/테스트용)  ← 권장"
            - "중형 (B2ms – 2 vCPU · 8 GB – 일반 서비스용)"
            - "대형 (D4ds – 4 vCPU · 16 GB – 고성능 서비스용)"
          description: 데이터베이스 서버의 SKU입니다.
        dbLocation:
          title: DB 위치 (리전)
          type: string
          default: koreacentral
          enum:
            - koreacentral
            - eastus
            - westus2
            - westeurope
          enumNames:
            - "한국 중부 (서울)  ← 권장"
            - "미국 동부 (버지니아)"
            - "미국 서부 (워싱턴)"
            - "유럽 서부 (네덜란드)"
          description: 데이터베이스 서버가 위치할 리전입니다.
        dbStorageMb:
          title: DB 저장 공간
          type: number
          default: 32768
          enum:
            - 32768
            - 65536
            - 131072
            - 262144
          enumNames:
            - "32 GB – 소규모 앱  ← 권장"
            - "64 GB – 중규모 앱"
            - "128 GB – 대규모 앱"
            - "256 GB – 빅데이터용"
          description: 데이터베이스 스토리지 크기입니다.
      visible: ${{ parameters.resourceType === 'azuredatabase' }}

    - title: 수명주기 설정
      description: "이 플랫폼의 모든 클라우드 리소스는 **수명주기 정책**의 적용을 받습니다. 아래 항목을 설정하고 정책에 동의해야 다음 단계로 진행할 수 있습니다."
      required:
        - lifecycleTier
        - costCenter
        - owner
        - acknowledge
      properties:
        lifecycleTier:
          title: 환경 티어
          type: string
          default: dev
          description: "dev: 최대 30일 · staging: 최대 90일 · prod: 무제한 (플랫폼팀 PR 승인 필수) — 제한 초과 시 생성이 거부됩니다"
          enum:
            - dev
            - staging
            - prod
          enumNames:
            - "dev — 기본 7일, 최대 30일"
            - "staging — 기본 30일, 최대 90일"
            - "prod — 무제한 (플랫폼팀 승인 필요)"
        expiresAt:
          title: 만료일
          type: string
          description: "비워두면 티어 기본값이 적용됩니다 (dev: 7일, staging: 30일). 만료된 리소스는 매일 자동 삭제됩니다."
          ui:widget: date
        owner:
          title: 담당자 (GitHub username)
          type: string
        team:
          title: 팀
          type: string
          default: platform
          enum:
            - platform
            - developer
            - sre
            - finops
            - security
          description: 리소스를 소유하는 팀을 선택하세요.
        costCenter:
          title: 비용 센터
          type: string
          enum:
            - platform
            - developer
            - sre
            - finops
            - security
        acknowledge:
          title: 수명주기 정책에 동의합니다
          type: boolean
          enum:
            - true
          ui:widget: checkbox
          description: "만료된 리소스는 자동 삭제됩니다. 삭제 3일 전·당일 Discord #lifecycle-alerts로 알림이 발송됩니다. 연장 필요 시 /extend 커맨드를 사용하세요 (platform/sre 팀 승인 필요)."

    - title: 저장소 설정
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 저장소 위치
          type: string
          description: Pull Request를 생성할 저장소
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: 템플릿 가져오기
      action: fetch:template
      input:
        url: ./content
        values:
          componentName: ${{ parameters.componentName }}
          namespace: ${{ parameters.componentName }}
          resourceGroupName: ${{ parameters.resourceGroupName }}
          resourceType: ${{ parameters.resourceType }}
          vmSize: ${{ parameters.vmSize }}
          vmLocation: ${{ parameters.vmLocation }}
          vmDiskSizeGb: ${{ parameters.vmDiskSizeGb }}
          blobLocation: ${{ parameters.blobLocation }}
          blobReplication: ${{ parameters.blobReplication }}
          aksLocation: ${{ parameters.aksLocation }}
          aksNodeCount: ${{ parameters.aksNodeCount }}
          aksVmSize: ${{ parameters.aksVmSize }}
          aksDnsPrefix: ${{ parameters.aksDnsPrefix }}
          dbEngine: ${{ parameters.dbEngine }}
          dbSkuName: ${{ parameters.dbSkuName }}
          dbLocation: ${{ parameters.dbLocation }}
          dbStorageMb: ${{ parameters.dbStorageMb }}
          lifecycleTier: ${{ parameters.lifecycleTier }}
          expiresAt: ${{ parameters.expiresAt }}
          owner: ${{ parameters.owner }}
          team: ${{ parameters.team }}
          costCenter: ${{ parameters.costCenter }}
          repoOwner: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Pull Request 생성
      action: publish:github:pull-request
      input:
        title: "infra: ${{ parameters.componentName }} (${{ parameters.resourceType }})"
        description: "Azure 인프라 리소스 프로비저닝: ${{ parameters.componentName }} (${{ parameters.resourceType }})"
        repoUrl: ${{ parameters.repoUrl }}
        branchName: infra/${{ parameters.componentName }}
        targetPath: apps/${{ parameters.componentName }}

    - id: register
      name: 카탈로그 등록
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Pull Request
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      
