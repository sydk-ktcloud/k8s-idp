apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-template
  title: 서비스 생성
  description: 새로운 서비스를 생성합니다 (Node.js, Python, Go 지원)
  tags:
    - service
    - recommended
spec:
  owner: user:guest
  type: service

  parameters:
    - title: 서비스 정보
      required:
        - componentName
      properties:
        componentName:
          title: 서비스 이름
          type: string
          description: 서비스의 고유 이름 (소문자, 하이픈 사용)
          ui:field: EntityNamePicker
          ui:autofocus: true
        description:
          title: 설명
          type: string
          description: 이 서비스가 무엇을 하는지 설명하세요
          ui:options:
            rows: 3
        owner:
          title: 소유자
          type: string
          description: 서비스 소유자
          default: user:guest
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - User
              - Group

    - title: 언어 및 프레임워크 선택
      required:
        - language
      properties:
        language:
          title: 프로그래밍 언어
          type: string
          description: 서비스에 사용할 언어를 선택하세요
          default: nodejs
          enum:
            - nodejs
            - python
            - go
          enumNames:
            - Node.js (Express)
            - Python (Flask)
            - Go (net/http)

    - title: 수명주기 설정
      description: "이 플랫폼의 모든 클라우드 리소스는 **수명주기 정책**의 적용을 받습니다. 아래 항목을 설정하고 정책에 동의해야 다음 단계로 진행할 수 있습니다."
      required:
        - lifecycleTier
        - costCenter
        - acknowledge
      properties:
        lifecycleTier:
          title: 환경 티어
          type: string
          default: dev
          description: "dev: 최대 30일 · staging: 최대 90일 · prod: 무제한 (플랫폼팀 PR 승인 필수) — 제한 초과 시 생성이 거부됩니다"
          enum:
            - dev
            - staging
            - prod
          enumNames:
            - "dev — 기본 7일, 최대 30일"
            - "staging — 기본 30일, 최대 90일"
            - "prod — 무제한 (플랫폼팀 승인 필요)"
        expiresAt:
          title: 만료일
          type: string
          description: "비워두면 티어 기본값이 적용됩니다 (dev: 7일, staging: 30일). 만료된 리소스는 매일 자동 삭제됩니다."
          ui:widget: date
        costCenter:
          title: 비용 센터
          type: string
          enum:
            - platform
            - developer
            - sre
            - finops
            - security
        acknowledge:
          title: 수명주기 정책에 동의합니다
          type: boolean
          enum:
            - true
          ui:widget: checkbox
          description: "만료된 리소스는 자동 삭제됩니다. 삭제 3일 전·당일 Discord #lifecycle-alerts로 알림이 발송됩니다. 연장 필요 시 /extend 커맨드를 사용하세요 (platform/sre 팀 승인 필요)."

    - title: 저장소 설정
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 저장소 위치
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        isPrivate:
          title: 비공개 저장소
          type: boolean
          default: false
          description: 비공개 저장소로 생성할지 여부

  steps:
    - id: fetch-base
      name: 템플릿 가져오기
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.componentName }}
          description: ${{ parameters.description or parameters.componentName }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}
          lifecycleTier: ${{ parameters.lifecycleTier }}
          expiresAt: ${{ parameters.expiresAt }}
          costCenter: ${{ parameters.costCenter }}

    - id: publish
      name: 저장소 생성
      action: publish:github
      input:
        description: ${{ parameters.description or parameters.componentName }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: 'main'
        private: ${{ parameters.isPrivate }}
        repoVisibility: ${{ parameters.isPrivate == true && 'private' || 'public' }}

    - id: register
      name: 카탈로그 등록
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: 저장소
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
