apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: service-template
  title: 서비스 생성
  description: 새로운 서비스를 생성합니다 (Node.js, Python, Go 지원)
  tags:
    - service
    - recommended
spec:
  owner: user:guest
  type: service

  parameters:
    - title: 서비스 정보
      required:
        - componentName
      properties:
        componentName:
          title: 서비스 이름
          type: string
          description: 서비스의 고유 이름 (소문자, 하이픈 사용)
          ui:field: EntityNamePicker
          ui:autofocus: true
        description:
          title: 설명
          type: string
          description: 이 서비스가 무엇을 하는지 설명하세요
          ui:options:
            rows: 3
        owner:
          title: 소유자
          type: string
          description: 서비스 소유자
          default: user:guest
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - User
              - Group

    - title: 언어 및 프레임워크 선택
      required:
        - language
      properties:
        language:
          title: 프로그래밍 언어
          type: string
          description: 서비스에 사용할 언어를 선택하세요
          default: nodejs
          enum:
            - nodejs
            - python
            - go
          enumNames:
            - Node.js (Express)
            - Python (Flask)
            - Go (net/http)

    - title: 저장소 설정
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 저장소 위치
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
        isPrivate:
          title: 비공개 저장소
          type: boolean
          default: false
          description: 비공개 저장소로 생성할지 여부

  steps:
    - id: fetch-base
      name: 템플릿 가져오기
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.componentName }}
          description: ${{ parameters.description or parameters.componentName }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: publish
      name: 저장소 생성
      action: publish:github
      input:
        description: ${{ parameters.description or parameters.componentName }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: 'main'
        private: ${{ parameters.isPrivate }}
        repoVisibility: ${{ parameters.isPrivate == true && 'private' || 'public' }}

    - id: register
      name: 카탈로그 등록
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: 저장소
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
