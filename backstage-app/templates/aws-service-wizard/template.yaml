apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aws-service-wizard
  title: "AWS 서비스 환경 구성 마법사"
  description: "몇 가지 질문으로 AWS 인프라를 자동으로 구성합니다"
  tags:
    - wizard
    - recommended
    - aws
    - beginner
spec:
  owner: user:guest
  type: service

  parameters:
    # ── Step 1: 어떤 서비스인가요? ─────────────────────────────
    - title: "어떤 서비스를 만드시나요?"
      required:
        - serviceType
      properties:
        serviceType:
          title: 서비스 유형
          type: string
          default: web-api
          enum:
            - web-api
            - file-service
            - container-app
            - data-processing
          enumNames:
            - "🌐 웹 API 서버  –  REST API, GraphQL 백엔드 (EC2 + RDS 자동 생성)"
            - "🗄️ 파일 저장 서비스  –  이미지, 영상, 문서 저장 (S3 버킷 자동 생성)"
            - "📦 컨테이너 앱  –  Kubernetes 기반 배포 (EKS 클러스터 자동 생성)"
            - "📊 데이터 처리  –  배치 작업, ETL, ML (고성능 EC2 자동 생성)"

    # ── Step 2: 동시 접속자 수 ──────────────────────────────────
    - title: "평소에 몇 명이 동시에 사용하나요?"
      required:
        - userCount
      properties:
        userCount:
          title: 예상 동시 접속자 수
          type: string
          default: small
          description: >
            서비스가 운영될 때 동시에 접속하는 사람이 몇 명인지 선택해주세요.
            확실하지 않다면 실제보다 한 단계 위를 선택하는 게 안전합니다.
          enum:
            - micro
            - small
            - medium
            - large
          enumNames:
            - "👤 나 혼자 또는 팀 내부 (1~10명)  –  개발·테스트 전용"
            - "👥 소규모 서비스 (10~100명 동시)  –  사내 도구, 초기 런칭  ← 권장"
            - "🏢 일반 서비스 (100~1,000명 동시)  –  운영 중인 서비스"
            - "🏟️ 대규모 서비스 (1,000명 이상)  –  트래픽이 많은 서비스"

    # ── Step 3: 트래픽 패턴 ────────────────────────────────────
    - title: "트래픽이 어떤 패턴으로 발생하나요?"
      required:
        - trafficPattern
      properties:
        trafficPattern:
          title: 트래픽 패턴
          type: string
          default: steady
          description: >
            갑자기 사람이 몰릴 때 서버가 버틸 수 있도록 여유를 잡는 데 사용됩니다.
          enum:
            - batch
            - steady
            - spiky
          enumNames:
            - "🌙 정해진 시간에만 실행 (배치/야간 작업)  –  주기적으로 돌리는 작업"
            - "☀️ 하루 종일 고르게 사용 (상시 운영)  –  업무 시간 내내 쓰는 서비스  ← 권장"
            - "⚡ 특정 시간에 폭발적으로 몰림 (이벤트/프로모션)  –  순간 트래픽이 평소의 10배 이상"

    # ── Step 4: 가용성 요구사항 ────────────────────────────────
    - title: "서비스가 잠깐 멈춰도 괜찮은가요?"
      required:
        - availability
      properties:
        availability:
          title: 서비스 중단 허용 수준
          type: string
          default: standard
          description: >
            서버 점검이나 장애로 서비스가 잠깐 멈출 때 어느 정도까지 괜찮은지 선택해주세요.
            중단이 허용되지 않을수록 이중화 구성이 필요해 비용이 올라갑니다.
          enum:
            - low
            - standard
            - high
          enumNames:
            - "😴 가끔 멈춰도 됨 (개발 중이거나 내부 도구)  –  재시작해도 불편함이 없음"
            - "⚠️ 짧은 중단은 허용 (일반 서비스)  –  5분 이내 복구면 OK  ← 권장"
            - "🚨 절대 멈추면 안 됨 (결제·인증·핵심 API)  –  1분도 허용 안 됨"

    # ── Step 5: 서비스 이름 & 배포 위치 ──────────────────────────
    - title: "서비스 이름을 정해주세요"
      required:
        - componentName
        - region
      properties:
        componentName:
          title: 서비스 이름
          type: string
          description: "영문 소문자와 하이픈만 사용 (예: my-api-server)"
          ui:field: EntityNamePicker
          ui:autofocus: true
        description:
          title: 서비스 설명
          type: string
          description: "이 서비스가 무엇을 하는지 간단히 설명해주세요"
          default: "AWS에서 운영되는 서비스"
        region:
          title: 서버 위치 (리전)
          type: string
          default: ap-northeast-2
          description: >
            서비스를 운영할 AWS 데이터센터 위치를 선택하세요.
            사용자와 가까운 리전일수록 응답 속도가 빠릅니다.
          enum:
            - ap-northeast-2
            - ap-northeast-1
            - ap-southeast-1
            - ap-southeast-2
            - us-east-1
            - us-west-2
            - eu-west-1
            - eu-central-1
          enumNames:
            - "🇰🇷 한국 서울 (ap-northeast-2)  ← 권장"
            - "🇯🇵 일본 도쿄 (ap-northeast-1)"
            - "🌏 싱가포르 (ap-southeast-1)"
            - "🇦🇺 호주 시드니 (ap-southeast-2)"
            - "🇺🇸 미국 버지니아 (us-east-1)"
            - "🇺🇸 미국 오리건 (us-west-2)"
            - "🇮🇪 아일랜드 (eu-west-1)"
            - "🇩🇪 독일 프랑크푸르트 (eu-central-1)"

    # ── Step 6: 저장소 설정 ────────────────────────────────────
    - title: "저장소를 선택해주세요"
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 저장소 위치
          type: string
          description: Pull Request를 생성할 저장소
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: 인프라 구성 생성
      action: fetch:template
      input:
        url: ./content
        values:
          componentName: ${{ parameters.componentName }}
          description: ${{ parameters.description }}
          namespace: default
          serviceType: ${{ parameters.serviceType }}
          userCount: ${{ parameters.userCount }}
          trafficPattern: ${{ parameters.trafficPattern }}
          availability: ${{ parameters.availability }}
          region: ${{ parameters.region }}
          destination:
            owner: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
            repo: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: publish
      name: Pull Request 생성
      action: publish:github
      input:
        description: "AWS 인프라: ${{ parameters.componentName }} (${{ parameters.serviceType }})"
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: 'main'
        targetPath: apps/${{ parameters.componentName }}

    - id: register
      name: 카탈로그 등록
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    text:
      - title: "✅ 인프라 구성이 완료되었습니다!"
        content: |
          서비스 유형 **${{ parameters.serviceType }}** 에 맞는 AWS 인프라가 자동으로 설정되었습니다.

          **다음 단계:**
          1. 아래 Pull Request 링크에서 변경 내용을 확인하고 머지하세요
          2. ArgoCD가 자동으로 Crossplane claim을 배포합니다 (약 1~2분)
          3. AWS가 실제 리소스를 프로비저닝합니다 (약 5~15분)

          **프로비저닝 상태 확인 방법:**
          ```
          # web-api
          kubectl get ec2instance ${{ parameters.componentName }}-vm -n default
          kubectl get rdsdatabase ${{ parameters.componentName }}-db -n default

          # container-app (EKS)
          kubectl get ekscluster ${{ parameters.componentName }}-eks -n default
          kubectl describe ekscluster ${{ parameters.componentName }}-eks -n default

          # EKS kubeconfig (프로비저닝 완료 후)
          kubectl get secret -n crossplane-system | grep ${{ parameters.componentName }}
          ```
          리전: **${{ parameters.region }}** | Backstage 카탈로그에서 Kubernetes 플러그인으로 실시간 상태 확인 가능
    links:
      - title: Pull Request
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
