apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: simple-server-template
  title: 서버 빠른 시작
  description: 3가지 선택만으로 서버를 즉시 생성합니다 (GCP / AWS / Azure 지원, 초보자 추천)
  tags:
    - beginner
    - quick-start
    - server
    - gcp
    - aws
    - azure
spec:
  owner: user:guest
  type: resource

  parameters:
    - title: 서버 기본 정보
      required:
        - componentName
        - cloudProvider
      properties:
        componentName:
          title: 서버 이름
          type: string
          description: "서버를 구분할 영문 이름 (소문자와 하이픈만 사용, 예: my-web-server)"
          ui:field: EntityNamePicker
          ui:autofocus: true
        cloudProvider:
          title: 클라우드 선택
          type: string
          default: gcp
          enum:
            - gcp
            - aws
            - azure
          enumNames:
            - "☁️ GCP (Google Cloud)"
            - "☁️ AWS (Amazon Web Services)"
            - "☁️ Azure (Microsoft Azure)"
        resourceGroupName:
          title: Azure 리소스 그룹
          type: string
          default: rg-platform
          description: "(Azure 선택 시 필수) 리소스를 배포할 Azure 리소스 그룹 이름"

    - title: 서버 규모 설정
      required:
        - expectedUsers
      properties:
        expectedUsers:
          title: 이 서버를 몇 명이 사용하나요?
          type: string
          default: team
          description: >
            서버를 주로 사용하는 사람이 몇 명인지 선택해주세요.
            이 숫자를 기반으로 적절한 서버 크기가 자동으로 결정됩니다.
          enum:
            - solo
            - team
            - service
            - scale
          enumNames:
            - "👤 나 혼자 또는 2~3명  –  개발·테스트용  (소형 서버)"
            - "👥 팀 내부 10~50명  –  사내 도구, 스테이징  (중형 서버)  ← 권장"
            - "🏢 외부 고객 100명 이상  –  실제 운영 서비스  (중대형 서버)"
            - "🚀 대규모 1,000명 이상  –  고트래픽 서비스  (대형 서버)"
        diskSize:
          title: 저장 공간 (GB)
          type: number
          default: 50
          enum:
            - 20
            - 50
            - 100
            - 200
          enumNames:
            - "20 GB – 가벼운 앱"
            - "50 GB – 일반 앱  ← 권장"
            - "100 GB – 대용량 앱"
            - "200 GB – 빅데이터/ML용"
          description: 서버에 설치할 소프트웨어와 데이터 크기를 고려해 선택하세요.

    - title: 수명주기 설정
      description: "이 플랫폼의 모든 클라우드 리소스는 **수명주기 정책**의 적용을 받습니다. 아래 항목을 설정하고 정책에 동의해야 다음 단계로 진행할 수 있습니다."
      required:
        - lifecycleTier
        - costCenter
        - owner
        - acknowledge
      properties:
        lifecycleTier:
          title: 환경 티어
          type: string
          default: dev
          description: "dev: 최대 30일 · staging: 최대 90일 · prod: 무제한 (플랫폼팀 PR 승인 필수) — 제한 초과 시 생성이 거부됩니다"
          enum:
            - dev
            - staging
            - prod
          enumNames:
            - "dev — 기본 7일, 최대 30일"
            - "staging — 기본 30일, 최대 90일"
            - "prod — 무제한 (플랫폼팀 승인 필요)"
        expiresAt:
          title: 만료일
          type: string
          description: "비워두면 티어 기본값이 적용됩니다 (dev: 7일, staging: 30일). 만료된 리소스는 매일 자동 삭제됩니다."
          ui:widget: date
        owner:
          title: 담당자 (GitHub username)
          type: string
        costCenter:
          title: 비용 센터
          type: string
          enum:
            - platform
            - developer
            - sre
            - finops
            - security
        acknowledge:
          title: 수명주기 정책에 동의합니다
          type: boolean
          enum:
            - true
          ui:widget: checkbox
          description: "만료된 리소스는 자동 삭제됩니다. 삭제 3일 전·당일 Discord #라이프사이클-알림로 알림이 발송됩니다. 연장 필요 시 /extend 커맨드를 사용하세요 (platform/sre 팀 승인 필요)."

    - title: 저장소 설정
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 저장소 위치
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
          description: 인프라 설정 파일을 커밋할 GitHub 저장소를 선택하세요.

  steps:
    - id: fetch-base
      name: 템플릿 파일 준비
      action: fetch:template
      input:
        url: ./content
        templateFileExtension: '.tmpl'
        values:
          componentName: ${{ parameters.componentName }}
          namespace: ${{ parameters.componentName }}
          cloudProvider: ${{ parameters.cloudProvider }}
          expectedUsers: ${{ parameters.expectedUsers }}
          diskSize: ${{ parameters.diskSize }}
          resourceGroupName: ${{ parameters.resourceGroupName }}
          lifecycleTier: ${{ parameters.lifecycleTier }}
          expiresAt: ${{ parameters.expiresAt }}
          owner: ${{ parameters.owner }}
          costCenter: ${{ parameters.costCenter }}
          repoOwner: ${{ (parameters.repoUrl | parseRepoUrl).owner }}
          repoName: ${{ (parameters.repoUrl | parseRepoUrl).repo }}

    - id: apply-namespace
      name: 네임스페이스 즉시 생성
      action: kubernetes:apply
      input:
        manifest: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${{ parameters.componentName }}
            labels:
              owner: ${{ parameters.owner }}
              cost-center: ${{ parameters.costCenter }}
              lifecycle-tier: ${{ parameters.lifecycleTier }}
              expires-at: "${{ parameters.expiresAt }}"
              backstage.io/kubernetes-id: ${{ parameters.componentName }}
              app.kubernetes.io/name: ${{ parameters.componentName }}
        clusterName: onprem

    - id: apply-claim
      name: Crossplane Claim 즉시 적용
      action: kubernetes:apply
      input:
        manifest: ${{ steps['fetch-base'].output.files['claim.yaml'] }}
        clusterName: onprem

    - id: publish
      name: Git 기록용 PR 생성 (자동 머지)
      action: publish:github:pull-request
      input:
        title: "[auto-merge] 서버 생성: ${{ parameters.componentName }} (${{ parameters.cloudProvider }})"
        description: |
          > 이 PR은 기록용으로 자동 생성되었습니다. 리소스는 이미 프로비저닝 중입니다.

          - **서비스**: ${{ parameters.componentName }}
          - **클라우드**: ${{ parameters.cloudProvider }}
          - **담당자**: ${{ parameters.owner }}
          - **환경**: ${{ parameters.lifecycleTier }}
        repoUrl: ${{ parameters.repoUrl }}
        branchName: provision/${{ parameters.componentName }}
        targetPath: apps/${{ parameters.componentName }}
        labels:
          - auto-merge
          - provisioning

  output:
    links:
      - title: PR 확인 (기록용)
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: component:default/${{ parameters.componentName }}
    text:
      - title: "✅ 프로비저닝이 시작되었습니다!"
        content: |
          **${{ parameters.componentName }}** 서버가 **즉시 프로비저닝**되고 있습니다.
          PR 머지를 기다릴 필요 없이, Crossplane이 바로 리소스를 생성합니다.

          **프로비저닝 상태 확인 (약 5~10분 소요):**
          ```
          kubectl get ${{ parameters.cloudProvider == 'gcp' && 'gcpinstance' || parameters.cloudProvider == 'aws' && 'ec2instance' || 'azurevm' }} ${{ parameters.componentName }} -n ${{ parameters.componentName }}
          ```

          ## 접속 정보 확인
          - **Backstage 카탈로그** > 해당 리소스 > 개요 탭
          - `kubectl get secret -n ${{ parameters.componentName }}`

          ## Git 기록
          아래 PR은 감사 추적용으로 자동 생성되었습니다. 별도 머지 작업은 불필요합니다.

          ## 수명주기 안내
          만료된 리소스는 자동 삭제됩니다. 삭제 3일 전·당일 Discord `#라이프사이클-알림`로 알림이 발송됩니다.
