apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: simple-server-template
  title: 서버 빠른 시작
  description: 3가지 선택만으로 서버를 즉시 생성합니다 (GCP / AWS / Azure 지원, 초보자 추천)
  tags:
    - beginner
    - quick-start
    - server
    - gcp
    - aws
    - azure
spec:
  owner: user:guest
  type: resource

  parameters:
    - title: 서버 기본 정보
      required:
        - componentName
        - cloudProvider
      properties:
        componentName:
          title: 서버 이름
          type: string
          description: "서버를 구분할 영문 이름 (소문자와 하이픈만 사용, 예: my-web-server)"
          ui:field: EntityNamePicker
          ui:autofocus: true
        cloudProvider:
          title: 클라우드 선택
          type: string
          default: gcp
          enum:
            - gcp
            - aws
            - azure
          enumNames:
            - "☁️ GCP (Google Cloud)"
            - "☁️ AWS (Amazon Web Services)"
            - "☁️ Azure (Microsoft Azure)"
        resourceGroupName:
          title: Azure 리소스 그룹
          type: string
          default: rg-platform
          description: "(Azure 선택 시 필수) 리소스를 배포할 Azure 리소스 그룹 이름"

    - title: 서버 규모 설정
      required:
        - expectedUsers
      properties:
        expectedUsers:
          title: 이 서버를 몇 명이 사용하나요?
          type: string
          default: team
          description: >
            서버를 주로 사용하는 사람이 몇 명인지 선택해주세요.
            이 숫자를 기반으로 적절한 서버 크기가 자동으로 결정됩니다.
          enum:
            - solo
            - team
            - service
            - scale
          enumNames:
            - "👤 나 혼자 또는 2~3명  –  개발·테스트용  (소형 서버)"
            - "👥 팀 내부 10~50명  –  사내 도구, 스테이징  (중형 서버)  ← 권장"
            - "🏢 외부 고객 100명 이상  –  실제 운영 서비스  (중대형 서버)"
            - "🚀 대규모 1,000명 이상  –  고트래픽 서비스  (대형 서버)"
        diskSize:
          title: 저장 공간 (GB)
          type: number
          default: 50
          enum:
            - 20
            - 50
            - 100
            - 200
          enumNames:
            - "20 GB – 가벼운 앱"
            - "50 GB – 일반 앱  ← 권장"
            - "100 GB – 대용량 앱"
            - "200 GB – 빅데이터/ML용"
          description: 서버에 설치할 소프트웨어와 데이터 크기를 고려해 선택하세요.

    - title: 저장소 설정
      required:
        - repoUrl
      properties:
        repoUrl:
          title: 저장소 위치
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
          description: 인프라 설정 파일을 커밋할 GitHub 저장소를 선택하세요.

  steps:
    - id: fetch-base
      name: 템플릿 파일 준비
      action: fetch:template
      input:
        url: ./content
        values:
          componentName: ${{ parameters.componentName }}
          namespace: default
          cloudProvider: ${{ parameters.cloudProvider }}
          expectedUsers: ${{ parameters.expectedUsers }}
          diskSize: ${{ parameters.diskSize }}
          resourceGroupName: ${{ parameters.resourceGroupName }}

    - id: publish
      name: Pull Request 생성
      action: publish:github
      input:
        description: "서버 생성 요청: ${{ parameters.componentName }} (${{ parameters.cloudProvider }})"
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        targetPath: apps/${{ parameters.componentName }}

    - id: register
      name: 카탈로그 등록
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Pull Request 확인하기
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: 카탈로그에서 열기
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
