app:
  # Should be the same as backend.baseUrl when using the `app-backend` plugin.
  baseUrl: http://100.64.0.1:30070
  title: K8S-IDP Developer Portal

backend:
  # Note that the baseUrl should be the URL that the browser and other clients
  # should use when communicating with the backend, i.e. it needs to be
  # reachable not just from within the backend host, but from all of your
  # callers. When its value is "http://localhost:7007", it's strictly private
  # and can't be reached by others.
  baseUrl: http://100.64.0.1:30070
  # The listener can also be expressed as a single <host>:<port> string. In this case we bind to
  # all interfaces, the most permissive setting. The right value depends on your specific deployment.
  listen: ':7007'
  cors:
    origin: http://100.64.0.1:30070
  csp:
    upgrade-insecure-requests: false
  # config options: https://node-postgres.com/apis/client
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      # https://node-postgres.com/features/ssl
      # you can set the sslmode configuration option via the `PGSSLMODE` environment variable
      # see https://www.postgresql.org/docs/current/libpq-ssl.html Table 33.1. SSL Mode Descriptions (e.g. require)
      # ssl:
      #   ca: # if you have a CA file and want to verify it you can uncomment this section
      #     $file: <file-path>/ca/server.crt
kubecost:
  baseUrl: http://kubecost-frontend.kubecost.svc.cluster.local:9090

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  environment: production
  session:
    secret: ${BACKEND_SECRET}
  providers:
    oidc:
      production:
        metadataUrl: http://100.64.0.1:30556/.well-known/openid-configuration
        clientId: backstage
        clientSecret: backstage-client-secret-12345
        prompt: auto
        signIn:
          resolvers:
            - resolver: emailLocalPartMatchingUserEntityName
              dangerouslyAllowSignInWithoutUserInCatalog: true

catalog:
  # Overrides the default list locations from app-config.yaml as these contain example data.
  # See https://backstage.io/docs/features/software-catalog/#adding-components-to-the-catalog for more details
  # on how to get entities into the catalog.
  locations:
    # Local example data, replace this with your production config, these are intended for demo use only.
    # File locations are relative to the backend process, typically in a deployed context, such as in a Docker container, this will be the root
    - type: file
      target: ./examples/entities.yaml

    # Local example template
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]

    # Simple server template - 서버 빠른 시작 (초보자용)
    - type: file
      target: ./templates/simple-server/template.yaml
      rules:
        - allow: [Template]

    # AWS service wizard - 질문 기반 AWS 인프라 구성 마법사
    - type: file
      target: ./templates/aws-service-wizard/template.yaml
      rules:
        - allow: [Template]

    # Infrastructure-only template - GCP 리소스 프로비저닝
    - type: file
      target: ./templates/infrastructure-only/template.yaml
      rules:
        - allow: [Template]

    # AWS infrastructure template - AWS 리소스 프로비저닝
    - type: file
      target: ./templates/aws-infrastructure/template.yaml
      rules:
        - allow: [Template]

    # Azure service wizard - 질문 기반 Azure 인프라 구성 마법사
    - type: file
      target: ./templates/azure-service-wizard/template.yaml
      rules:
        - allow: [Template]

    # Azure infrastructure template - Azure 리소스 프로비저닝
    - type: file
      target: ./templates/azure-infrastructure/template.yaml
      rules:
        - allow: [Template]

    # Service template - 서비스 생성
    - type: file
      target: ./templates/service/template.yaml
      rules:
        - allow: [Template]

    # Service with infrastructure template - 서비스 + 인프라 묶음
    - type: file
      target: ./templates/service-with-infra/template.yaml
      rules:
        - allow: [Template]

    # Local example organizational data
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]
