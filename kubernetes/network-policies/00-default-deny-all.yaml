# Default Deny All - Zero Trust Foundation
# Apply to all namespaces first, then add specific allow rules

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gitops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# backstage: deny-all 제거 — allow 정책에 apiserver egress 추가 후 재적용
# longhorn-system: deny-all 제거 — CSI attacher가 apiserver 접근 필수
# kubecost: deny-all 제거 — apiserver 접근 필요
# crossplane-system: deny-all 제거 — apiserver 접근 필수

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: chatops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: trip-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
