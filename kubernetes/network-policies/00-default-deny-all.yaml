# Default Deny All - Zero Trust Foundation
# Apply to all namespaces first, then add specific allow rules

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

