apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backstage-backend-allow
  namespace: backstage
spec:
  podSelector:
    matchLabels:
      app: backstage-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 7007
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: backstage-postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Dex OIDC 내부 서비스 (pod 직접)
    - to:
        - namespaceSelector:
            matchLabels:
              name: auth
          podSelector:
            matchLabels:
              app.kubernetes.io/name: dex
      ports:
        - protocol: TCP
          port: 5556
    # Dex OIDC - app-config의 metadataUrl이 NodePort(100.64.0.1:30556) 사용
    - to:
        - ipBlock:
            cidr: 100.64.0.0/10  # Tailscale CGNAT 범위
      ports:
        - protocol: TCP
          port: 30556
    # K8s API server + 클러스터 내 서비스 (Cilium DNAT 호환)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
        - protocol: TCP
          port: 9090
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backstage-postgresql-allow
  namespace: backstage
spec:
  podSelector:
    matchLabels:
      app: backstage-postgresql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backstage-backend
      ports:
        - protocol: TCP
          port: 5432
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
