apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring-allow-kube-apiserver
  namespace: monitoring
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - prometheus
          - alloy
  egress:
  - toEntities:
    - kube-apiserver
  - toEndpoints:
    - matchLabels:
        app.kubernetes.io/name: tempo
    toPorts:
    - ports:
      - port: "4317"
        protocol: TCP