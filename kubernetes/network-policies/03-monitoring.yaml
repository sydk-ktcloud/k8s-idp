apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alloy-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alloy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # alloy readiness probe (kubelet → alloy:12345)
    - ports:
        - protocol: TCP
          port: 12345
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3100
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
# Istio ambient mode: ztunnel HBONE 터널 허용 (Tempo → MinIO pod:15008)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tempo-allow-hbone
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
  egress:
  - toEndpoints:
    - matchLabels:
        app: minio
        io.kubernetes.pod.namespace: minio-storage
    toPorts:
    - ports:
      - port: "15008"
        protocol: TCP
