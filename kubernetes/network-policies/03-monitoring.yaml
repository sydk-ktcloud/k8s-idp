apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 9090
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9093
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 10249
        - protocol: TCP
          port: 10257
        - protocol: TCP
          port: 10259
        - protocol: TCP
          port: 2381
        - protocol: TCP
          port: 10252
        - protocol: TCP
          port: 9153

    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Longhorn 메트릭 수집
    - to:
        - namespaceSelector:
            matchLabels:
              name: longhorn-system
      ports:
        - protocol: TCP
          port: 9500
    # Velero 메트릭 수집
    - to:
        - namespaceSelector:
            matchLabels:
              name: velero
      ports:
        - protocol: TCP
          port: 8085
    # MinIO 메트릭 수집
    - to:
        - namespaceSelector:
            matchLabels:
              name: minio-storage
          podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000

