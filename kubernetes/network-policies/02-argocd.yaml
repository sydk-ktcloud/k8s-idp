apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gitops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-allow
  namespace: gitops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 네임스페이스 내 pod 간 통신 허용 (app-controller ↔ repo-server ↔ server 등)
    - from:
        - podSelector: {}
    # NodePort를 통한 외부 UI/API 접근 (port 8080)
    - from: []
      ports:
        - protocol: TCP
          port: 8080
     # Prometheus 메트릭 수집
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 9001
        - protocol: TCP
          port: 8084
  egress:
    # 네임스페이스 내 pod 간 통신 허용
    - to:
        - podSelector: {}
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Dex OIDC - 내부 서비스 (auth 네임스페이스 직접)
    - to:
        - namespaceSelector:
            matchLabels:
              name: auth
          podSelector:
            matchLabels:
              app.kubernetes.io/name: dex
      ports:
        - protocol: TCP
          port: 5556
    # Dex OIDC - argocd-cm issuer가 100.64.0.1:30556 NodePort URL을 사용
    # argocd-server가 토큰 검증 시 외부 NodePort로 접근 필요
    - to:
        - ipBlock:
            cidr: 100.64.0.0/10  # Tailscale CGNAT 범위
      ports:
        - protocol: TCP
          port: 30556
    # Kubernetes API server: CiliumNetworkPolicy(argocd-kube-apiserver-egress)로 처리
    # Cilium reserved identity "kube-apiserver"는 표준 ipBlock으로 매칭 불가 → CNP 필요
    # 외부 트래픽 (GitHub, Helm repos 등) - private IP 제외
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8
              - 192.168.0.0/16
              - 172.16.0.0/12
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 22
---
# Cilium reserved identity "kube-apiserver"는 표준 NetworkPolicy ipBlock으로 매칭 불가.
# argocd 모든 pod → kube-apiserver 접근 허용
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argocd-kube-apiserver-egress
  namespace: gitops
spec:
  endpointSelector:
    matchLabels: {}
  egress:
  - toEntities:
    - kube-apiserver
