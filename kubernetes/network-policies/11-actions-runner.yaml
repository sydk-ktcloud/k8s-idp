# Actions Runner NetworkPolicy
# Allows egress needed for CI: GitHub API, npm registry, Docker Hub, DNS

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: actions-runner-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Runner pods: CI 작업 수행 (npm, Docker Hub, GitHub API 등)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-runner-egress
  namespace: actions-runner-system
spec:
  podSelector:
    matchLabels:
      actions-runner: ""
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 6443
          protocol: TCP
    # ArgoCD NodePort (CI에서 ArgoCD sync 호출)
    - to:
        - ipBlock:
            cidr: 100.64.0.0/10
      ports:
        - port: 30081
          protocol: TCP

---
# Controller pod: runner 등록/해제를 위해 GitHub API 접근 필요
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-controller-egress
  namespace: actions-runner-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: actions-runner-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
    - ports:
        - port: 6443
          protocol: TCP
