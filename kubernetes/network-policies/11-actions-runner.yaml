# Actions Runner NetworkPolicy
# Allows egress needed for CI: GitHub API, npm registry, Docker Hub, DNS

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: actions-runner-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-runner-egress
  namespace: actions-runner-system
spec:
  podSelector:
    matchLabels:
      actions-runner: ""
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from kube-apiserver (runner status reporting)
    - {}
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # GitHub Actions API, npm registry, Docker Hub (HTTPS)
    - ports:
        - port: 443
          protocol: TCP
    # Kubernetes API server
    - ports:
        - port: 6443
          protocol: TCP
