apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: longhorn-allow
  namespace: longhorn-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 4180
        - protocol: TCP
          port: 9500
        - protocol: TCP
          port: 9501
        - protocol: TCP
          port: 9502
        - protocol: TCP
          port: 9503
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 9500
        - protocol: TCP
          port: 9501
        - protocol: TCP
          port: 9502
        - protocol: TCP
          port: 9503
    - to:
        - namespaceSelector:
            matchLabels:
              name: auth
          podSelector:
            matchLabels:
              app.kubernetes.io/name: dex
      ports:
        - protocol: TCP
          port: 5556
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # kube-apiserver 접근 (CSI attacher, longhorn-manager 등 필수)
    # ClusterIP(10.96.0.1) + 실제 엔드포인트(192.168.122.109) 모두 허용
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              component: kube-apiserver
        - ipBlock:
            cidr: 10.96.0.0/12
        - ipBlock:
            cidr: 192.168.122.109/32
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # kubelet 접근 (볼륨 attach/detach 등)
    - to:
        - ipBlock:
            cidr: 192.168.122.0/24
      ports:
        - protocol: TCP
          port: 10250
        - protocol: TCP
          port: 6443
    # MinIO S3 백업 타겟 접근
    - to:
        - namespaceSelector:
            matchLabels:
              name: minio-storage
          podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000
