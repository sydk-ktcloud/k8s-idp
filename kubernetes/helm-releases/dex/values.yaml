# Dex Helm Values
# OIDC Provider for Kubernetes Platform SSO
commonLabels:
  team: platform
  owner: team-platform
  cost-center: internal-platform
  env: prod
  system: auth
  service: dex

podLabels:
  team: platform
  owner: team-platform
  cost-center: internal-platform
  env: prod
  system: auth
  service: dex

replicaCount: 3

# GitHub OAuth credentials from Kubernetes Secret
envFrom:
  - secretRef:
      name: dex-github-secret

image:
  repository: ghcr.io/dexidp/dex
  pullPolicy: IfNotPresent
  tag: "v2.39.1"

# Service configuration
service:
  type: NodePort
  port: 5556
  nodePort: 30556

# Enable grpc for some connectors
grpc:
  enabled: false

# Dex configuration
config:
  issuer: http://100.64.0.1:30556
  
  # Storage backend - Kubernetes CRDs
  storage:
    type: kubernetes
    config:
      inCluster: true
  
  # Enable password database for static users (fallback)
  enablePasswordDB: true
  
  # Static clients for platform services
  staticClients:
    - id: argocd
      name: ArgoCD
      secret: argocd-client-secret-12345
      redirectURIs:
        - http://argocd.gitops.svc.cluster.local/auth/callback
        - http://localhost:8080/auth/callback
        - http://100.64.0.1:30081/auth/callback
    
    - id: grafana
      name: Grafana
      secret: grafana-client-secret-12345
      redirectURIs:
        - http://grafana.monitoring.svc.cluster.local/login/generic_oauth
        - http://localhost:3000/login/generic_oauth
        - http://100.64.0.1:30080/login/generic_oauth
    
    - id: kubectl
      name: kubectl
      public: true
      redirectURIs:
        - http://localhost:8000
        - http://localhost:18000

    - id: kubecost
      name: Kubecost
      secret: kubecost-client-secret-12345
      redirectURIs:
        - http://100.64.0.1:30090/oidc/authorize
        - http://localhost:9090/oidc/authorize
        - http://100.64.0.1:30091/oauth2/callback
        - http://localhost:30091/oauth2/callback

    - id: longhorn
      name: Longhorn UI
      secret: longhorn-client-secret-12345
      redirectURIs:
        - http://100.64.0.1:30071/oauth2/callback
        - http://localhost:30071/oauth2/callback

    - id: backstage
      name: Backstage Developer Portal
      secret: backstage-client-secret-12345
      redirectURIs:
        - http://100.64.0.1:30070/api/auth/oidc/handler/frame

  # GitHub OAuth Connector
  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: http://100.64.0.1:30556/callback
        orgs:
          - name: sydk-ktcloud
            teams:
              - platform
              - sre
              - developer
              - security
              - finops

  # Static password users (fallback)
  staticPasswords:
    - email: admin@k8s.local
      hash: $2a$10$YwvjJHmggkfyNccxOaIYBu.HtuSHa5G8991sKXecmy/qajblM5kFG
      username: admin
      userID: "1000"

  # OAuth2 response types supported
  oauth2:
    responseTypes:
      - code
    skipApprovalScreen: true

# Resources
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Pod Disruption Budget - managed via kubernetes/manifests/pdb/dex-pdb.yaml
podDisruptionBudget:
  enabled: false

# Node selector (optional)
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: dex
          topologyKey: kubernetes.io/hostname

# Topology spread constraints for HA
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: dex

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Ingress (disabled initially, enable when DNS is ready)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: dex.k8s.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
