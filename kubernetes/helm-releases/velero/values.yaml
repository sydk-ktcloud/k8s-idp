configuration:
  backupStorageLocation:
  - name: default
    provider: aws
    bucket: velero
    default: true
    config:
      region: minio
      s3ForcePathStyle: "true"
      s3Url: http://minio.minio-storage:9000
      publicUrl: http://minio.minio-storage:9000
  # GCS 오프사이트 백업 (DR용)
  # 사전 조건: GCS 버킷 생성 + velero-gcs-credentials Secret 생성
  # gsutil mb -l asia-northeast3 -c nearline gs://sydk-velero-offsite
  # kubectl create secret generic velero-gcs-credentials -n velero \
  #   --from-file=gcp=gcs-key.json
  - name: gcs-offsite
    provider: gcp
    bucket: sydk-velero-offsite
    credential:
      name: velero-gcs-credentials
      key: gcp

  volumeSnapshotLocation:
  - name: default
    provider: aws
    config:
      region: minio

# 실제 자격증명은 별도 kubectl 명령으로 적용:
# kubectl create secret generic velero-credentials -n velero \
#   --from-literal=cloud='[default]\naws_access_key_id=admin\naws_secret_access_key=<REAL_PASSWORD>'
credentials:
  useSecret: true
  existingSecret: velero-credentials

initContainers:
- name: velero-plugin-for-aws
  image: velero/velero-plugin-for-aws:v1.9.0
  volumeMounts:
  - mountPath: /target
    name: plugins
- name: velero-plugin-for-gcp
  image: velero/velero-plugin-for-gcp:v1.9.0
  volumeMounts:
  - mountPath: /target
    name: plugins

# 일일 클러스터 전체 백업 스케줄 (01:00, 14일 보존)
schedules:
  daily-cluster-backup:
    disabled: false
    schedule: "0 1 * * *"
    useOwnerReferencesInBackup: false
    template:
      ttl: "336h"
      includedNamespaces:
      - "*"
      excludedNamespaces:
      - velero
      storageLocation: default
      volumeSnapshotLocations:
      - default

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podLabels:
  team: platform
  owner: team-sre
  cost-center: internal-platform
  env: prod
  system: backup
  service: velero

metrics:
  enabled: true
  serviceMonitor:
    enabled: false  # Phase 6에서 별도 ServiceMonitor로 관리
