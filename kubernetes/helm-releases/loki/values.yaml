loki:
  serviceLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: loki

  podLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: loki
  
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1

  service:
    labels:
      team: platform
      owner: team-sre
      cost-center: internal-platform
      env: prod
      system: observability
      service: loki

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  persistence:
    labels:
      team: platform
      owner: team-sre
      cost-center: internal-platform
      env: prod
      system: observability
      service: loki

    enabled: true
    storageClass: longhorn
    size: 10Gi

# 사이드카 비활성화 (단순 구성)
gateway:
  enabled: false
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
