# Grafana Helm Values with Dex OAuth
podLabels:
  team: platform
  owner: team-sre
  cost-center: internal-platform
  env: prod
  system: observability
  service: grafana

replicas: 1

service:
  type: NodePort
  port: 80
  nodePort: 30080

# admin credential은 Vault에서 관리됩니다 (grafana-oauth-secret ExternalSecret)
admin:
  existingSecret: grafana-oauth-secret
  userKey: admin-user
  passwordKey: admin-password

# Dex OAuth Configuration
grafana.ini:
  auth.generic_oauth:
    enabled: true
    name: Dex
    allow_sign_up: true
    client_id: grafana
    client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
    scopes: openid profile email groups
    auth_url: http://100.64.0.1:30556/auth
    token_url: http://dex.auth.svc.cluster.local:5556/token
    api_url: http://dex.auth.svc.cluster.local:5556/userinfo
    root_url: http://100.64.0.1:30080
    role_attribute_path: contains(email, '@k8s.local') && 'Admin'
    tls_skip_verify_insecure: true

  server:
    root_url: http://100.64.0.1:30080

# OAuth client secret은 Vault에서 관리됩니다 (grafana-oauth-secret ExternalSecret)
envValueFrom:
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-oauth-secret
      key: client-secret

# Resources
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Persistence
persistence:
  enabled: true
  storageClassName: longhorn
  size: 1Gi

# Service account
serviceAccount:
  create: true

# Disable secret validation
assertNoLeakedSecrets: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
        isDefault: true
        access: proxy
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring:3100
        access: proxy
        jsonData:
          derivedFields:
            - matcherRegex: '"trace_id":"([^"]+)"'
              name: TraceID
              url: "$${__value.raw}"
              datasourceUid: tempo
      - name: Tempo
        type: tempo
        url: http://tempo.monitoring:3200
        access: proxy
        uid: tempo

# 백업 & 스토리지 대시보드 프로바이더
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: backup
      orgId: 1
      folder: 'Backup & Storage'
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/backup

dashboardsConfigMaps:
  backup: "grafana-backup-dashboard"