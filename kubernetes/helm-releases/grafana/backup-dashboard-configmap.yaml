apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-backup-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  backup-overview.json: |
    {
      "title": "Backup & Storage Overview",
      "uid": "backup-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "5m",
      "tags": ["backup", "storage", "longhorn", "velero"],
      "panels": [
        {
          "id": 1,
          "title": "Longhorn 백업 타겟 연결 상태",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "longhorn_backup_target_reachable",
              "legendFormat": "백업 타겟 (MinIO)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "연결 불가", "color": "red"}, "1": {"text": "정상", "color": "green"}}}
              ]
            }
          }
        },
        {
          "id": 2,
          "title": "Longhorn 볼륨별 백업 상태",
          "type": "table",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {
              "expr": "longhorn_volume_actual_size_bytes",
              "legendFormat": "{{volume}}",
              "instant": true
            }
          ],
          "transformations": [
            {"id": "organize", "options": {}}
          ]
        },
        {
          "id": 3,
          "title": "Longhorn 노드 스토리지 사용률 (%)",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {
              "expr": "longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes * 100",
              "legendFormat": "{{node}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 85}
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Velero 백업 성공 횟수 (24h)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "increase(velero_backup_success_total[24h])",
              "legendFormat": "성공"
            }
          ]
        },
        {
          "id": 5,
          "title": "Velero 백업 실패 횟수 (24h)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "increase(velero_backup_failure_total[24h])",
              "legendFormat": "실패"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "red", "value": 1}
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "title": "마지막 Velero 백업 성공 후 경과 시간",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [
            {
              "expr": "(time() - velero_backup_last_successful_timestamp) / 3600",
              "legendFormat": "시간(h)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "yellow", "value": 20},
                  {"color": "red", "value": 25}
                ]
              }
            }
          }
        },
        {
          "id": 7,
          "title": "Loki 로그 수집 속도 (streams/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [
            {
              "expr": "rate(loki_ingester_streams_created_total[5m])",
              "legendFormat": "스트림 생성/s"
            }
          ]
        },
        {
          "id": 8,
          "title": "Tempo 트레이스 수집 속도 (spans/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "rate(tempo_receiver_accepted_spans_total[5m])",
              "legendFormat": "스팬 수집/s"
            }
          ]
        }
      ],
      "time": {"from": "now-24h", "to": "now"},
      "timepicker": {}
    }
