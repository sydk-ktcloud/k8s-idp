apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alartmanager-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  alartmanager.json: |
    {
          "annotations": {
                "list": [
                      {
                            "builtIn": 1,
                            "datasource": {
                                  "type": "grafana",
                                  "uid": "-- Grafana --"
                            },
                            "enable": true,
                            "hide": true,
                            "iconColor": "rgba(0, 211, 255, 1)",
                            "name": "Annotations & Alerts",
                            "type": "dashboard"
                      }
                ]
          },
          "editable": true,
          "fiscalYearStartMonth": 0,
          "graphTooltip": 0,
          "id": null,
          "links": [],
          "panels": [
                {
                      "fieldConfig": {
                            "defaults": {},
                            "overrides": []
                      },
                      "gridPos": {
                            "h": 29,
                            "w": 24,
                            "x": 0,
                            "y": 0
                      },
                      "id": 1,
                      "options": {
                            "code": {
                                  "language": "plaintext",
                                  "showLineNumbers": false,
                                  "showMiniMap": false
                            },
                            "content": "<style>\n  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap');\n  :root {\n    --bg:#0a0c0f; --bg2:#111418; --bg3:#181d24;\n    --border:#1e2530; --border2:#2a3340;\n    --text:#c8d4e0; --text2:#6b7f94; --text3:#3d4f5f;\n    --critical:#ff3b3b; --critical-bg:rgba(255,59,59,0.08); --critical-border:rgba(255,59,59,0.25);\n    --warn:#f59e0b; --warn-bg:rgba(245,158,11,0.08); --warn-border:rgba(245,158,11,0.25);\n    --ok:#10b981; --ok-bg:rgba(16,185,129,0.08); --ok-border:rgba(16,185,129,0.25);\n    --blue:#3b82f6; --blue-bg:rgba(59,130,246,0.1);\n    --mono:'IBM Plex Mono',monospace; --sans:'Noto Sans KR',sans-serif;\n  }\n  * { box-sizing:border-box; margin:0; padding:0; }\n  body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; min-height:900px; padding:16px; }\n  .header { display:flex; align-items:center; justify-content:space-between; padding-bottom:14px; border-bottom:1px solid var(--border); margin-bottom:16px; }\n  .header-left { display:flex; align-items:center; gap:12px; }\n  .header-title { font-family:var(--mono); font-size:15px; font-weight:600; letter-spacing:0.08em; color:#e2eaf2; }\n  .header-clock { font-family:var(--mono); font-size:12px; color:var(--text2); }\n  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 6px var(--ok); animation:lp 2s ease-in-out infinite; }\n  @keyframes lp { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }\n  .tts-bar { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:4px; margin-bottom:16px; font-family:var(--mono); font-size:11px; color:var(--text2); }\n  .tts-dot { width:7px; height:7px; border-radius:50%; background:var(--text3); transition:all .3s; }\n  .tts-dot.active { background:var(--critical); box-shadow:0 0 8px var(--critical); animation:lp .8s infinite; }\n  .tts-msg { color:var(--text); }\n  .tts-hint { margin-left:auto; color:var(--text3); font-size:10px; }\n  .filter-bar { display:flex; align-items:center; gap:8px; margin-bottom:14px; }\n  .filter-label { font-size:11px; color:var(--text2); font-family:var(--mono); margin-right:4px; }\n  .fbtn { font-family:var(--mono); font-size:11px; font-weight:500; padding:4px 12px; border-radius:3px; border:1px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; transition:all .15s; }\n  .fbtn:hover { border-color:var(--blue); color:var(--text); }\n  .fbtn.fa { border-color:var(--blue); background:var(--blue-bg); color:#93c5fd; }\n  .fbtn.fc { border-color:var(--critical); background:var(--critical-bg); color:#fca5a5; }\n  .section { margin-bottom:20px; }\n  .section-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }\n  .stag { font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.1em; padding:2px 8px; border-radius:2px; text-transform:uppercase; }\n  .stag-c { background:var(--critical-bg); color:var(--critical); border:1px solid var(--critical-border); }\n  .stag-p { background:var(--warn-bg);     color:var(--warn);     border:1px solid var(--warn-border); }\n  .stag-r { background:var(--ok-bg);       color:var(--ok);       border:1px solid var(--ok-border); }\n  .scnt { font-family:var(--mono); font-size:11px; color:var(--text2); }\n  .pwarn { color:var(--warn); font-family:var(--mono); font-size:10px; }\n  .tbl-wrap { overflow-x:auto; }\n  table { width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed; }\n  thead th { font-family:var(--mono); font-size:11px; font-weight:600; color:var(--text2); letter-spacing:.08em; text-align:left; padding:6px 10px; border-bottom:1px solid var(--border2); white-space:nowrap; background:var(--bg2); overflow:hidden; text-overflow:ellipsis; }\n  table th:nth-child(1){width:8%} table th:nth-child(2){width:8%} table th:nth-child(3){width:13%}\n  table th:nth-child(4){width:21%} table th:nth-child(5){width:7%} table th:nth-child(6){width:8%}\n  table th:nth-child(7){width:9%} table th:nth-child(8){width:10%} table th:nth-child(9){width:16%}\n  tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }\n  tbody tr:hover { background:var(--bg3); }\n  tbody td { padding:8px 10px; vertical-align:middle; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }\n  .tc { color:#93c5fd; font-family:var(--mono); font-size:11px; }\n  .tn,.tp { color:var(--text2); font-family:var(--mono); font-size:11px; }\n  .ta { color:var(--text); font-size:12px; }\n  .td,.tt { font-family:var(--mono); font-size:11px; color:var(--text2); }\n  .sev { display:inline-block; font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.06em; padding:2px 7px; border-radius:2px; }\n  .sc { background:var(--critical-bg); color:var(--critical); border:1px solid var(--critical-border); }\n  .sw { background:var(--warn-bg); color:var(--warn); border:1px solid var(--warn-border); }\n  .sel-s { font-family:var(--mono); font-size:11px; background:var(--bg3); color:var(--text); border:1px solid var(--border2); border-radius:3px; padding:3px 6px; cursor:pointer; outline:none; width:90px; }\n  .sel-s:focus { border-color:var(--blue); }\n  .sel-s.filled { border-color:var(--ok-border); color:var(--ok); }\n  .inp-n { font-family:var(--sans); font-size:11px; background:var(--bg3); color:var(--text); border:1px solid var(--border2); border-radius:3px; padding:3px 8px; outline:none; width:100%; transition:border .15s; }\n  .inp-n:focus { border-color:var(--blue); }\n  .inp-n.filled { border-color:var(--ok-border); }\n  .inp-n::placeholder { color:var(--text3); }\n  .rc { background:rgba(255,59,59,.04); }\n  .rc:hover { background:rgba(255,59,59,.08) !important; }\n  .rr td { opacity:.55; }\n  .rr .ta { text-decoration:line-through; text-decoration-color:var(--text3); }\n  .er td { text-align:center; color:var(--text3); font-family:var(--mono); font-size:11px; padding:20px; }\n  .pgn { display:flex; align-items:center; gap:4px; margin-top:8px; }\n  .pb { font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:3px; border:1px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; transition:all .15s; min-width:28px; text-align:center; }\n  .pb:hover { border-color:var(--blue); color:var(--text); }\n  .pb.act { border-color:var(--blue); background:var(--blue-bg); color:#93c5fd; }\n  .pb:disabled { opacity:.3; cursor:default; }\n  .pi { font-family:var(--mono); font-size:10px; color:var(--text3); margin-left:6px; }\n</style>\n\n<div class=\"header\">\n  <div class=\"header-left\">\n    <div class=\"live-dot\"></div>\n    <div class=\"header-title\">ALARM CONSOLE</div>\n  </div>\n  <div class=\"header-clock\" id=\"ac-clock\">--:--:--</div>\n</div>\n<div class=\"tts-bar\">\n  <div class=\"tts-dot\" id=\"ac-tts-dot\"></div>\n  <span id=\"ac-tts-msg\" class=\"tts-msg\">음성 알람 대기 중</span>\n  <span class=\"tts-hint\">※ 첫 사용 전 화면 클릭 필요</span>\n</div>\n<div class=\"filter-bar\">\n  <span class=\"filter-label\">FILTER</span>\n  <button class=\"fbtn fa\" id=\"ac-btn-all\"      onclick=\"acApp.setFilter('all')\">전체</button>\n  <button class=\"fbtn\"    id=\"ac-btn-critical\" onclick=\"acApp.setFilter('critical')\">CRITICAL만</button>\n</div>\n\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"stag stag-c\">현재 장애</span>\n    <span class=\"scnt\" id=\"ac-cnt-c\">0건</span>\n    <span class=\"pwarn\" id=\"ac-phint\" style=\"display:none\"></span>\n  </div>\n  <div class=\"tbl-wrap\"><table><thead><tr>\n    <th>서비스</th><th>노드</th><th>파드</th><th>알람명</th>\n    <th>지속시간</th><th>심각도</th><th>발생시각</th><th>상태처리</th><th>비고</th>\n  </tr></thead><tbody id=\"ac-b-c\"></tbody></table></div>\n  <div class=\"pgn\" id=\"ac-pgn\"></div>\n</div>\n\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"stag stag-p\">지속</span>\n    <span class=\"scnt\" id=\"ac-cnt-p\">0건</span>\n  </div>\n  <div class=\"tbl-wrap\"><table><thead><tr>\n    <th>서비스</th><th>노드</th><th>파드</th><th>알람명</th>\n    <th>지속시간</th><th>심각도</th><th>발생시각</th><th>상태처리</th><th>비고</th>\n  </tr></thead><tbody id=\"ac-b-p\"></tbody></table></div>\n</div>\n\n<div class=\"section\">\n  <div class=\"section-header\">\n    <span class=\"stag stag-r\">해제</span>\n    <span class=\"scnt\" id=\"ac-cnt-r\">0건</span>\n  </div>\n  <div class=\"tbl-wrap\"><table><thead><tr>\n    <th>서비스</th><th>노드</th><th>파드</th><th>알람명</th>\n    <th>지속시간</th><th>심각도</th><th>발생시각</th><th>상태처리</th><th>비고</th>\n  </tr></thead><tbody id=\"ac-b-r\"></tbody></table></div>\n</div>\n\n<script>\n(function(){\n  var FETCH_URL = '/api/datasources/proxy/uid/prometheus/api/v1/alerts';\n  var POLL_MS   = 30000;\n  var PAGE_SIZE = 10;\n  var IGNORE    = {Watchdog:1, InfoInhibitor:1};\n  var SHOW_SEV  = {critical:1, warning:1, warn:1};\n  var LS_ALARMS = 'ac_alarms_v3';\n  var LS_FILTER = 'ac_filter';\n\n  function loadLS()     { try { var r=localStorage.getItem(LS_ALARMS); return r?JSON.parse(r):{}; } catch(e){ return {}; } }\n  function saveLS()     { try { localStorage.setItem(LS_ALARMS, JSON.stringify(alarms)); } catch(e){} }\n  function loadFilter() { try { return localStorage.getItem(LS_FILTER)||'all'; } catch(e){ return 'all'; } }\n  function saveFilter(f){ try { localStorage.setItem(LS_FILTER, f); } catch(e){} }\n\n  var alarms = loadLS();\n  var filter  = loadFilter();\n  var page = 1, spoken = {}, ttsOk = false;\n\n  document.addEventListener('click', function(){ ttsOk=true; }, {once:true});\n\n  function classify(a) {\n    if (a.status==='자동해제') return 'r';\n    if (a.status==='전달' || a.status==='오류') return 'p';\n    return 'c';\n  }\n  function fmtT(ms) {\n    return new Date(ms).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});\n  }\n  function fmtD(ms) {\n    var s=Math.floor((Date.now()-ms)/1000);\n    if(s<60) return s+'s';\n    var m=Math.floor(s/60);\n    if(m<60) return m+'m';\n    return Math.floor(m/60)+'h '+(m%60)+'m';\n  }\n\n  // row를 createElement로 만들고 이벤트는 addEventListener로 바인딩\n  function makeRow(a, sec) {\n    var isCrit = a.severity==='critical';\n    var tr = document.createElement('tr');\n    tr.className = sec==='r' ? 'rr' : (isCrit ? 'rc' : '');\n    tr.dataset.id = a.id;\n\n    // select\n    var sel = document.createElement('select');\n    sel.className = 'sel-s' + (a.status ? ' filled' : '');\n    sel.dataset.id = a.id;\n    sel.innerHTML =\n      '<option value=\"\">-- 선택 --</option>'+\n      '<option value=\"자동해제\">자동해제</option>'+\n      '<option value=\"전달\">전달</option>'+\n      '<option value=\"오류\">오류</option>';\n    sel.value = a.status;\n    sel.addEventListener('change', function(){\n      var id = this.dataset.id;\n      if (!alarms[id]) return;\n      alarms[id].status = this.value;\n      this.className = 'sel-s' + (this.value ? ' filled' : '');\n      saveLS();\n      render(); // 상태 바뀐 후 테이블 재정렬\n    });\n\n    // input\n    var inp = document.createElement('input');\n    inp.className = 'inp-n' + (a.note ? ' filled' : '');\n    inp.dataset.id = a.id;\n    inp.type = 'text';\n    inp.placeholder = '장애 내용 입력...';\n    inp.value = a.note;\n    inp.addEventListener('change', function(){\n      var id = this.dataset.id;\n      if (!alarms[id]) return;\n      alarms[id].note = this.value;\n      this.className = 'inp-n' + (this.value ? ' filled' : '');\n      saveLS();\n    });\n\n    var selTd = document.createElement('td');\n    selTd.appendChild(sel);\n    var inpTd = document.createElement('td');\n    inpTd.appendChild(inp);\n\n    // 정적 셀들\n    var cells = [\n      ['tc', a.service],\n      ['tn', a.node],\n      ['tp', a.pod],\n      ['ta', a.alertname],\n    ];\n    cells.forEach(function(c){\n      var td = document.createElement('td');\n      td.className = c[0];\n      td.textContent = c[1];\n      if(c[0]==='tp') td.title = c[1];\n      tr.appendChild(td);\n    });\n\n    // 지속시간\n    var durTd = document.createElement('td');\n    durTd.className = 'td';\n    durTd.dataset.first = a.firstSeenMs;\n    durTd.textContent = fmtD(a.firstSeenMs);\n    tr.appendChild(durTd);\n\n    // 심각도\n    var sevTd = document.createElement('td');\n    sevTd.innerHTML = '<span class=\"sev '+(isCrit?'sc':'sw')+'\">'+a.severity.toUpperCase()+'</span>';\n    tr.appendChild(sevTd);\n\n    // 발생시각\n    var timeTd = document.createElement('td');\n    timeTd.className = 'tt';\n    timeTd.textContent = fmtT(a.firstSeenMs);\n    tr.appendChild(timeTd);\n\n    tr.appendChild(selTd);\n    tr.appendChild(inpTd);\n    return tr;\n  }\n\n  function fillTable(tbody, items, sec) {\n    tbody.innerHTML = '';\n    if (!items.length) {\n      var er = document.createElement('tr'); er.className='er';\n      er.innerHTML='<td colspan=\"9\">— 없음 —</td>';\n      tbody.appendChild(er);\n      return;\n    }\n    items.forEach(function(a){ tbody.appendChild(makeRow(a, sec)); });\n  }\n\n  function render() {\n    var c=[],p=[],r=[];\n    Object.keys(alarms).forEach(function(k){\n      var a=alarms[k];\n      if(filter==='critical' && a.severity!=='critical') return;\n      var s=classify(a);\n      if(s==='r') r.push(a); else if(s==='p') p.push(a); else c.push(a);\n    });\n    function byT(x,y){return y.firstSeenMs-x.firstSeenMs;}\n    c.sort(byT); p.sort(byT); r.sort(byT);\n\n    // 현재 장애 (페이지네이션)\n    var tot=c.length, tp=Math.ceil(tot/PAGE_SIZE)||1;\n    if(page>tp) page=tp;\n    var pg=c.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);\n    var bc=document.getElementById('ac-b-c');\n    if(bc) fillTable(bc, pg, 'c');\n    var cntC=document.getElementById('ac-cnt-c');\n    if(cntC) cntC.textContent=tot+'건';\n    renderPgn(tot,tp);\n\n    var ph=document.getElementById('ac-phint');\n    if(ph){ph.style.display=p.length?'inline':'none'; ph.textContent='▲ '+p.length+'건 처리 중';}\n\n    var bp=document.getElementById('ac-b-p');\n    if(bp) fillTable(bp, p, 'p');\n    var cntP=document.getElementById('ac-cnt-p');\n    if(cntP) cntP.textContent=p.length+'건';\n\n    var br=document.getElementById('ac-b-r');\n    if(br) fillTable(br, r, 'r');\n    var cntR=document.getElementById('ac-cnt-r');\n    if(cntR) cntR.textContent=r.length+'건';\n\n    // 필터 버튼\n    var ba=document.getElementById('ac-btn-all'), bcc=document.getElementById('ac-btn-critical');\n    if(ba)  ba.className  = 'fbtn'+(filter==='all'     ?' fa':'');\n    if(bcc) bcc.className = 'fbtn'+(filter==='critical'?' fc':'');\n  }\n\n  function renderPgn(tot,tp) {\n    var c=document.getElementById('ac-pgn'); if(!c) return;\n    c.innerHTML='';\n    if(tp<=1) return;\n    function btn(lbl,pg,dis,act){\n      var b=document.createElement('button');\n      b.className='pb'+(act?' act':'');\n      b.textContent=lbl; b.disabled=dis;\n      b.onclick=function(){page=pg;render();};\n      return b;\n    }\n    c.appendChild(btn('‹',page-1,page===1,false));\n    for(var i=1;i<=tp;i++) c.appendChild(btn(i,i,false,i===page));\n    c.appendChild(btn('›',page+1,page===tp,false));\n    var info=document.createElement('span'); info.className='pi';\n    info.textContent=tot+'건 중 '+((page-1)*PAGE_SIZE+1)+'–'+Math.min(page*PAGE_SIZE,tot);\n    c.appendChild(info);\n  }\n\n  function speak(txt){\n    if(!ttsOk||!window.speechSynthesis) return;\n    window.speechSynthesis.cancel();\n    var u=new SpeechSynthesisUtterance(txt); u.lang='ko-KR'; u.rate=0.88;\n    window.speechSynthesis.speak(u);\n    var dot=document.getElementById('ac-tts-dot'), msg=document.getElementById('ac-tts-msg');\n    if(dot) dot.classList.add('active');\n    if(msg) msg.textContent='음성 재생 중: '+txt;\n    u.onend=function(){if(dot)dot.classList.remove('active');if(msg)msg.textContent='음성 알람 대기 중';};\n  }\n\n  function checkTTS(){\n    Object.keys(alarms).forEach(function(id){\n      var a=alarms[id];\n      if(a.severity==='critical'&&classify(a)!=='r'&&!spoken[id]){\n        spoken[id]=true;\n        speak('크리티컬 알람입니다. '+a.service+' 서비스, '+a.alertname+'.');\n      }\n    });\n  }\n\n  function fetchAlerts(){\n    fetch(FETCH_URL)\n      .then(function(r){if(!r.ok) throw r.status; return r.json();})\n      .then(function(json){\n        var list=(json.data&&json.data.alerts)||[];\n        list.forEach(function(a){\n          var L=a.labels||{}, sev=L.severity||'';\n          if(IGNORE[L.alertname]||!SHOW_SEV[sev]||a.state!=='firing') return;\n          var id=L.alertname+'-'+(L.pod||L.instance||L.job||'');\n          var severity=sev==='critical'?'critical':'warn';\n          var ms=a.activeAt?new Date(a.activeAt).getTime():Date.now();\n          // 신규만 추가 — 기존 알람의 status/note는 절대 건드리지 않음\n          if(!alarms[id]){\n            alarms[id]={id:id,service:L.namespace||L.job||'-',node:L.node||L.instance||'-',pod:L.pod||L.container||'-',alertname:(a.annotations&&a.annotations.summary)||L.alertname||'-',severity:severity,firstSeenMs:ms,status:'',note:''};\n          }\n        });\n\n        // 섹션별 최대 50건\n        ['','전달','오류','자동해제'].forEach(function(st){\n          var g=Object.keys(alarms).filter(function(id){return alarms[id].status===st;});\n          if(g.length>50){\n            g.sort(function(a,b){return alarms[a].firstSeenMs-alarms[b].firstSeenMs;});\n            g.slice(0,g.length-50).forEach(function(id){delete alarms[id];});\n          }\n        });\n\n        saveLS();\n        render(); checkTTS();\n      })\n      .catch(function(e){console.warn('fetch 실패:',e);});\n  }\n\n  function updateClock(){\n    var el=document.getElementById('ac-clock');\n    if(el) el.textContent=new Date().toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});\n  }\n  function updateDur(){\n    var els=document.querySelectorAll('[data-first]');\n    for(var i=0;i<els.length;i++) els[i].textContent=fmtD(+els[i].dataset.first);\n  }\n\n  window.acApp = {\n    setFilter: function(f){\n      filter=f; saveFilter(f);\n      render();\n    }\n  };\n\n  render(); updateClock(); fetchAlerts();\n  setInterval(updateClock, 1000);\n  setInterval(updateDur,   10000);\n  setInterval(fetchAlerts, POLL_MS);\n  // setInterval(render) 제거 — fetchAlerts 완료 시에만 render 호출\n})();\n</script>\n",
                            "mode": "html"
                      },
                      "pluginVersion": "11.6.0",
                      "title": "Alarm Manager",
                      "type": "text"
                }
          ],
          "preload": false,
          "refresh": "",
          "schemaVersion": 41,
          "tags": [],
          "templating": {
                "list": []
          },
          "time": {
                "from": "now-5m",
                "to": "now"
          },
          "timepicker": {},
          "timezone": "browser",
          "title": "AlartManager",
          "uid": "dfi50fsjy5gcgb",
          "version": 1
    }