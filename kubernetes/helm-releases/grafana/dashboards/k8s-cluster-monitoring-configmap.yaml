              "editorMode": "code",
              "expr": "kube_node_role",
              "format": "table",
              "interval": "",
              "legendFormat": "",
              "range": true,
              "refId": "F"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "label_replace(up{job=\"kubernetes-nodes\"}, \"node\", \"$1\", \"instance\", \"(.+)\")",
              "format": "table",
              "interval": "",
              "legendFormat": "",
              "range": true,
              "refId": "G"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "avg by (node) (time() - node_boot_time_seconds)",
              "format": "table",
              "instant": true,
              "interval": "",
              "legendFormat": "__auto",
              "refId": "H"
