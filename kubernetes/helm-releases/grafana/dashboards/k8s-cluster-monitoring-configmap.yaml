              "format": "table",
              "instant": true,
              "interval": "",
              "legendFormat": "",
              "refId": "D"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum by (node) (\n    label_replace(\n        instance:node_cpu:ratio + on(instance) group_left(nodename) node_uname_info,\n        \"node\",\n        \"$1\",\n        \"nodename\", \n        \"(.+)\"\n    )\n) \n/\nsum by (node) (kube_node_status_capacity{resource=\"cpu\"})",
              "format": "table",
              "instant": true,
              "interval": "",
              "legendFormat": "",
              "refId": "E"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
