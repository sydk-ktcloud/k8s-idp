apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: burst-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: active.burst.trigger
    interval: 30s
    rules:
    - alert: ActiveCPUHighBurstNeeded
      expr: active:node_cpu_utilization:avg > 0.70
      for: 2m
      labels:
        severity: warning
        team: platform
        trigger: gke-burst
      annotations:
        summary: "CPU {{ $value | humanizePercentage }} 초과 - GKE Burst 필요"
        description: "활성 클러스터 평균 CPU 사용률이 2분간 70%를 초과했습니다."

    - alert: ActiveMemoryHighBurstNeeded
      expr: active:node_memory_utilization:avg > 0.80
      for: 2m
      labels:
        severity: warning
        team: platform
        trigger: gke-burst
      annotations:
        summary: "Memory {{ $value | humanizePercentage }} 초과 - GKE Burst 필요"
        description: "활성 클러스터 평균 메모리 사용률이 2분간 80%를 초과했습니다."

    - alert: ActivePendingPodsHighBurstNeeded
      expr: active:pending_pods:count > 3
      for: 1m
      labels:
        severity: warning
        team: platform
        trigger: gke-burst
      annotations:
        summary: "Pending Pod {{ $value }}개 - GKE Burst 스케일아웃 필요"
        description: "스케줄링되지 못한 Pod가 1분 이상 3개를 초과합니다."

  - name: gke.burst.lifecycle
    interval: 30s
    rules:
    # Burst 발동/해제 추적 (Alertmanager resolved 알림으로 해제도 자동 통보)
    - alert: GKEBurstActive
      expr: |
        sum(kube_pod_status_phase{phase="Running",namespace="burst-workloads"}) > 0
      for: 1m
      labels:
        severity: info
        team: platform
      annotations:
        summary: "GKE Burst 발동 - Pod {{ $value }}개 실행 중"
        description: "burst-workloads 네임스페이스에 Pod가 스케줄되었습니다. resolved 알림이 오면 burst 해제입니다."

  - name: gke.burst.cost
    interval: 1m
    rules:
    # Autopilot: Pod 기반 비용 모니터링 (노드는 GKE가 자동 관리)
    - alert: GKEBurstPodsRunningLong
      expr: |
        sum(kube_pod_status_phase{phase="Running",namespace="burst-workloads"}) > 0
      for: 60m
      labels:
        severity: info
        team: platform
        cost_center: gke-burst
      annotations:
        summary: "GKE Burst Pod {{ $value }}개가 1시간 이상 실행 중"
        description: "Autopilot 과금 중입니다. burst 원인이 해소되었는지 확인하세요."

    - alert: GKEBurstPodCountHigh
      expr: |
        sum(kube_pod_status_phase{phase="Running",namespace="burst-workloads"}) >= 4
      for: 30m
      labels:
        severity: warning
        team: platform
        cost_center: gke-burst
      annotations:
        summary: "GKE Burst Pod {{ $value }}개 30분 이상 실행 - 비용 초과 주의"
        description: "burst-workloads에 Pod가 다수 실행 중입니다. Kubecost 대시보드를 확인하세요."
