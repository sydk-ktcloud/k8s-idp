apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: burst-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: active.burst.trigger
    interval: 30s
    rules:
    - alert: ActiveCPUHighBurstNeeded
      expr: active:node_cpu_utilization:avg > 0.70
      for: 2m
      labels:
        severity: warning
        team: platform
        trigger: gke-burst
      annotations:
        summary: "CPU {{ $value | humanizePercentage }} 초과 - GKE Burst 필요"
        description: "활성 클러스터 평균 CPU 사용률이 2분간 70%를 초과했습니다."

    - alert: ActiveMemoryHighBurstNeeded
      expr: active:node_memory_utilization:avg > 0.80
      for: 2m
      labels:
        severity: warning
        team: platform
        trigger: gke-burst
      annotations:
        summary: "Memory {{ $value | humanizePercentage }} 초과 - GKE Burst 필요"
        description: "활성 클러스터 평균 메모리 사용률이 2분간 80%를 초과했습니다."

    - alert: ActivePendingPodsHighBurstNeeded
      expr: active:pending_pods:count > 3
      for: 1m
      labels:
        severity: warning
        team: platform
        trigger: gke-burst
      annotations:
        summary: "Pending Pod {{ $value }}개 - GKE Burst 스케일아웃 필요"
        description: "스케줄링되지 못한 Pod가 1분 이상 3개를 초과합니다."

  - name: gke.burst.cost
    interval: 1m
    rules:
    - alert: GKEBurstIdleNodesCostWaste
      expr: |
        (sum(kube_node_labels{label_cloud_google_com_gke_preemptible="true"}) or vector(0)) > 0
        and
        (sum(kube_pod_status_phase{phase="Running",namespace="burst-workloads"}) or vector(0)) == 0
      for: 15m
      labels:
        severity: warning
        team: platform
        cost_center: gke-burst
      annotations:
        summary: "GKE Burst 클러스터 15분 유휴 - 불필요한 비용 발생"
        description: "Preemptible 노드가 실행 중이지만 burst-workloads에 Running Pod가 없습니다."

    - alert: GKEBurstNodeCountHigh
      expr: sum(kube_node_labels{label_cloud_google_com_gke_preemptible="true"}) >= 4
      for: 30m
      labels:
        severity: warning
        team: platform
        cost_center: gke-burst
      annotations:
        summary: "GKE Burst 노드 {{ $value }}개 30분 이상 실행 - 비용 초과 주의"
        description: "maxNodeCount(5) 한계에 근접했습니다. Kubecost 대시보드를 확인하세요."
