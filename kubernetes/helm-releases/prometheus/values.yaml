# Kube Prometheus Stack Values
# Monitoring stack with Longhorn storage
# Disable default Grafana (using separate Grafana installation)
commonLabels:
  team: platform
  owner: team-sre
  cost-center: internal-platform
  env: prod
  system: observability
  service: prometheus

grafana:
  enabled: false

# Prometheus Configuration
prometheus:
  prometheusSpec:
    podMetadata:
      labels:
        team: platform
        owner: team-sre
        cost-center: internal-platform
        env: prod
        system: observability
        service: prometheus

    # Retention settings
    enableRemoteWriteReceiver: true
    enableFeatures:
      - native-histograms
    retention: 15d
    retentionSize: "45GiB"

    # Burst trigger를 위한 recording rules
    # active: prefix — On-prem/EKS DR 모두 동일한 metric 이름 사용
    # GKE KEDA가 prometheus-proxy를 통해 이 메트릭을 조회
    additionalPrometheusRulesMap:
      active-burst-recording:
        groups:
        - name: active.burst.recording
          interval: 15s
          rules:
          - record: active:node_cpu_utilization:avg
            expr: |
              1 - avg(rate(node_cpu_seconds_total{mode="idle"}[2m]))
          - record: active:node_memory_utilization:avg
            expr: |
              1 - (avg(node_memory_MemAvailable_bytes) / avg(node_memory_MemTotal_bytes))
          - record: active:pending_pods:count
            expr: |
              count(kube_pod_status_phase{phase="Pending",namespace!~"kube-system|monitoring|gitops"}) or vector(0)
      crossplane-provider-alerts:
        groups:
        - name: crossplane.provider.health
          rules:
          - alert: CrossplaneProviderCrashLoop
            expr: |
              kube_pod_container_status_waiting_reason{namespace="crossplane-system", reason="CrashLoopBackOff"} > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Crossplane provider {{ $labels.pod }} CrashLoopBackOff"
              description: "CRD conversion webhook 장애로 ArgoCD 클러스터 캐시 및 API 서버 LIST 요청에 영향 가능"

    # Storage - Longhorn PVC
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Resource limits
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 200m
        memory: 512Mi

    # Scrape configuration
    scrapeInterval: 30s
    evaluationInterval: 30s

    # Additional scrape configs (MinIO metrics)
    additionalScrapeConfigs:
      - job_name: 'minio'
        bearer_token: 'eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJwcm9tZXRoZXVzIiwic3ViIjoiYWRtaW4iLCJleHAiOjQ5MjkwODg4NzB9.UsM9nBORUZl-5dpTIVhnCwSNxzcOLihVq9zMj20imhYTE4a4TCXVxp7Wnlgri9tKLrsaIUwExs1sXe6vU0_bgQ'
        static_configs:
          - targets: ['minio.minio-storage:9000']
        metrics_path: /minio/v2/metrics/cluster
        scheme: http

# Alertmanager Configuration
alertmanager:
  config:
    route:
      receiver: discord-cluster
      group_by:
        - alertname
        - cluster
        - service
      group_interval: 5m
      group_wait: 30s
      repeat_interval: 12h
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
        - matchers:
            - trigger = "gke-burst"
          receiver: discord-burst
        - matchers:
            - cost_center = "gke-burst"
          receiver: discord-burst-cost
        - matchers:
            - category = "backup-storage"
          receiver: discord-backup-storage
        - matchers:
            - category = "security"
          receiver: discord-security
    receivers:
      - name: "null"
      - name: discord-burst
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1489058994118201354/OX2sssKEcPDuGspw7lBtBYIrxifeqcXUScBapyEFo2MUTC8qE5N4G89q3A9BCxH435wQ"
            title: '🚀 GKE Burst 트리거'
            send_resolved: true
      - name: discord-burst-cost
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1489058994118201354/OX2sssKEcPDuGspw7lBtBYIrxifeqcXUScBapyEFo2MUTC8qE5N4G89q3A9BCxH435wQ"
            title: '💰 GKE 비용 경고'
            send_resolved: true
      - name: discord-backup-storage
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1489085371097813253/F8hH2XyjuXDGF3uSylEn0wx6WS2jQWG6AbUYRVeQs6FmKDtYuIKHAXNJ6WK8TBUB3SAI"
            title: '💾 백업/스토리지 알림'
            send_resolved: true
      - name: discord-cluster
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1489086014009118852/2SSBW95dXiDWh0asdSV623Ox-i6G75O48R_tijZv7PH5aDBiglfetScHWQaSd3N6USms"
            title: '⚙️ 클러스터 알림'
            send_resolved: true
      - name: discord-security
        discord_configs:
          - webhook_url: "https://discord.com/api/webhooks/1491420009468137574/T7VWX4KdRfIAEtHR-mJe3kxwklHv1OsQm2tkGir5gMu2swCPNltzrAeVe0pptLkqs1DD"
            title: '🔒 보안 알림'
            send_resolved: true
  alertmanagerSpec:
    podMetadata:
      labels:
        team: platform
        owner: team-sre
        cost-center: internal-platform
        env: prod
        system: observability
        service: alertmanager
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# Node Exporter - Disable due to restricted PSP
nodeExporter:
  enabled: true

prometheus-node-exporter:
  podLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: node-exporter

kube-state-metrics:
  releaseLabel: true
  prometheusScrape: false
  podLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: kube-state-metrics
  prometheus:
    monitor:
      enabled: true
      http:
        honorLabels: true

prometheusOperator:
  crds:
    enabled: false
  podLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: prometheus-operator
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi