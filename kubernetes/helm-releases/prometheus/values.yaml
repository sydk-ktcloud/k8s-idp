# Kube Prometheus Stack Values
# Monitoring stack with Longhorn storage
# Disable default Grafana (using separate Grafana installation)
commonLabels:
  team: platform
  owner: team-sre
  cost-center: internal-platform
  env: prod
  system: observability
  service: prometheus

grafana:
  enabled: false

# Prometheus Configuration
prometheus:
  prometheusSpec:
    podMetadata:
      labels:
        team: platform
        owner: team-sre
        cost-center: internal-platform
        env: prod
        system: observability
        service: prometheus

    # Retention settings
    enableRemoteWriteReceiver: true
    retention: 15d
    retentionSize: "45GiB"
    
    # Storage - Longhorn PVC
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    
    # Resource limits
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 200m
        memory: 512Mi
    
    # Scrape configuration
    scrapeInterval: 30s
    evaluationInterval: 30s

# Alertmanager Configuration
alertmanager:
  alertmanagerSpec:
    podMetadata:
      labels:
        team: platform
        owner: team-sre
        cost-center: internal-platform
        env: prod
        system: observability
        service: alertmanager
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# Node Exporter - Disable due to restricted PSP
nodeExporter:
  enabled: true

kube-state-metrics:
  releaseLabel: true
  prometheusScrape: false
  customLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: kube-state-metrics
  prometheus:
    monitor:
      enabled: true
      http:
        honorLabels: true

# Prometheus Operator
prometheusOperator:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi