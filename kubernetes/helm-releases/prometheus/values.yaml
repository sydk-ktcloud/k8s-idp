# Kube Prometheus Stack Values
# Monitoring stack with Longhorn storage
# Disable default Grafana (using separate Grafana installation)
commonLabels:
  team: platform
  owner: team-sre
  cost-center: internal-platform
  env: prod
  system: observability
  service: prometheus

grafana:
  enabled: false

# Prometheus Configuration
prometheus:
  prometheusSpec:
    podMetadata:
      labels:
        team: platform
        owner: team-sre
        cost-center: internal-platform
        env: prod
        system: observability
        service: prometheus

    # Retention settings
    enableRemoteWriteReceiver: true
    retention: 15d
    retentionSize: "45GiB"

    # Burst trigger를 위한 recording rules
    additionalPrometheusRulesMap:
      onprem-burst-recording:
        groups:
        - name: onprem.burst.recording
          interval: 15s
          rules:
          - record: onprem:node_cpu_utilization:avg
            expr: |
              1 - avg(rate(node_cpu_seconds_total{mode="idle"}[2m]))
          - record: onprem:node_memory_utilization:avg
            expr: |
              1 - (avg(node_memory_MemAvailable_bytes) / avg(node_memory_MemTotal_bytes))
          - record: onprem:pending_pods:count
            expr: |
              count(kube_pod_status_phase{phase="Pending",namespace!~"kube-system|monitoring|gitops"}) or vector(0)

    # Storage - Longhorn PVC
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    
    # Resource limits
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 200m
        memory: 512Mi
    
    # Scrape configuration
    scrapeInterval: 30s
    evaluationInterval: 30s

# Alertmanager Configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    podMetadata:
      labels:
        team: platform
        owner: team-sre
        cost-center: internal-platform
        env: prod
        system: observability
        service: alertmanager
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    # Discord webhook secret mount
    secrets:
    - alertmanager-discord-webhook

# Node Exporter - Disable due to restricted PSP
nodeExporter:
  enabled: true

prometheus-node-exporter:
  podLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: node-exporter
kube-state-metrics:
  releaseLabel: true
  prometheusScrape: false
  podLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: kube-state-metrics
  prometheus:
    monitor:
      enabled: true
      http:
        honorLabels: true

   # 추가 스크레이프 설정 (MinIO 메트릭)
prometheus:
  prometheusSpec:
    additionalScrapeConfigs:
    - job_name: 'minio'
      static_configs:
      - targets: ['minio.minio-storage:9000']
      metrics_path: /minio/v2/metrics/cluster
      scheme: http     
      
# Prometheus Operator
prometheusOperator:
  podLabels:
    team: platform
    owner: team-sre
    cost-center: internal-platform
    env: prod
    system: observability
    service: prometheus-operator
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
