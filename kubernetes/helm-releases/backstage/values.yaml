# Backstage Helm Values
# Developer Portal with NodePort access

# Enable PostgreSQL
postgresql:
  enabled: true
  postgresqlUsername: backstage
  existingSecret: backstage-postgresql
  existingSecretKey: postgresql-password
  postgresqlDatabase: backstage
  persistence:
    enabled: true
    storageClass: longhorn
    size: 5Gi
  service:
    port: 5432

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 3
  image:
    repository: martinaif/backstage-k8s-demo-frontend
    tag: test1
    pullPolicy: IfNotPresent
  containerPort: 80
  service:
    type: NodePort
    port: 80
    nodePort: 30070
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: backstage
                app.kubernetes.io/component: frontend
            topologyKey: kubernetes.io/hostname
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# Backend configuration
backend:
  enabled: true
  nodeEnv: production
  demoData: false
  replicaCount: 1
  image:
    repository: martinaif/backstage-k8s-demo-backend
    tag: test1
    pullPolicy: IfNotPresent
  containerPort: 7000
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 500m
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: backstage
          app.kubernetes.io/component: backend
      topologyKey: kubernetes.io/hostname

upstream:
  metrics:
    controller:
      - type: Resource
        name: backstage-backend
        params:
          - type: utilization
            value: 70
          - type: AverageUtilization
            value: 50
          - name: window
            value: 300s
          - name: scaleTargetRef
            value: backstage-backend
          - name: scaleTargetKind
            value: Deployment

autoscaling:
  enabled: true
  targetRef:
    name: backstage-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    name: backstage-frontend
    params:
      - type: utilization
        value: 70
      - type: averageUtilization
        value: 50
      - name: window
        value: 300s
      - name: scaleTargetRef
        value: backstage-frontend
      - name: scaleTargetKind
        value: deployment

# Disable lighthouse
lighthouse:
  enabled: false

# Disable ingress - using NodePort
ingress:
  enabled: false

# App configuration
appConfig:
  app:
    baseUrl: http://100.64.0.1:30070
    title: K8S-IDP Developer Portal
  
  backend:
    baseUrl: http://100.64.0.1:30070
    listen:
      port: 7000
    cors:
      origin: http://100.64.0.1:30070
    database:
      client: pg
      connection:
        database: backstage
        host: backstage-postgresql
        user: backstage
        port: 5432
        password:
          $secret:
            env: APP_CONFIG_backend_database_connection_password
    replicaCount: 3
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: backstage
                  app.kubernetes.io/component: backend
              topologyKey: kubernetes.io/hostname
  
  # Catalog configuration
  catalog:
    rules:
      - allow: [Component, System, API, Resource, Location]

  # Auth configuration for OIDC (Dex + GitHub)
  auth:
    environment: production
    session:
      secret: ${BACKEND_SECRET}
    providers:
      oidc:
        production:
          metadataUrl: http://100.64.0.1:30556/.well-known/openid-configuration
          clientId: backstage
          clientSecret: ${OIDC_CLIENT_SECRET}
          prompt: auto
          signIn:
            resolvers:
              - resolver: emailLocalPartMatchingUserEntityName
                dangerouslyAllowSignInWithoutUserInCatalog: true
