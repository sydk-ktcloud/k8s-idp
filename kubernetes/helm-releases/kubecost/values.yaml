# Kubecost Helm Values - v3.x with Longhorn Storage
labelMappingConfigs:
  department_label: "cost-center"

global:
  clusterId: "k8s-idp-cluster"
  clusterName: "k8s-idp"
  defaultStorageClass: "longhorn"
  acknowledged: true  # Required for Kubecost 3.0+

  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: kubecost

# Long-term metrics storage (replaces old kubecost-cost-analyzer PVC)
localStore:
  enabled: true
  persistentVolume:
    size: 32Gi
    enabled: true
    storageClass: "longhorn"
    annotations:
      helm.sh/resource-policy: keep

# Short-term metrics storage (<2 days WAL)
finopsagent:
  enabled: true
  persistence:
    enabled: true
    storageClass: "longhorn"
    size: 8Gi
    annotations:
      helm.sh/resource-policy: keep

# Aggregator - ClickHouse database (BLOCK STORAGE REQUIRED)
aggregator:
  enabled: true
  persistentConfigsStorage:
    storageClass: "longhorn"
    storageRequest: 1Gi
  aggregatorDbStorage:
    storageClass: "longhorn"
    storageRequest: 128Gi

# Cloud cost configs
cloudCost:
  enabled: true
  persistentConfigsStorage:
    enabled: true
    storageClass: "longhorn"
    size: 1Gi

# Frontend Service - ClusterIP (access via OAuth2 Proxy)
frontend:
  service:
    type: ClusterIP
    port: 9090
    sessionAffinity:
      enabled: true  # Required for OIDC auth
      timeoutSeconds: 10800
# OIDC disabled - using OAuth2 Proxy instead
oidc:
  enabled: false

# 예산 알림 — 팀별/티어별 비용 한도 초과 시 Discord (chatops-bot 경유) 알림
notifications:
  alertConfigs:
    alerts:
      # 팀별 월 예산 80% 초과 알림
      - type: budget
        threshold: 0.8
        window: monthly
        aggregation: label:team
        webhook: "http://chatops-bot.chatops.svc.cluster.local:3000/kubecost-alert"
      # dev 티어 월 $300 한도 알림
      - type: budget
        threshold: 300
        window: monthly
        aggregation: label:lifecycle-tier
        filter: "label[lifecycle-tier]=dev"
        webhook: "http://chatops-bot.chatops.svc.cluster.local:3000/kubecost-alert"

kubecostProductConfigs:
  athenaProjectID: "253571483088"
  athenaBucketName: "s3://aws-athena-query-results-253571483088-us-east-1"
  athenaRegion: "us-east-1"
  athenaDatabase: "athenacurcfn"
  athenaTable: "data"
  athenaWorkgroup: "primary"

kubecostModel:
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-athena-credentials
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-athena-credentials
          key: AWS_SECRET_ACCESS_KEY