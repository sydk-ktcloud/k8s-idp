# Kubecost Helm Values - v3.x with Longhorn Storage
labelMappingConfigs:
  department_label: "cost-center"

global:
  clusterId: "k8s-idp-cluster"
  clusterName: "k8s-idp"
  defaultStorageClass: "longhorn"
  acknowledged: true  # Required for Kubecost 3.0+
  
  # 1. Global 레벨 라벨 (공통 상속용 베이스)
  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops

# 2. v3.x 마이크로서비스 개별 라벨 강제 주입
frontend:
  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: kubecost-frontend
  service:
    type: ClusterIP
    port: 9090
    sessionAffinity:
      enabled: true  # Required for OIDC auth
      timeoutSeconds: 10800

finopsagent:
  enabled: true
  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: finopsagent
  persistence:
    enabled: true
    storageClass: "longhorn"
    size: 8Gi
    annotations:
      helm.sh/resource-policy: keep

aggregator:
  enabled: true
  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: aggregator
  persistentConfigsStorage:
    storageClass: "longhorn"
    storageRequest: 1Gi
  aggregatorDbStorage:
    storageClass: "longhorn"
    storageRequest: 128Gi

cloudCost:
  enabled: true
  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: cloud-cost
  persistentConfigsStorage:
    enabled: true
    storageClass: "longhorn"
    size: 1Gi

clusterController:
  enabled: true
  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: cluster-controller

forecasting:
  enabled: true
  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: forecasting

localStore:
  enabled: true
  podLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: local-store
  persistentVolume:
    size: 32Gi
    enabled: true
    storageClass: "longhorn"
    annotations:
      helm.sh/resource-policy: keep

# OIDC disabled - using OAuth2 Proxy instead
oidc:
  enabled: false
