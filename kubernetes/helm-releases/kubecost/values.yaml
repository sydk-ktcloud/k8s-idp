# Kubecost Helm Values - v3.x with Longhorn Storage
labelMappingConfigs:
  department_label: "cost-center"

global:
  clusterId: "k8s-idp-cluster"
  clusterName: "k8s-idp"
  defaultStorageClass: "longhorn"
  acknowledged: true  # Required for Kubecost 3.0+

  additionalLabels:
    team: platform
    owner: team-finops
    cost-center: internal-platform
    env: prod
    system: finops
    service: kubecost

# Long-term metrics storage (replaces old kubecost-cost-analyzer PVC)
localStore:
  enabled: true
  persistentVolume:
    size: 32Gi
    enabled: true
    storageClass: "longhorn"
    annotations:
      helm.sh/resource-policy: keep

# Short-term metrics storage (<2 days WAL)
finopsagent:
  enabled: true
  persistence:
    enabled: true
    storageClass: "longhorn"
    size: 8Gi
    annotations:
      helm.sh/resource-policy: keep

# Aggregator - ClickHouse database (BLOCK STORAGE REQUIRED)
aggregator:
  enabled: true
  persistentConfigsStorage:
    storageClass: "longhorn"
    storageRequest: 1Gi
  aggregatorDbStorage:
    storageClass: "longhorn"
    storageRequest: 128Gi

# Cloud cost configs
cloudCost:
  enabled: true
  persistentConfigsStorage:
    enabled: true
    storageClass: "longhorn"
    size: 1Gi

# Frontend Service - ClusterIP (access via OAuth2 Proxy)
frontend:
  service:
    type: ClusterIP
    port: 9090
    sessionAffinity:
      enabled: true  # Required for OIDC auth
      timeoutSeconds: 10800
# OIDC disabled - using OAuth2 Proxy instead
oidc:
  enabled: false
