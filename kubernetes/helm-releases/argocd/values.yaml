# ArgoCD Helm Values with Dex SSO
global:
  additionalLabels:
    team: platform
    owner: team-platform
    cost-center: internal-platform
    env: prod
    system: gitops
    service: argo

# ArgoCD Configuration
configs:
  cm:
    url: http://100.64.0.1:30081
    accounts.ci: login
    oidc.config: |
      name: Dex
      issuer: http://100.64.0.1:30556
      clientID: argocd
      clientSecret: argocd-client-secret-12345
      requestedScopes:
        - openid
        - profile
        - email
        - groups

  rbac:
    policy.default: role:readonly
    policy.csv: |
      # OIDC 사용자 역할 매핑
      g, admin@k8s.local, role:admin
      g, platform@k8s.local, role:admin
      g, gitops@k8s.local, role:admin
      g, finops@k8s.local, role:readonly
      g, security@k8s.local, role:admin
      g, sre@k8s.local, role:admin
      g, ai@k8s.local, role:readonly
      # 로컬 admin 계정 명시적 매핑 (ArgoCD v3 필수)
      g, admin, role:admin
      # CI/CD 전용 로컬 계정
      p, role:ci, applications, sync, */*, allow
      p, role:ci, applications, get, */*, allow
      g, ci, role:ci

# Server configuration
server:
  extraArgs:
    - --insecure
  service:
    type: NodePort
    nodePortHttp: 30081
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
    
# Resources
controller:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

repoServer:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Disable Dex server (using external Dex)
dex:
  enabled: false

# Redis
redis:
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
