apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-app-burst
  namespace: trip-app
  labels:
    app: trip-app-burst
    burst: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-app-burst
  template:
    metadata:
      labels:
        app: trip-app-burst
        burst: "true"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: trip-app-burst
  namespace: trip-app
spec:
  selector:
    app: trip-app-burst
  ports:
  - port: 80
    targetPort: 80
---
# CPU 기반 HPA — KEDA Prometheus 연동 전 단계
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trip-app-burst-hpa
  namespace: trip-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trip-app-burst
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
