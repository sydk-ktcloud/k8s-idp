# Trip App Resource Management
# 컨테이너에 resource spec이 없으므로 LimitRange로 기본값 주입
# ResourceQuota는 실제 사용량 확인 후 다음 단계에서 적용

---
apiVersion: v1
kind: LimitRange
metadata:
  name: trip-app-limits
  namespace: trip-app
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
