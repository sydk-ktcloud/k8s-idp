apiVersion: v1
kind: Service
metadata:
  name: trip-cart-api-service
  namespace: trip-app
spec:
  type: ClusterIP
  selector:
    app: trip-cart-api
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-cart-api
  namespace: trip-app
  labels:
    team: platform
    owner: team-appdev
    cost-center: internal-platform
    env: prod
    system: trip-app
    service: trip-cart-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-cart-api
  template:
    metadata:
      labels:
        app: trip-cart-api
        owner: team-appdev
        cost-center: internal-platform
        env: prod
        system: trip-app
        service: trip-cart-api
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: trip-cart-api
        image: kylekim1223/trip-cart-api:trip2-v2
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: SERVER_PORT
          value: "8081"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://alloy.monitoring.svc.cluster.local:4317"
        - name: OTEL_SERVICE_NAME
          value: "trip-cart-api-service"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_METRICS_EXPORTER
          value: "none"
        - name: OTEL_LOGS_EXPORTER
          value: "none"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: OTEL_TRACES_SAMPLER
          value: "always_on"
