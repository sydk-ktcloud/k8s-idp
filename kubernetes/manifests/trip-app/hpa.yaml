# Trip App HPA — 서비스별 CPU 기반 오토스케일링
# DB(stateful)는 제외, 프론트엔드는 trip-main만 적용

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trip-backend-hpa
  namespace: trip-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trip-backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

