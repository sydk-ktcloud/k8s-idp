apiVersion: v1
kind: Service
metadata:
  name: trip-db 
spec:
  selector:
    app: trip-db
  ports:
    - protocol: TCP
      port: 5432      
      targetPort: 5432 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-db
  template:
    metadata:
      labels:
        app: trip-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "1771"
        - name: POSTGRES_DB
          value: "trip_db"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: sql-volume
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: sql-volume
        configMap:
          name: db-init-sql
