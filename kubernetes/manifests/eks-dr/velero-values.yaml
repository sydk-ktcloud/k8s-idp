# EKS DR - Velero Configuration
# AWS S3 DR 버킷에서 복구 (On-Prem MinIO → S3 미러링 데이터 사용)
#
# DR 활성화: velero restore create dr-restore --from-backup <latest> --storage-location s3-dr
# Failback:  velero backup create failback-$(date +%Y%m%d) --include-namespaces trip-app,backstage

configuration:
  backupStorageLocation:
  - name: s3-dr
    provider: aws
    bucket: sydk-velero-dr-usw2
    default: true
    config:
      region: us-west-2

  volumeSnapshotLocation:
  - name: aws-ebs
    provider: aws
    config:
      region: us-west-2

initContainers:
- name: velero-plugin-for-aws
  image: velero/velero-plugin-for-aws:v1.9.0
  volumeMounts:
  - name: plugins
    mountPath: /target

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Velero 스케줄 (EKS 활성 시에만 의미 있음)
schedules:
  eks-dr-backup:
    disabled: false
    schedule: "0 */6 * * *"    # 6시간마다 백업 (failback 대비)
    template:
      includedNamespaces:
      - trip-app
      - backstage
      ttl: 72h                  # 3일 보관
      storageLocation: s3-dr
