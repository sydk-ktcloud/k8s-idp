# EKS DR Network Policies
# On-prem 네트워크 정책의 경량 버전 (DR 필수 서비스만)
---
# Default deny
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: trip-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# trip-app: 내부 통신 + DNS + 외부 접근 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trip-app-allow
  namespace: trip-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 3000
  - from:
    - ipBlock:
        cidr: 10.0.0.0/8
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 3000
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # 내부 통신
  - to:
    - podSelector: {}
  # 외부 (DB, API 등)
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 5432

---
# monitoring: Prometheus scrape 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 9090
  egress:
  # 모든 namespace scrape
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
  # DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # K8s API
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
