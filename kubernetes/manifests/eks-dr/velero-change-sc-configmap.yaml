# EKS DR - Velero StorageClass 리매핑
# ───────────────────────────────────────────────────────────────
# Velero의 change-storage-class RestoreItemAction 플러그인 설정.
# on-prem 백업의 PVC가 참조하는 storageClassName: longhorn 을 EKS의 gp3(EBS)로 치환.
# 이게 없으면 복구된 PVC가 존재하지 않는 longhorn SC를 기다리며 Pending 상태가 된다.
#
# dr-activate.sh가 Velero 설치 직후, restore 실행 전에 apply 한다.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: change-storage-class-config
  namespace: velero
  labels:
    velero.io/plugin-config: ""
    velero.io/change-storage-class: RestoreItemAction
data:
  longhorn: gp3
