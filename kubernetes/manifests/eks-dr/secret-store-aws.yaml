# EKS DR - AWS Secrets Manager ESO 연동
# On-prem Vault가 다운되므로 AWS Secrets Manager를 대체 시크릿 소스로 사용
#
# 사전 준비: Vault의 trip-app/backstage 시크릿을 AWS Secrets Manager에 미러링
# aws secretsmanager create-secret --name k8s/trip-app/db-credentials --secret-string '...'
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# GCS 자격증명 (Velero가 GCS offsite에서 복구하기 위해 필요)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-gcs-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: velero-gcs-credentials
  data:
  - secretKey: gcp
    remoteRef:
      key: k8s/velero/gcs-credentials
---
# Tailscale auth key (EKS DR용)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-auth
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: tailscale-auth
  data:
  - secretKey: authkey
    remoteRef:
      key: k8s/eks-dr/tailscale-auth
