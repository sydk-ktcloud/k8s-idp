  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backstage-ns-reader
  namespace: chatops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backstage-ns-reader
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: backstage

---
# Role: 네임스페이스 범위 리소스 읽기 (monitoring)
apiVersion: rbac.authorization.k8s.io/v1
