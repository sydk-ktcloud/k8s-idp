# Custom Backstage Deployment
# Using locally built image with minimal plugins

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage
automountServiceAccountToken: true

---
# ClusterRole: 클러스터 범위 리소스만 (namespaces, nodes, Crossplane)
# 네임스페이스 리소스(pods/services 등)는 각 ns의 Role로 분리
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]  # Backstage K8s plugin 필수
  - apiGroups: ["apiextensions.crossplane.io"]
    resources: ["compositeresourcedefinitions", "compositions", "claims"]
    verbs: ["get", "list"]
  # GCP claims
  - apiGroups: ["k8s-idp.example.org"]
    resources: ["gcpinstances", "buckets", "clusters", "databases", "webapps", "pubsubs", "caches"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["k8s-idp.example.org"]
    resources: ["xgcpinstances", "xbuckets", "xclusters", "xdatabases", "xwebapps", "xpubsubs", "xcaches"]
    verbs: ["get", "list"]
  # AWS claims
  - apiGroups: ["k8s-idp.example.org"]
    resources: ["ec2instances", "s3buckets", "eksclusters", "rdsdatabases"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["k8s-idp.example.org"]
    resources: ["xec2instances", "xs3buckets", "xeksclusters", "xrdsdatabases"]
    verbs: ["get", "list"]
  # Azure claims
  - apiGroups: ["k8s-idp.example.org"]
    resources: ["azurevms", "azureblobstorages", "aksclusters", "azuredatabases"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["k8s-idp.example.org"]
    resources: ["xazurevms", "xazureblobstorages", "xaksclusters", "xazuredatabases"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backstage-cluster-reader
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: backstage

---
# Role: 네임스페이스 범위 리소스 읽기 (trip-app)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backstage-ns-reader
  namespace: trip-app
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims", "events"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backstage-ns-reader
  namespace: trip-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backstage-ns-reader
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: backstage

---
# Role: 네임스페이스 범위 리소스 읽기 (chatops)
apiVersion: rbac.authorization.k8s.io/v1
