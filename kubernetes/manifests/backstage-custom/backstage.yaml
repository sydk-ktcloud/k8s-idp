---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backstage-postgresql
  namespace: backstage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
# Secret 'backstage-postgresql'은 ExternalSecret(Vault)에 의해 자동 생성됩니다.
# 참조: security/vault-infra/eso/external-secrets/backstage-postgresql.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage-postgresql
  namespace: backstage
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage-postgresql
  template:
    metadata:
      labels:
        app: backstage-postgresql
        team: platform
        owner: team-platform
        cost-center: internal-platform
        env: prod
        system: platform
        service: backstage-postgresql

    spec:
      containers:
      - name: postgresql
        image: postgres:15-alpine
        args:
          - "-c"
          - "max_connections=50"
        env:
        - name: POSTGRES_USER
          value: backstage
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backstage-postgresql
              key: postgresql-password
        - name: POSTGRES_DB
          value: backstage
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgresql-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: postgresql-data
        persistentVolumeClaim:
          claimName: backstage-postgresql

---
apiVersion: v1
kind: Service
metadata:
  name: backstage-postgresql
  namespace: backstage
spec:
  selector:
    app: backstage-postgresql
  ports:
  - port: 5432
    targetPort: 5432

---
# Secret 'backstage-backend-secrets'은 ExternalSecret(Vault)에 의해 자동 생성됩니다.
# 참조: security/vault-infra/eso/external-secrets/backstage-backend-secrets.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage-backend
  namespace: backstage
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backstage-backend
  template:
    metadata:
      labels:
        app: backstage-backend
        team: platform
        owner: team-platform
        cost-center: internal-platform
        env: prod
        system: platform
        service: backstage-backend
      annotations:
        checksum/config: "v1"

    spec:
      serviceAccountName: backstage
      automountServiceAccountToken: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backstage-backend
                topologyKey: kubernetes.io/hostname
      containers:
      - name: backstage
        image: kylekim1223/backstage-backend:sha-bb8e37e
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: backstage-backend-secrets
        volumeMounts:
        - name: production-config
          mountPath: /app/app-config.production.yaml
          subPath: app-config.production.yaml
        ports:
        - containerPort: 7007
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 7007
          initialDelaySeconds: 30
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 7007
          initialDelaySeconds: 60
          periodSeconds: 30
      volumes:
      - name: production-config
        configMap:
          name: backstage-production-config

---
apiVersion: v1
kind: Service
metadata:
  name: backstage-backend
  namespace: backstage
spec:
  type: NodePort
  selector:
    app: backstage-backend
  ports:
  - port: 7007
    targetPort: 7007
    nodePort: 30070

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-production-config
  namespace: backstage
data:
  app-config.production.yaml: |
    app:
      baseUrl: http://100.64.0.1:30070
      title: K8S-IDP Developer Portal
    
    backend:
      baseUrl: http://100.64.0.1:30070
      listen: ':7007'
      cors:
        origin: http://100.64.0.1:30070
      csp:
        upgrade-insecure-requests: false
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}
          database: ${POSTGRES_DB}
        pool:
          min: 2
          max: 20
          acquireTimeoutMillis: 30000
          idleTimeoutMillis: 30000
    
    auth:
      environment: production
      session:
        secret: ${BACKEND_SECRET}
      providers:
        oidc:
          production:
            metadataUrl: http://100.64.0.1:30556/.well-known/openid-configuration
            clientId: backstage
            clientSecret: ${OIDC_CLIENT_SECRET}
            prompt: auto
            signIn:
              resolvers:
                - resolver: emailLocalPartMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true
    
    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    proxy:
      '/kubecost':
        target: http://kubecost-frontend.kubecost.svc.cluster.local:9090
        changeOrigin: true
    
    kubecost:
      baseUrl: /api/proxy/kubecost
    
    catalog:
      providers:
        github:
          k8s-idp-apps:
            organization: 'sydk-ktcloud'
            catalogPath: '/apps/*/catalog-info.yaml'
            filters:
              repository: 'k8s-idp'
              branch: 'main'
            schedule:
              frequency: { minutes: 5 }
              timeout: { minutes: 3 }
      locations:
        - type: file
          target: ./examples/entities.yaml
        - type: file
          target: ./examples/template/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./examples/org.yaml
          rules:
            - allow: [User, Group]
        - type: file
          target: ./templates/service-wizard/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./templates/aws-service-wizard/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./templates/azure-service-wizard/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./templates/aws-infrastructure/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./templates/azure-infrastructure/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./templates/simple-server/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./templates/infrastructure-only/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./templates/service/template.yaml
          rules:
            - allow: [Template]
        - type: file
          target: ./templates/service-with-infra/template.yaml
          rules:
            - allow: [Template]
    
    kubernetes:
      serviceLocatorMethod:
        type: multiTenant
      clusterLocatorMethods:
        - type: config
          clusters:
            - name: k8s-idp
              url: https://kubernetes.default.svc
              authProvider: serviceAccount
              skipTLSVerify: true
              skipMetricsLookup: true
    
    permission:
      enabled: true
