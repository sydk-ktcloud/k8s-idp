## ⚠️ 이 파일은 템플릿입니다. 실제 값을 채워 kubectl apply 하세요.
## 민감 정보이므로 Git에 커밋하지 마세요.
apiVersion: v1
kind: Secret
metadata:
  name: cloud-credit-monitor-secret
  namespace: monitoring
type: Opaque
stringData:
  # Discord
  DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/..."

  # AWS (IAM User with ce:GetCostAndUsage, budgets:ViewBudget)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # Azure (Service Principal with Cost Management Reader role)
  AZURE_SUBSCRIPTION_ID: ""
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
---
## GCP Service Account Key (Billing Account Viewer role)
apiVersion: v1
kind: Secret
metadata:
  name: gcp-billing-sa-key
  namespace: monitoring
type: Opaque
stringData:
  sa-key.json: |
    {
      "type": "service_account",
      ...
    }
