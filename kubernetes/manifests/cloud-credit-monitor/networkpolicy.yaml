apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloud-credit-monitor-allow
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: cloud-credit-monitor
  policyTypes:
  - Egress
  egress:
  # DNS
  - ports:
    - port: 53
      protocol: UDP
    to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
  # HTTPS (AWS, GCP, Azure, Discord APIs)
  - ports:
    - port: 443
      protocol: TCP
