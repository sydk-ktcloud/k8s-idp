# OAuth2 Proxy for Kubecost with Dex OIDC
# Kubecost native OIDC has issues, using oauth2-proxy instead

---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-kubecost
  namespace: kubecost
type: Opaque
stringData:
  COOKIE_SECRET: "qVN7wJm6dYUt77MbwHp5KbwF/SW5Z75V"
  CLIENT_ID: "kubecost"
  CLIENT_SECRET: "kubecost-client-secret-12345"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-kubecost
  namespace: kubecost
  labels:
    app: oauth2-proxy-kubecost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-kubecost
  template:
    metadata:
      labels:
        app: oauth2-proxy-kubecost
    spec:
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
        imagePullPolicy: IfNotPresent
        args:
        - --provider=oidc
        - --oidc-issuer-url=http://100.64.0.1:30556
        - --redirect-url=http://100.64.0.1:30091/oauth2/callback
        - --http-address=0.0.0.0:4180
        - --upstream=http://kubecost-frontend.kubecost.svc.cluster.local:9090
        - --skip-provider-button
        - --cookie-secure=false
        - --cookie-expire=168h
        - --cookie-refresh=1h
        - --cookie-samesite=lax
        - --email-domain=*
        - --pass-access-token
        - --pass-authorization-header
        - --insecure-oidc-skip-issuer-verification
        - --insecure-oidc-allow-unverified-email
        - --standard-logging
        - --auth-logging
        - --request-logging
        env:
        - name: OAUTH2_PROXY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-kubecost
              key: CLIENT_ID
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-kubecost
              key: CLIENT_SECRET
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-kubecost
              key: COOKIE_SECRET
        ports:
        - name: http
          containerPort: 4180
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-kubecost
  namespace: kubecost
spec:
  type: NodePort
  selector:
    app: oauth2-proxy-kubecost
  ports:
  - name: http
    port: 4180
    targetPort: 4180
    nodePort: 30091
