apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: trivy-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: trivy.vulnerability
    interval: 5m
    rules:
    # ── Critical 취약점 감지 ──────────────────────────────
    - alert: TrivyCriticalVulnerabilityFound
      expr: sum by (namespace, resource_name, image_repository, image_tag) (trivy_image_vulnerabilities{severity="Critical"} > 0)
      for: 10m
      labels:
        severity: critical
        team: platform
        category: security
      annotations:
        summary: "Critical 취약점 발견: {{ $labels.namespace }}/{{ $labels.resource_name }}"
        description: "이미지 `{{ $labels.image_repository }}:{{ $labels.image_tag }}`에서 Critical CVE {{ $value }}건 감지. 즉시 이미지 업데이트 필요."

    # ── High 취약점 다수 감지 ─────────────────────────────
    - alert: TrivyHighVulnerabilityExcessive
      expr: sum by (namespace, resource_name, image_repository, image_tag) (trivy_image_vulnerabilities{severity="High"} > 10)
      for: 30m
      labels:
        severity: warning
        team: platform
        category: security
      annotations:
        summary: "High 취약점 다수 발견: {{ $labels.namespace }}/{{ $labels.resource_name }}"
        description: "이미지 `{{ $labels.image_repository }}:{{ $labels.image_tag }}`에서 High CVE {{ $value }}건 감지. 이미지 업데이트를 검토하세요."

    # ── 시크릿 노출 감지 ─────────────────────────────────
    - alert: TrivyExposedSecretFound
      expr: sum by (namespace, resource_name, image_repository, image_tag) (trivy_image_exposedsecrets{severity=~"Critical|High"} > 0)
      for: 10m
      labels:
        severity: critical
        team: platform
        category: security
      annotations:
        summary: "시크릿 노출 감지: {{ $labels.namespace }}/{{ $labels.resource_name }}"
        description: "이미지 `{{ $labels.image_repository }}:{{ $labels.image_tag }}`에서 시크릿 노출이 감지되었습니다. 즉시 확인 필요."

  - name: trivy.configaudit
    interval: 5m
    rules:
    # ── 설정 감사 Critical 위반 ──────────────────────────
    - alert: TrivyConfigAuditCritical
      expr: sum by (namespace, resource_name, resource_kind) (trivy_resource_configaudits{severity="Critical"} > 0)
      for: 30m
      labels:
        severity: warning
        team: platform
        category: security
      annotations:
        summary: "K8s 설정 위반 (Critical): {{ $labels.namespace }}/{{ $labels.resource_name }}"
        description: "{{ $labels.resource_kind }} `{{ $labels.resource_name }}`에서 Critical 설정 위반 {{ $value }}건. 보안 설정 검토 필요."

  - name: trivy.operator
    interval: 1m
    rules:
    # ── Trivy Operator 다운 ──────────────────────────────
    - alert: TrivyOperatorDown
      expr: absent(up{job="trivy-operator"} == 1)
      for: 5m
      labels:
        severity: critical
        team: platform
        category: security
      annotations:
        summary: "Trivy Operator가 다운되었습니다"
        description: "보안 스캔이 중단되었습니다. trivy-system 네임스페이스의 Operator pod를 확인하세요."
