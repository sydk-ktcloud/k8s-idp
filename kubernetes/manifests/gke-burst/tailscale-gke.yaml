# Secret 'tailscale-auth'은 ExternalSecret(Vault)에 의해 자동 생성됩니다.
# 참조: security/vault-infra/eso/external-secrets/tailscale-auth.yaml
#
# login-server: Cloud Headscale (GCP e2-micro, 항시 가동)
# On-prem Headscale SPOF 해소 — On-prem 다운 시에도 GKE↔EKS VPN 유지
# Cloud Headscale 프로비저닝: infrastructure/headscale-cloud/setup.sh
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tailscale
  namespace: kube-system
  labels:
    app.kubernetes.io/name: tailscale
    app.kubernetes.io/component: vpn
    app.kubernetes.io/cluster: gke-burst
spec:
  selector:
    matchLabels:
      app: tailscale
  template:
    metadata:
      labels:
        app: tailscale
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: tailscale
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.66
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: authkey
            - name: TS_ROUTES
              value: "10.244.0.0/16,10.96.0.0/12"
            - name: TS_ACCEPT_DNS
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--login-server=http://34.64.109.168:8080 --advertise-tags=tag:gke-burst"
            # Pod별 고유 state Secret — 동일 IP 공유 방지
            - name: TS_KUBE_SECRET
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: tun
              mountPath: /dev/net/tun
      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-secrets
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-secrets
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tailscale-secrets
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tailscale-nodes
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tailscale-nodes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tailscale-nodes
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: kube-system
