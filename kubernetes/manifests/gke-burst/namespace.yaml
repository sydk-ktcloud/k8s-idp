apiVersion: v1
kind: Namespace
metadata:
  name: burst-workloads
  labels:
    name: burst-workloads
    burst: "true"
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: burst-workloads-default-deny
  namespace: burst-workloads
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: burst-workloads-allow
  namespace: burst-workloads
spec:
  podSelector:
    matchLabels:
      burst: "true"
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - namespaceSelector:
        matchLabels:
          name: gitops
    - ipBlock:
        cidr: 10.0.0.0/8
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - ipBlock:
        cidr: 10.0.0.0/8
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 10.0.0.0/8
