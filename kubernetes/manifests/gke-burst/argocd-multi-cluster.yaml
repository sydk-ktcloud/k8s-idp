# Cluster Secret은 ArgoCD가 직접 GKE에 연결하기 위해 필요합니다.
# 실제 Secret은 클러스터에 직접 생성되어야 합니다 (Vault/ESO 또는 수동):
#   kubectl apply -f - <<EOF
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: gke-burst-cluster
#     namespace: gitops
#     labels:
#       argocd.argoproj.io/secret-type: cluster
#   type: Opaque
#   stringData:
#     name: gke-burst
#     server: https://34.47.90.121
#     config: '{"bearerToken":"<TOKEN>","tlsClientConfig":{"insecure":false,"caData":"<CA_CERT>"}}'
#   EOF
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: burst-workloads
  namespace: gitops
spec:
  generators:
    - list:
        elements:
          - cluster: gke-burst
            name: trip-app
  template:
    metadata:
      name: '{{name}}-burst'
    spec:
      project: default
      source:
        repoURL: https://github.com/sydk-ktcloud/k8s-idp.git
        path: apps/{{name}}
      destination:
        name: '{{cluster}}'
        namespace: '{{name}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
