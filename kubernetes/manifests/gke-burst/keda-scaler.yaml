apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: burst-demo-scaler
  namespace: burst-workloads
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: burst-demo
  minReplicaCount: 0
  maxReplicaCount: 5
  cooldownPeriod: 900        # 15분 유휴 후 scale-to-zero (비용 최적화)
  pollingInterval: 30        # 30초마다 메트릭 평가
  # 메트릭 소스 전환 중 (On-prem↔EKS) KEDA가 스케일다운하지 않도록 fallback 설정
  fallback:
    failureThreshold: 5
    replicas: 1
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
          - type: Percent
            value: 50
            periodSeconds: 60
          - type: Pods
            value: 2
            periodSeconds: 60
          selectPolicy: Min
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 4
            periodSeconds: 15
          selectPolicy: Max
  triggers:
  # 트리거 1: burst-workloads HTTP 요청률
  - type: prometheus
    metadata:
      # prometheus-proxy: ConfigMap으로 upstream 전환 (On-prem ↔ EKS)
      serverAddress: http://prometheus-proxy.burst-workloads:9090
      metricName: http_requests_total_rate
      threshold: "100"
      query: |
        sum(rate(http_requests_total{namespace="burst-workloads"}[1m]))
    authenticationRef:
      name: keda-prometheus-trigger

  # 트리거 2: 활성 클러스터 CPU 과부하 (On-prem 또는 EKS DR)
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-proxy.burst-workloads:9090
      metricName: active_cpu_utilization
      threshold: "0.70"
      query: active:node_cpu_utilization:avg
    authenticationRef:
      name: keda-prometheus-trigger

  # 트리거 3: 활성 클러스터 Pending Pod 백로그
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-proxy.burst-workloads:9090
      metricName: active_pending_pods_count
      threshold: "3"
      query: active:pending_pods:count
    authenticationRef:
      name: keda-prometheus-trigger
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-prometheus-trigger
  namespace: burst-workloads
spec:
  # prometheus-proxy는 인증 불필요 (클러스터 내부 통신)
  # 인증이 필요한 경우 아래 주석 해제:
  # secretTargetRef:
  # - parameter: bearerToken
  #   name: keda-prometheus-secret
  #   key: bearerToken
