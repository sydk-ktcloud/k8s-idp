apiVersion: apps/v1
kind: Deployment
metadata:
  name: burst-demo
  namespace: burst-workloads
  labels:
    app: burst-demo
    burst: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: burst-demo
  template:
    metadata:
      labels:
        app: burst-demo
        burst: "true"
    spec:
      # Preemptible VM 중단 시 최대 30초 graceful termination
      terminationGracePeriodSeconds: 30
      # Preemptible 노드에만 스케줄 (On-prem 노드 사용 방지)
      nodeSelector:
        cloud.google.com/gke-preemptible: "true"
      # Preemptible 노드의 taint 허용
      tolerations:
      - key: "cloud.google.com/gke-preemptible"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: app
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        lifecycle:
          preStop:
            exec:
              # Preemptible 종료 신호 수신 후 15초 대기 (graceful connection drain)
              command: ["/bin/sh", "-c", "sleep 15"]
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: burst-demo
  namespace: burst-workloads
spec:
  selector:
    app: burst-demo
  ports:
  - port: 80
    targetPort: 80
---
# PDB: Preemptible VM 동시 drain 시 최소 가용성 보장
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: burst-demo-pdb
  namespace: burst-workloads
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: burst-demo
