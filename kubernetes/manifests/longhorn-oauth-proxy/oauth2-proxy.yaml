# OAuth2 Proxy for Longhorn UI with Dex OIDC
# Longhorn doesn't have native OIDC support, so we use oauth2-proxy

---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-longhorn
  namespace: longhorn-system
type: Opaque
stringData:
  COOKIE_SECRET: "UmKmRDyhPkwB8e6Md5w/pTEk/nJBIVt4"
  CLIENT_ID: "longhorn"
  CLIENT_SECRET: "longhorn-client-secret-12345"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-longhorn
  namespace: longhorn-system
  labels:
    app: oauth2-proxy-longhorn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-longhorn
  template:
    metadata:
      labels:
        app: oauth2-proxy-longhorn
    spec:
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
        imagePullPolicy: IfNotPresent
        args:
        - --provider=oidc
        - --oidc-issuer-url=http://dex.auth.svc.cluster.local:5556
        - --redeem-url=http://dex.auth.svc.cluster.local:5556/token
        - --oidc-jwks-url=http://dex.auth.svc.cluster.local:5556/keys
        - --redirect-url=http://100.64.0.1:30071/oauth2/callback
        - --http-address=0.0.0.0:4180
        - --upstream=http://longhorn-frontend.longhorn-system.svc.cluster.local:80
        - --skip-provider-button
        - --cookie-secure=false
        - --cookie-expire=168h
        - --cookie-refresh=1h
        - --cookie-samesite=lax
        - --email-domain=*
        - --pass-access-token
        - --pass-authorization-header
        - --insecure-oidc-skip-issuer-verification
        - --insecure-oidc-allow-unverified-email
        - --standard-logging
        - --auth-logging
        - --request-logging
        env:
        - name: OAUTH2_PROXY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-longhorn
              key: CLIENT_ID
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-longhorn
              key: CLIENT_SECRET
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-longhorn
              key: COOKIE_SECRET
        ports:
        - name: http
          containerPort: 4180
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-longhorn
  namespace: longhorn-system
spec:
  type: NodePort
  selector:
    app: oauth2-proxy-longhorn
  ports:
  - name: http
    port: 4180
    targetPort: 4180
    nodePort: 30071
