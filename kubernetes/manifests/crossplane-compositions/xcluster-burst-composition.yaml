apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xclusterburst.gcp.k8s-idp.example.org
  labels:
    provider: gcp
    resource: container
    type: burst
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XClusterBurst
  writeConnectionSecretsToNamespace: crossplane-system
  # в”Җв”Җ EnvironmentConfig: GCP н”„лЎңм қнҠё мҲҳмӨҖ кё°ліёк°’ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  environment:
    environmentConfigs:
      - type: Reference
        ref:
          name: gcp-platform
  resources:
    # в”Җв”Җ GKE Autopilot Cluster в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    # Autopilot: нҒҙлҹ¬мҠӨн„° кҙҖлҰ¬л№„ л¬ҙлЈҢ, Pod мӢӨн–үл¶„л§Ң кіјкёҲ
    # NodePoolмқҖ GKEк°Җ мһҗлҸҷ кҙҖлҰ¬н•ҳлҜҖлЎң лі„лҸ„ лҰ¬мҶҢмҠӨ л¶Ҳн•„мҡ”
    - name: gke-burst-cluster
      base:
        apiVersion: container.gcp.upbound.io/v1beta1
        kind: Cluster
        spec:
          forProvider:
            labels:
              managed-by: crossplane
              resource-type: gke-burst-cluster
            location: asia-northeast3
            network: ""
            subnetwork: ""
            enableAutopilot: true
          writeConnectionSecretToRef:
            namespace: crossplane-system
            name: placeholder
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.name
          toFieldPath: metadata.annotations[crossplane.io/external-name]
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
        - fromFieldPath: spec.autopilot
          toFieldPath: spec.forProvider.enableAutopilot
        # network: EnvironmentConfig кё°ліёк°’ мӮ¬мҡ©
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultNetworkUrl
          toFieldPath: spec.forProvider.network
        # subnetwork: EnvironmentConfig кё°ліёк°’ мӮ¬мҡ©
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultSubnetworkUrl
          toFieldPath: spec.forProvider.subnetwork
        - fromFieldPath: metadata.uid
          toFieldPath: spec.writeConnectionSecretToRef.name
          transforms:
            - type: string
              string:
                fmt: "%s-gke-cluster-conn"

        # в”Җв”Җ FinOps лқјлІЁ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.labels[name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.labels[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.labels[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.labels[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.labels[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.labels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.labels[app-name]
          policy:
            fromFieldPath: Optional

      connectionDetails:
        - name: kubeconfig
          fromConnectionSecretKey: kubeconfig
