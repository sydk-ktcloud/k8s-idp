apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xclusterburst.gcp.k8s-idp.example.org
  labels:
    provider: gcp
    resource: container
    type: burst
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XClusterBurst
  writeConnectionSecretsToNamespace: crossplane-system

  # ── EnvironmentConfig: GCP 프로젝트 수준 기본값 ───────────────
  environment:
    environmentConfigs:
      - type: Reference
        ref:
          name: gcp-platform

  resources:
    # ── GKE Autopilot Cluster ─────────────────────────────────
    # Autopilot: 클러스터 관리비 무료, Pod 실행분만 과금
    # NodePool은 GKE가 자동 관리하므로 별도 리소스 불필요
    - name: gke-burst-cluster
      base:
        apiVersion: container.gcp.upbound.io/v1beta1
        kind: Cluster
        spec:
          forProvider:
            labels:
              environment: burst
              managed-by: crossplane
              cost-center: burst-workload
            location: asia-northeast3
            network: ""
            subnetwork: ""
            enableAutopilot: true
          writeConnectionSecretToRef:
            namespace: crossplane-system
            name: placeholder
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.name
          toFieldPath: metadata.annotations[crossplane.io/external-name]
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
        - fromFieldPath: spec.autopilot
          toFieldPath: spec.forProvider.enableAutopilot
        # network: EnvironmentConfig 기본값 사용 (spec.network="default"이면 EnvironmentConfig URL 적용)
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultNetworkUrl
          toFieldPath: spec.forProvider.network
        # subnetwork: EnvironmentConfig 기본값 사용
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultSubnetworkUrl
          toFieldPath: spec.forProvider.subnetwork
        - fromFieldPath: metadata.uid
          toFieldPath: spec.writeConnectionSecretToRef.name
          transforms:
            - type: string
              string:
                fmt: "%s-gke-cluster-conn"
      connectionDetails:
        - name: kubeconfig
          fromConnectionSecretKey: kubeconfig
