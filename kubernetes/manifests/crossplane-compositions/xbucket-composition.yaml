apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xbucket.k8s-idp.example.org
  labels:
    provider: gcp
    resource: storage
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XBucket
  resources:
    - name: storage-bucket
      base:
        apiVersion: storage.gcp.upbound.io/v1beta1
        kind: Bucket
        spec:
          forProvider:
            labels:
              managed-by: crossplane
              resource-type: bucket
            location: US
            storageClass: STANDARD
            uniformBucketLevelAccess: true
            versioning:
              - enabled: false
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
        - fromFieldPath: spec.storageClass
          toFieldPath: spec.forProvider.storageClass
        - fromFieldPath: spec.versioning
          toFieldPath: spec.forProvider.versioning[0].enabled
        - fromFieldPath: spec.uniformBucketLevelAccess
          toFieldPath: spec.forProvider.uniformBucketLevelAccess

        # ── FinOps 라벨 (GCP는 tags가 아닌 labels) ───────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.labels[name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.labels[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.labels[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.labels[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.labels[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.labels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.labels[app-name]
          policy:
            fromFieldPath: Optional
