apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xwebapp.k8s-idp.example.org
  labels:
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XWebApp

  writeConnectionSecretsToNamespace: crossplane-system

  resources:
    # ── VM 서버 ──────────────────────────────────────────────
    - name: vm-instance
      base:
        apiVersion: compute.gcp.upbound.io/v1beta1
        kind: Instance
        spec:
          providerConfigRef:
            name: default
          forProvider:
            project: sydk-ktcloud
            labels:
              managed-by: crossplane       
              resource-type: webapp-vm
            networkInterface:
              - accessConfig:
                  - networkTier: PREMIUM
            bootDisk:
              - initializeParams:
                  - image: projects/debian-cloud/global/images/family/debian-11
            tags:
              - http-server
              - https-server

      patches:
        - fromFieldPath: spec.name
          toFieldPath: metadata.annotations[crossplane.io/external-name]
          transforms:
            - type: string
              string:
                fmt: "%s-server"
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.region
          toFieldPath: spec.forProvider.zone
          transforms:
            - type: string
              string:
                fmt: "%s-a"
          policy:
            fromFieldPath: Optional

        - fromFieldPath: spec.environment
          toFieldPath: spec.forProvider.machineType
          transforms:
            - type: map
              map:
                dev: e2-small
                standard: e2-medium
                large: e2-standard-4
                xlarge: n2-standard-8
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.environment
          toFieldPath: spec.forProvider.bootDisk[0].initializeParams[0].size
          transforms:
            - type: map
              map:
                dev: "20"
                standard: "50"
                large: "100"
                xlarge: "200"
            - type: convert
              convert:
                toType: int64
          policy:
            fromFieldPath: Required

        # ── FinOps 라벨  ──────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.labels[name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.labels[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.labels[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.labels[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.labels[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.labels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.labels[app-name]
          policy:
            fromFieldPath: Optional

        # ── VM 상태 버블업 ────────────────────────────────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.status
          toFieldPath: status.vmStatus
          policy:
            fromFieldPath: Optional

        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.networkInterface[0].accessConfig[0].natIp
          toFieldPath: status.vmPublicIp
          policy:
            fromFieldPath: Optional

    # ── Cloud SQL 데이터베이스 ────────────────────────────────
    - name: database
      base:
        apiVersion: sql.gcp.upbound.io/v1beta1
        kind: DatabaseInstance
        spec:
          providerConfigRef:
            name: default
          writeConnectionSecretToRef:
            namespace: crossplane-system
            name: placeholder
          forProvider:
            region: us-central1
            # rootPassword: Vault/ESO Secret으로 주입 필요 — base에 하드코딩 금지
            deletionProtection: false
            settings:
              - diskType: PD_SSD
                availabilityType: ZONAL
                backupConfiguration:
                  - enabled: true

      patches:
        - fromFieldPath: spec.name
          toFieldPath: metadata.annotations[crossplane.io/external-name]
          transforms:
            - type: string
              string:
                fmt: "%s-db"
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.region
          toFieldPath: spec.forProvider.region
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.dbEngine
          toFieldPath: spec.forProvider.databaseVersion
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.environment
          toFieldPath: spec.forProvider.settings[0].tier
          transforms:
            - type: map
              map:
                dev: db-custom-1-3840
                standard: db-custom-1-3840
                large: db-custom-2-7680
                xlarge: db-custom-4-15360
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.environment
          toFieldPath: spec.forProvider.settings[0].diskSize
          transforms:
            - type: map
              map:
                dev: "20"
                standard: "50"
                large: "100"
                xlarge: "200"
            - type: convert
              convert:
                toType: int64
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.uid
          toFieldPath: spec.writeConnectionSecretToRef.name
          transforms:
            - type: string
              string:
                fmt: "%s-webapp-db-conn"

        # ── FinOps 라벨 (Cloud SQL은 userLabels) ──────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.settings[0].userLabels[name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.settings[0].userLabels[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.settings[0].userLabels[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.settings[0].userLabels[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.settings[0].userLabels[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.settings[0].userLabels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.settings[0].userLabels[app-name]
          policy:
            fromFieldPath: Optional

        # ── DB 상태 버블업 ────────────────────────────────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.state
          toFieldPath: status.dbStatus
          policy:
            fromFieldPath: Optional

        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.connectionName
          toFieldPath: status.dbConnectionName
          policy:
            fromFieldPath: Optional

      connectionDetails:
        - name: dbConnectionName
          fromConnectionSecretKey: connectionName
        - name: dbPrivateIp
          fromConnectionSecretKey: privateIpAddress
