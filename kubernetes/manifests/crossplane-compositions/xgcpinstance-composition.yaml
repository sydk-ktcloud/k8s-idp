apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xgcpinstance.k8s-idp.example.org
  labels:
    provider: gcp
    resource: compute
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XGCPInstance
  resources:
    - name: compute-instance
      base:
        apiVersion: compute.gcp.upbound.io/v1beta1
        kind: Instance
        spec:
          forProvider:
            project: sydk-ktcloud
            zone: us-central1-a
            labels:
              team: platform
              owner: team-platform
              cost-center: internal-platform
              env: prod
              system: infra
              service: gcp-instance
              managed-by: crossplane
              resource-type: instance
            machineType: e2-medium
            bootDisk:
              - initializeParams:
                  - size: 100
            networkInterface:
              - accessConfig:
                  - natIp: ""
                    networkTier: STANDARD
                network: default
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.machineType
          toFieldPath: spec.forProvider.machineType
        - fromFieldPath: spec.zone
          toFieldPath: spec.forProvider.zone
        - fromFieldPath: spec.diskSize
          toFieldPath: spec.forProvider.bootDisk[0].initializeParams[0].size
        - fromFieldPath: metadata.labels
          toFieldPath: metadata.labels
        - fromFieldPath: metadata.labels
          toFieldPath: spec.forProvider.labels
