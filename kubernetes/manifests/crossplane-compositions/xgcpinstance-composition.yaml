apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xgcpinstance.k8s-idp.example.org
  labels:
    provider: gcp
    resource: compute
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XGCPInstance
  resources:
    - name: compute-instance
      base:
        apiVersion: compute.gcp.upbound.io/v1beta1
        kind: Instance
        spec:
          forProvider:
            labels:
              team: platform
              owner: team-platform
              cost-center: internal-platform
              env: prod
              system: infra
              service: gcp-instance
              managed-by: crossplane
              resource-type: instance
            machineType: e2-medium
            zone: us-central1-a
            bootDisk:
              initializeParams:
                size: 100
            networkInterfaces:
              - accessConfigs:
                  - type: ONE_TO_ONE_NAT
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.machineType
          toFieldPath: spec.forProvider.machineType
          transforms:
            - type: string
              string:
                fmt: "zones/%s"
        - fromFieldPath: spec.region
          toFieldPath: spec.forProvider.zone
          transforms:
            - type: string
              string:
                fmt: "%s-a"
        - fromFieldPath: spec.diskSize
          toFieldPath: spec.forProvider.bootDisk.initializeParams.size
        - fromFieldPath: metadata.labels
          toFieldPath: metadata.labels
        - fromFieldPath: metadata.labels
          toFieldPath: spec.forProvider.labels
