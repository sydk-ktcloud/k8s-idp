apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xgcpinstance.k8s-idp.example.org
  labels:
    provider: gcp
    resource: compute
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XGCPInstance
  resources:
    - name: compute-instance
      base:
        apiVersion: compute.gcp.upbound.io/v1beta1
        kind: Instance
        spec:
          forProvider:
            project: sydk-ktcloud
            zone: us-central1-a
            labels:
              managed-by: crossplane
              resource-type: gcp-instance
            machineType: e2-medium
            bootDisk:
              - autoDelete: true
                initializeParams:
                  - image: projects/debian-cloud/global/images/family/debian-11
                    size: 100
            networkInterface:
              - accessConfig:
                  - natIp: ""
                    networkTier: STANDARD
                network: projects/sydk-ktcloud/global/networks/default
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.machineType
          toFieldPath: spec.forProvider.machineType
        - fromFieldPath: spec.zone
          toFieldPath: spec.forProvider.zone
        - fromFieldPath: spec.diskSize
          toFieldPath: spec.forProvider.bootDisk[0].initializeParams[0].size

        # ── FinOps 라벨 ───────────────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.labels[name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.labels[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.labels[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.labels[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.labels[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.labels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.labels[app-name]
          policy:
            fromFieldPath: Optional
