apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xpubsub.k8s-idp.example.org
  labels:
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XPubSub

  resources:
    # ── Pub/Sub 토픽 ─────────────────────────────────────────
    - name: pubsub-topic
      base:
        apiVersion: pubsub.gcp.upbound.io/v1beta1
        kind: Topic
        spec:
          providerConfigRef:
            name: default
          forProvider:
            labels:
              managed-by: crossplane
              resource-type: pubsub-topic

      patches:
        - fromFieldPath: spec.name
          toFieldPath: metadata.name
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.messageRetentionDuration
          toFieldPath: spec.forProvider.messageRetentionDuration
          policy:
            fromFieldPath: Required

        # ── FinOps 라벨 ───────────────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.labels[name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.labels[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.labels[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.labels[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.labels[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.labels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.labels[app-name]
          policy:
            fromFieldPath: Optional

    # ── Pub/Sub 구독 ─────────────────────────────────────────
    - name: pubsub-subscription
      base:
        apiVersion: pubsub.gcp.upbound.io/v1beta1
        kind: Subscription
        spec:
          providerConfigRef:
            name: default
          forProvider:
            ackDeadlineSeconds: 30
            labels:
              managed-by: crossplane
              resource-type: pubsub-subscription

      patches:
        # 이름: <topic-name>-sub
        - fromFieldPath: spec.name
          toFieldPath: metadata.annotations[crossplane.io/external-name]
          transforms:
            - type: string
              string:
                fmt: "%s-sub"
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.topicRef.name
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.ackDeadlineSeconds
          toFieldPath: spec.forProvider.ackDeadlineSeconds
          policy:
            fromFieldPath: Required

        # ── FinOps 라벨 ───────────────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.labels[name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.labels[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.labels[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.labels[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.labels[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.labels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.labels[app-name]
          policy:
            fromFieldPath: Optional
