apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xekscluster.k8s-idp.example.org
  labels:
    provider: aws
    resource: eks
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XEKSCluster

  # EKS kubeconfig를 crossplane-system 네임스페이스에 Secret으로 자동 저장
  writeConnectionSecretsToNamespace: crossplane-system

  # ── EnvironmentConfig: 플랫폼 팀이 관리하는 계정 수준 기본값 ──
  # IAM Role ARN, Subnet ID 등을 개발자가 몰라도 됩니다.
  environment:
    environmentConfigs:
      - type: Reference
        ref:
          name: aws-platform

  resources:
    - name: eks-cluster
      base:
        apiVersion: eks.aws.upbound.io/v1beta1
        kind: Cluster
        spec:
          writeConnectionSecretToRef:
            namespace: crossplane-system
            name: placeholder
          forProvider:
            region: us-east-1
            roleArn: ""
            vpcConfig:
              - subnetIds: []
            tags:
              team: platform
              owner: team-platform
              cost-center: internal-platform
              env: prod
              system: infra
              managed-by: crossplane
              resource-type: eks-cluster
          providerConfigRef:
            name: default
      patches:
        # region
        - fromFieldPath: spec.region
          toFieldPath: spec.forProvider.region
        # roleArn: EnvironmentConfig 기본값 → spec.roleArn으로 재정의 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: clusterRoleArn
          toFieldPath: spec.forProvider.roleArn
        - type: FromCompositeFieldPath
          fromFieldPath: spec.roleArn
          toFieldPath: spec.forProvider.roleArn
          policy:
            fromFieldPath: Optional
        # subnetIds: EnvironmentConfig 3개 서브넷 → spec.subnetIds로 재정의 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: subnetId1
          toFieldPath: spec.forProvider.vpcConfig[0].subnetIds[0]
        - type: FromEnvironmentFieldPath
          fromFieldPath: subnetId2
          toFieldPath: spec.forProvider.vpcConfig[0].subnetIds[1]
        - type: FromEnvironmentFieldPath
          fromFieldPath: subnetId3
          toFieldPath: spec.forProvider.vpcConfig[0].subnetIds[2]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.subnetIds
          toFieldPath: spec.forProvider.vpcConfig[0].subnetIds
          policy:
            fromFieldPath: Optional
        - fromFieldPath: metadata.labels
          toFieldPath: metadata.labels
        # kubeconfig Secret 이름: {uid}-eks-cluster-conn
        - fromFieldPath: metadata.uid
          toFieldPath: spec.writeConnectionSecretToRef.name
          transforms:
            - type: string
              string:
                fmt: "%s-eks-cluster-conn"
        # ── 클러스터 상태 → composite status 버블업 ────────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.status
          toFieldPath: status.clusterStatus
          policy:
            fromFieldPath: Optional
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.endpoint
          toFieldPath: status.endpoint
          policy:
            fromFieldPath: Optional
      connectionDetails:
        - name: kubeconfig
          fromConnectionSecretKey: kubeconfig

    - name: eks-node-group
      base:
        apiVersion: eks.aws.upbound.io/v1beta1
        kind: NodeGroup
        spec:
          forProvider:
            region: us-east-1
            clusterNameSelector:
              matchControllerRef: true
            nodeRoleArn: ""
            subnetIds: []
            scalingConfig:
              - desiredSize: 3
                minSize: 1
                maxSize: 10
            instanceTypes:
              - t3.medium
            tags:
              team: platform
              owner: team-platform
              managed-by: crossplane
              resource-type: eks-nodegroup
          providerConfigRef:
            name: default
      patches:
        # region
        - fromFieldPath: spec.region
          toFieldPath: spec.forProvider.region
        # nodeRoleArn: EnvironmentConfig 기본값 → spec.nodeRoleArn으로 재정의 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: nodeRoleArn
          toFieldPath: spec.forProvider.nodeRoleArn
        - type: FromCompositeFieldPath
          fromFieldPath: spec.nodeRoleArn
          toFieldPath: spec.forProvider.nodeRoleArn
          policy:
            fromFieldPath: Optional
        # subnetIds: EnvironmentConfig 3개 서브넷 → spec.subnetIds로 재정의 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: subnetId1
          toFieldPath: spec.forProvider.subnetIds[0]
        - type: FromEnvironmentFieldPath
          fromFieldPath: subnetId2
          toFieldPath: spec.forProvider.subnetIds[1]
        - type: FromEnvironmentFieldPath
          fromFieldPath: subnetId3
          toFieldPath: spec.forProvider.subnetIds[2]
        - type: FromCompositeFieldPath
          fromFieldPath: spec.subnetIds
          toFieldPath: spec.forProvider.subnetIds
          policy:
            fromFieldPath: Optional
        # scaling & instanceType
        - fromFieldPath: spec.nodeCount
          toFieldPath: spec.forProvider.scalingConfig[0].desiredSize
        - fromFieldPath: spec.instanceType
          toFieldPath: spec.forProvider.instanceTypes[0]
        # ── 노드 그룹 상태 → composite status 버블업 ───────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.status
          toFieldPath: status.nodeGroupStatus
          policy:
            fromFieldPath: Optional
