# ── AWS 플랫폼 환경 설정 ────────────────────────────────────────
# 플랫폼 팀이 1회 설정하는 계정 수준 값입니다.
# 개발자는 이 파일을 직접 편집하지 않아도 됩니다.
#
# 적용 방법:
#   1. ACCOUNT_ID를 실제 AWS 계정 ID로 교체
#   2. subnetIds를 실제 서브넷 ID로 교체 (최소 2개, 다른 AZ)
#   3. kubectl apply -f aws-platform-environment-config.yaml
#
# 역할(Role) 사전 생성 방법:
#   eksctl create iamidentitymapping 또는 AWS Console → IAM → Roles 에서
#   AmazonEKSClusterPolicy, AmazonEKSWorkerNodePolicy 정책이 부여된 Role 생성
# ────────────────────────────────────────────────────────────────
apiVersion: apiextensions.crossplane.io/v1alpha1
kind: EnvironmentConfig
metadata:
  name: aws-platform
data:
  # EKS 클러스터 IAM Role (AmazonEKSClusterPolicy 부여 필요)
  # 예: arn:aws:iam::123456789012:role/platform-eks-cluster-role
  clusterRoleArn: "arn:aws:iam::ACCOUNT_ID:role/platform-eks-cluster-role"

  # EKS 노드 그룹 IAM Role (AmazonEKSWorkerNodePolicy, AmazonEKS_CNI_Policy, AmazonEC2ContainerRegistryReadOnly 부여 필요)
  # 예: arn:aws:iam::123456789012:role/platform-eks-node-role
  nodeRoleArn: "arn:aws:iam::ACCOUNT_ID:role/platform-eks-node-role"

  # EKS 클러스터에 사용할 서브넷 ID 목록 (최소 2개, 서로 다른 AZ)
  # 예: subnet-0a1b2c3d4e5f6a7b8 (us-east-1a), subnet-0b2c3d4e5f6a7b8c9 (us-east-1b)
  subnetId1: "subnet-PLACEHOLDER_AZ1"
  subnetId2: "subnet-PLACEHOLDER_AZ2"
  subnetId3: "subnet-PLACEHOLDER_AZ3"
