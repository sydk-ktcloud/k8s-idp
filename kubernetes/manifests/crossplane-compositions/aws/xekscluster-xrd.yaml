apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xeksclusters.k8s-idp.example.org
spec:
  group: k8s-idp.example.org
  names:
    kind: XEKSCluster
    plural: xeksclusters
    singular: xekscluster
  claimNames:
    kind: EKSCluster
    plural: eksclusters
    singular: ekscluster
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the EKS cluster
                region:
                  type: string
                  description: AWS region
                  default: us-east-1
                nodeCount:
                  type: integer
                  description: Number of worker nodes
                  default: 3
                instanceType:
                  type: string
                  description: EC2 instance type for worker nodes
                  default: t3.medium
                roleArn:
                  type: string
                  description: IAM role ARN for the EKS cluster (pre-created)
                nodeRoleArn:
                  type: string
                  description: IAM role ARN for EKS node group (pre-created)
                subnetIds:
                  type: array
                  description: Subnet IDs for the EKS cluster (pre-created)
                  items:
                    type: string
              required:
                - name
