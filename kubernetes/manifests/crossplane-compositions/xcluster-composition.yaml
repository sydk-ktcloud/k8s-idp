apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xcluster.k8s-idp.example.org
  labels:
    provider: gcp
    resource: container
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XCluster

  # ── EnvironmentConfig: GCP 프로젝트 수준 기본값 ───────────────
  environment:
    environmentConfigs:
      - type: Reference
        ref:
          name: gcp-platform

  resources:
    - name: gke-cluster
      base:
        apiVersion: container.gcp.upbound.io/v1beta1
        kind: Cluster
        spec:
          forProvider:
            labels:
              team: platform
              owner: team-platform
              cost-center: internal-platform
              env: prod
              system: infra
              service: gcp-cluster
              managed-by: crossplane
              resource-type: cluster
            location: us-central1
            network: ""
            initialNodeCount: 3
            nodeConfig:
              - machineType: e2-medium
                oauthScopes:
                  - "https://www.googleapis.com/auth/cloud-platform"
            enableIntranodeVisibility: true
            ipAllocationPolicy:
              - clusterSecondaryRangeName: pods
                servicesSecondaryRangeName: services
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
        # network: EnvironmentConfig 기본값(defaultNetworkUrl) 사용
        # spec.network(선택 필드)가 있으면 추후 CombineTransform으로 override 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultNetworkUrl
          toFieldPath: spec.forProvider.network
        - fromFieldPath: spec.nodeCount
          toFieldPath: spec.forProvider.initialNodeCount
        - fromFieldPath: spec.machineType
          toFieldPath: spec.forProvider.nodeConfig[0].machineType
        - fromFieldPath: metadata.labels
          toFieldPath: metadata.labels
        - fromFieldPath: metadata.labels
          toFieldPath: spec.forProvider.labels
        # ── 클러스터 상태 → composite status 버블업 ────────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.status
          toFieldPath: status.clusterStatus
          policy:
            fromFieldPath: Optional
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.endpoint
          toFieldPath: status.endpoint
          policy:
            fromFieldPath: Optional
