apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xcluster.k8s-idp.example.org
  labels:
    provider: gcp
    resource: container
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XCluster

  # GKE kubeconfig를 crossplane-system 네임스페이스에 Secret으로 자동 저장
  writeConnectionSecretsToNamespace: crossplane-system

  # ── EnvironmentConfig: GCP 프로젝트 수준 기본값 ───────────────
  environment:
    environmentConfigs:
      - type: Reference
        ref:
          name: gcp-platform

  resources:
    - name: gke-cluster
      base:
        apiVersion: container.gcp.upbound.io/v1beta1
        kind: Cluster
        spec:
          writeConnectionSecretToRef:
            namespace: crossplane-system
            name: placeholder
          forProvider:
            labels:
              managed-by: crossplane
              resource-type: gke-cluster
            location: us-central1
            network: ""
            initialNodeCount: 3
            nodeConfig:
              - machineType: e2-medium
                oauthScopes:
                  - "https://www.googleapis.com/auth/cloud-platform"
            enableIntranodeVisibility: true
          providerConfigRef:
            name: default

      patches:
        - fromFieldPath: spec.name
          toFieldPath: metadata.annotations[crossplane.io/external-name]

        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
          policy:
            fromFieldPath: Optional

        # network: EnvironmentConfig 기본값 사용
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultNetworkUrl
          toFieldPath: spec.forProvider.network

        - fromFieldPath: spec.nodeCount
          toFieldPath: spec.forProvider.initialNodeCount
          policy:
            fromFieldPath: Optional

        - fromFieldPath: spec.machineType
          toFieldPath: spec.forProvider.nodeConfig[0].machineType
          policy:
            fromFieldPath: Optional

        # kubeconfig Secret 이름: {uid}-gke-cluster-conn
        - fromFieldPath: metadata.uid
          toFieldPath: spec.writeConnectionSecretToRef.name
          transforms:
            - type: string
              string:
                fmt: "%s-gke-cluster-conn"

        # ── FinOps 라벨 ───────────────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.labels[name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.labels[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.labels[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.labels[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.labels[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.labels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.labels[app-name]
          policy:
            fromFieldPath: Optional

        # ── 클러스터 상태 → composite status 버블업 ──────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.status
          toFieldPath: status.clusterStatus
          policy:
            fromFieldPath: Optional

        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.endpoint
          toFieldPath: status.endpoint
          policy:
            fromFieldPath: Optional

      connectionDetails:
        - name: kubeconfig
          fromConnectionSecretKey: kubeconfig
