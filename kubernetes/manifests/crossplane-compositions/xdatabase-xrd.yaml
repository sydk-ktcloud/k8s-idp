apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xdatabases.k8s-idp.example.org
spec:
  group: k8s-idp.example.org
  names:
    kind: XDatabase
    plural: xdatabases
    singular: xdatabase
  claimNames:
    kind: Database
    plural: databases
    singular: database
  versions:
    - name: v1alpha1
      served: true
      reference:
        apiVersion: sql.gcp.upbound.io/v1beta1
        kind: DatabaseInstance
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                    type: string
                    description: Name of the Cloud SQL instance
                databaseVersion:
                    type: string
                    description: Database version (e.g., POSTGRES_15, MYSQL_8_0)
                    default: POSTGRES_15
                tier:
                    type: string
                    description: Machine tier (e.g., db-custom-1-3840, db-f1-micro)
                    default: db-custom-1-3840
                region:
                    type: string
                    description: Region for the database
                    default: us-central1
                diskSize:
                    type: integer
                    description: Disk size in GB
                    default: 20
                diskType:
                    type: string
                    description: Disk type (PD_SSD, PD_HDD)
                    default: PD_SSD
                availabilityType:
                    type: string
                    description: Availability type (REGIONAL, ZONAL)
                    default: ZONAL
              required:
                - name
