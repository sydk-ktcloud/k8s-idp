apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xazuredatabases.k8s-idp.example.org
spec:
  group: k8s-idp.example.org
  names:
    kind: XAzureDatabase
    plural: xazuredatabases
    singular: xazuredatabase
  claimNames:
    kind: AzureDatabase
    plural: azuredatabases
    singular: azuredatabase
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the database server
                location:
                  type: string
                  description: Azure region
                  default: koreacentral
                engine:
                  type: string
                  description: Database engine (postgres or mysql)
                  default: postgres
                  enum:
                    - postgres
                    - mysql
                skuName:
                  type: string
                  description: SKU name for the database server
                  default: B_Standard_B1ms
                storageMb:
                  type: integer
                  description: Storage size in MB
                  default: 32768
                administratorLogin:
                  type: string
                  description: Administrator username
                  default: adminuser
                resourceGroupName:
                  type: string
                  description: Azure Resource Group name (pre-created)
              required:
                - name
                - resourceGroupName
