apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xazurevm.k8s-idp.example.org
  labels:
    provider: azure
    resource: compute
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XAzureVM

  # ── EnvironmentConfig: Azure 플랫폼 기본값 ───────────────────
  environment:
    environmentConfigs:
      - type: Reference
        ref:
          name: azure-platform

  resources:
    # ── 1. Network Interface ──────────────────────────────────
    - name: network-interface
      base:
        apiVersion: network.azure.upbound.io/v1beta1
        kind: NetworkInterface
        spec:
          forProvider:
            location: koreacentral
            resourceGroupName: ""
            ipConfiguration:
              - name: internal
                privateIpAddressAllocation: Dynamic
                subnetId: ""
            tags:
              managed-by: crossplane
              resource-type: azure-vm-nic
          providerConfigRef:
            name: default
      patches:
        # location: EnvironmentConfig 기본값 → spec 값으로 override 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultLocation
          toFieldPath: spec.forProvider.location
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
          policy:
            fromFieldPath: Optional

        # resourceGroupName: EnvironmentConfig 기본값 → spec 값으로 override 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultResourceGroup
          toFieldPath: spec.forProvider.resourceGroupName
        - fromFieldPath: spec.resourceGroupName
          toFieldPath: spec.forProvider.resourceGroupName
          policy:
            fromFieldPath: Optional

        - fromFieldPath: spec.subnetId
          toFieldPath: spec.forProvider.ipConfiguration[0].subnetId
          policy:
            fromFieldPath: Required

        # ── FinOps 태그 ────────────────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.tags[Name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.tags[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.tags[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.tags[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.tags[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.tags[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.tags[app-name]
          policy:
            fromFieldPath: Optional

    # ── 2. Linux Virtual Machine ─────────────────────────────
    - name: linux-virtual-machine
      base:
        apiVersion: compute.azure.upbound.io/v1beta1
        kind: LinuxVirtualMachine
        spec:
          forProvider:
            location: koreacentral
            resourceGroupName: ""
            size: Standard_B2ms
            adminUsername: azureuser
            adminSshKey:
              - username: azureuser
                # TODO: 임시 하드코딩 — 추후 Vault/ESO Secret 참조로 교체
                publicKey: "ssh-rsa AAAAB3NzaC1yc2E... placeholder"
            osDisk:
              - caching: ReadWrite
                storageAccountType: Premium_LRS
                diskSizeGb: 50
            sourceImageReference:
              - publisher: Canonical
                offer: UbuntuServer
                sku: 18.04-LTS
                version: latest
            networkInterfaceIdsSelector:
              matchControllerRef: true
            tags:
              managed-by: crossplane
              resource-type: azure-vm
          providerConfigRef:
            name: default
      patches:
        # location: EnvironmentConfig 기본값 → spec 값으로 override 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultLocation
          toFieldPath: spec.forProvider.location
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
          policy:
            fromFieldPath: Optional

        # resourceGroupName: EnvironmentConfig 기본값 → spec 값으로 override 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultResourceGroup
          toFieldPath: spec.forProvider.resourceGroupName
        - fromFieldPath: spec.resourceGroupName
          toFieldPath: spec.forProvider.resourceGroupName
          policy:
            fromFieldPath: Optional

        - fromFieldPath: spec.vmSize
          toFieldPath: spec.forProvider.size
          policy:
            fromFieldPath: Required

        - fromFieldPath: spec.diskSizeGb
          toFieldPath: spec.forProvider.osDisk[0].diskSizeGb
          policy:
            fromFieldPath: Required

        # ── FinOps 태그 ────────────────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.tags[Name]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.tags[cost-center]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.tags[owner]
          policy:
            fromFieldPath: Required

        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.tags[lifecycle-tier]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.tags[expires-at]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.tags[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional

        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.tags[app-name]
          policy:
            fromFieldPath: Optional

        # ── VM 상태 → composite status 버블업 ──────────────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.privateIpAddress
          toFieldPath: status.privateIpAddress
          policy:
            fromFieldPath: Optional

        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.provisioningState
          toFieldPath: status.provisioningState
          policy:
            fromFieldPath: Optional
