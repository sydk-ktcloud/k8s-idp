apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xazurevm.k8s-idp.example.org
  labels:
    provider: azure
    resource: compute
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XAzureVM

  resources:
    # ── 1. Resource Group ──────────────────────────────────────
    - name: resource-group
      base:
        apiVersion: azure.upbound.io/v1beta1
        kind: ResourceGroup
        spec:
          forProvider:
            location: koreacentral
            tags:
              team: platform
              managed-by: crossplane
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
        - fromFieldPath: metadata.labels
          toFieldPath: metadata.labels

    # ── 2. Virtual Network ─────────────────────────────────────
    - name: virtual-network
      base:
        apiVersion: network.azure.upbound.io/v1beta1
        kind: VirtualNetwork
        spec:
          forProvider:
            location: koreacentral
            resourceGroupNameSelector:
              matchControllerRef: true
            addressSpace:
              - 10.0.0.0/16
            tags:
              team: platform
              managed-by: crossplane
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location

    # ── 3. Subnet ──────────────────────────────────────────────
    - name: subnet
      base:
        apiVersion: network.azure.upbound.io/v1beta1
        kind: Subnet
        spec:
          forProvider:
            resourceGroupNameSelector:
              matchControllerRef: true
            virtualNetworkNameSelector:
              matchControllerRef: true
            addressPrefixes:
              - 10.0.1.0/24
          providerConfigRef:
            name: default

    # ── 4. Network Interface ───────────────────────────────────
    - name: network-interface
      base:
        apiVersion: network.azure.upbound.io/v1beta1
        kind: NetworkInterface
        spec:
          forProvider:
            location: koreacentral
            resourceGroupNameSelector:
              matchControllerRef: true
            ipConfiguration:
              - name: internal
                privateIpAddressAllocation: Dynamic
                subnetIdSelector:
                  matchControllerRef: true
            tags:
              team: platform
              managed-by: crossplane
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location

    # ── 5. Linux Virtual Machine ───────────────────────────────
    - name: linux-virtual-machine
      base:
        apiVersion: compute.azure.upbound.io/v1beta1
        kind: LinuxVirtualMachine
        spec:
          forProvider:
            location: koreacentral
            resourceGroupNameSelector:
              matchControllerRef: true
            size: Standard_B1s
            adminUsername: azureuser
            adminPasswordSecretRef:
              key: password
              name: azure-vm-admin-password
              namespace: crossplane-system
            disablePasswordAuthentication: false
            osDisk:
              - caching: ReadWrite
                storageAccountType: StandardSSD_LRS
                diskSizeGb: 30
            sourceImageReference:
              - publisher: Canonical
                offer: 0001-com-ubuntu-server-jammy
                sku: 22_04-lts
                version: latest
            networkInterfaceIdsSelector:
              matchControllerRef: true
            tags:
              team: platform
              owner: team-platform
              cost-center: internal-platform
              env: prod
              system: infra
              managed-by: crossplane
              resource-type: azure-vm
          providerConfigRef:
            name: default
      patches:
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
        - fromFieldPath: spec.vmSize
          toFieldPath: spec.forProvider.size
        - fromFieldPath: spec.diskSizeGb
          toFieldPath: spec.forProvider.osDisk[0].diskSizeGb
        - fromFieldPath: metadata.labels
          toFieldPath: metadata.labels
