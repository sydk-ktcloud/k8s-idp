apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xazureblobstorages.k8s-idp.example.org
spec:
  group: k8s-idp.example.org
  names:
    kind: XAzureBlobStorage
    plural: xazureblobstorages
    singular: xazureblobstorage
  claimNames:
    kind: AzureBlobStorage
    plural: azureblobstorages
    singular: azureblobstorage
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the storage account
                location:
                  type: string
                  description: Azure region
                  default: koreacentral
                replication:
                  type: string
                  description: Replication type (LRS or GRS)
                  default: LRS
                  enum:
                    - LRS
                    - GRS
                    - ZRS
                resourceGroupName:
                  type: string
                  description: Azure Resource Group name (pre-created)
              required:
                - name
                - resourceGroupName
