apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xazuredatabase.k8s-idp.example.org
  labels:
    provider: azure
    resource: database
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XAzureDatabase
 
  # ── EnvironmentConfig: Azure 플랫폼 기본값 ───────────────────
  environment:
    environmentConfigs:
      - type: Reference
        ref:
          name: azure-platform
 
  resources:
    - name: postgresql-flexible-server
      base:
        apiVersion: dbforpostgresql.azure.upbound.io/v1beta1
        kind: FlexibleServer
        spec:
          forProvider:
            location: koreacentral
            resourceGroupName: ""
            # administratorLogin: XRD Required 파라미터로만 수신 (base 기본값 없음)
            skuName: B_Standard_B1ms
            storageMb: 32768
            version: "15"
            backupRetentionDays: 7
            geoRedundantBackupEnabled: false
            # administratorLoginPassword: crossplane-system/azure-db-admin Secret 참조
            administratorLoginPasswordSecretRef:
              namespace: crossplane-system
              name: azure-db-admin
              key: password
            tags:
              managed-by: crossplane
              resource-type: azure-database
          writeConnectionSecretsToRef:
            namespace: crossplane-system
          providerConfigRef:
            name: default
 
      patches:
        # location: EnvironmentConfig 기본값 → spec 값으로 override 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultLocation
          toFieldPath: spec.forProvider.location
        - fromFieldPath: spec.location
          toFieldPath: spec.forProvider.location
          policy:
            fromFieldPath: Optional
 
        # resourceGroupName: EnvironmentConfig 기본값 → spec 값으로 override 가능
        - type: FromEnvironmentFieldPath
          fromFieldPath: defaultResourceGroup
          toFieldPath: spec.forProvider.resourceGroupName
        - fromFieldPath: spec.resourceGroupName
          toFieldPath: spec.forProvider.resourceGroupName
          policy:
            fromFieldPath: Optional
 
        - fromFieldPath: spec.administratorLogin
          toFieldPath: spec.forProvider.administratorLogin
          policy:
            fromFieldPath: Required
 
        - fromFieldPath: spec.skuName
          toFieldPath: spec.forProvider.skuName
          policy:
            fromFieldPath: Required
 
        - fromFieldPath: spec.storageMb
          toFieldPath: spec.forProvider.storageMb
          policy:
            fromFieldPath: Required
 
        # ── FinOps 태그 ────────────────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.tags[Name]
          policy:
            fromFieldPath: Required
 
        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.tags[cost-center]
          policy:
            fromFieldPath: Required
 
        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.tags[owner]
          policy:
            fromFieldPath: Required
 
        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.tags[lifecycle-tier]
          policy:
            fromFieldPath: Optional
 
        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.tags[expires-at]
          policy:
            fromFieldPath: Optional
 
        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.tags[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional
 
        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.tags[app-name]
          policy:
            fromFieldPath: Optional
 
        # ── DB 상태 → composite status 버블업 ──────────────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.fqdn
          toFieldPath: status.fqdn
          policy:
            fromFieldPath: Optional
 
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.state
          toFieldPath: status.state
          policy:
            fromFieldPath: Optional

# MySQL 먼 미래에 추가 예정
# 주의사항: storageMb → storageSizeGb 변환 필요함..어떻게? (32768MB = 32GB) 
# xrd파일에서 mysql 선택이 가능하나 실제 컴포지션에서는 안 됨 나중에 mysql도 지원하도록 수정 필요...
