apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xclusters.k8s-idp.example.org
spec:
  group: k8s-idp.example.org
  names:
    kind: XCluster
    plural: xclusters
    singular: xcluster
  claimNames:
    kind: Cluster
    plural: clusters
    singular: cluster
  # GKE kubeconfig가 자동으로 Kubernetes Secret에 저장됩니다
  connectionSecretKeys:
    - kubeconfig
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the GKE cluster
                location:
                  type: string
                  description: Cluster location/region
                  default: us-central1
                nodeCount:
                  type: integer
                  description: Initial node count
                  default: 3
                machineType:
                  type: string
                  description: Node machine type
                  default: e2-medium
              required:
                - name
            status:
              type: object
              properties:
                clusterStatus:
                  type: string
                  description: "클러스터 상태 (RUNNING / PROVISIONING / ERROR)"
                endpoint:
                  type: string
                  description: "Kubernetes API 서버 엔드포인트"
