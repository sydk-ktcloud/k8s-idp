apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xcache.k8s-idp.example.org
  labels:
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: k8s-idp.example.org/v1alpha1
    kind: XCache

  environment:
    environmentConfigs:
      - type: Reference
        ref:
          name: gcp-platform

  resources:
    # ── Cloud Memorystore Redis ──────────────────────────────
    - name: redis-instance
      base:
        apiVersion: redis.gcp.upbound.io/v1beta1
        kind: Instance
        spec:
          providerConfigRef:
            name: default
          forProvider:
            tier: BASIC
            memorySizeGb: 1
            redisVersion: REDIS_7_0
            labels:
              managed-by: crossplane
              resource-type: redis-cache
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: metadata.name
          policy:
            fromFieldPath: Required

        - type: FromCompositeFieldPath
          fromFieldPath: spec.region
          toFieldPath: spec.forProvider.region
          policy:
            fromFieldPath: Required

        - type: FromCompositeFieldPath
          fromFieldPath: spec.redisVersion
          toFieldPath: spec.forProvider.redisVersion
          policy:
            fromFieldPath: Optional

        # memorySizeGb: tier → 크기 매핑
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.memorySizeGb
          policy:
            fromFieldPath: Required
          transforms:
            - type: map
              map:
                small: "1"
                standard: "4"
                large: "16"
            - type: convert
              convert:
                toType: int64

        # ── FinOps 라벨 ────────────────────────────────────────
        - fromFieldPath: spec.name
          toFieldPath: spec.forProvider.labels[name]
          policy:
            fromFieldPath: Required
 
        - fromFieldPath: metadata.labels[cost-center]
          toFieldPath: spec.forProvider.labels[cost-center]
          policy:
            fromFieldPath: Required
 
        - fromFieldPath: metadata.labels[owner]
          toFieldPath: spec.forProvider.labels[owner]
          policy:
            fromFieldPath: Required
 
        - fromFieldPath: metadata.labels[lifecycle-tier]
          toFieldPath: spec.forProvider.labels[lifecycle-tier]
          policy:
            fromFieldPath: Optional
 
        - fromFieldPath: metadata.labels[expires-at]
          toFieldPath: spec.forProvider.labels[expires-at]
          policy:
            fromFieldPath: Optional
 
        - fromFieldPath: metadata.labels[backstage.io/kubernetes-id]
          toFieldPath: spec.forProvider.labels[backstage-kubernetes-id]
          policy:
            fromFieldPath: Optional
 
        - fromFieldPath: metadata.labels[app.kubernetes.io/name]
          toFieldPath: spec.forProvider.labels[app-name]
          policy:
            fromFieldPath: Optional
 
        # ── Redis 상태 → composite status 버블업 ─────────────────
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.host
          toFieldPath: status.host
          policy:
            fromFieldPath: Optional
 
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.port
          toFieldPath: status.port
          policy:
            fromFieldPath: Optional
 
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.state
          toFieldPath: status.state
          policy:
            fromFieldPath: Optional
