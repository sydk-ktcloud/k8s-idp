apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/component: sso
spec:
  project: default
  sources:
    - repoURL: https://charts.dexidp.io
      chart: dex
      targetRevision: 0.19.1
      helm:
        valuesFiles:
          - $values/kubernetes/helm-releases/dex/values.yaml
    - repoURL: https://github.com/sydk-ktcloud/k8s-idp.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
