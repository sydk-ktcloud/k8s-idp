apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trip-app
  namespace: gitops 
  finalizers:
    - resources-finalizer.argocd.argoproj.io 
spec:
  project: default
  source:
    repoURL: https://github.com/sydk-ktcloud/k8s-idp.git 
    targetRevision: HEAD
    path: kubernetes/manifests/trip-app 
  destination:
    server: https://kubernetes.default.svc
    namespace: trip-app 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true