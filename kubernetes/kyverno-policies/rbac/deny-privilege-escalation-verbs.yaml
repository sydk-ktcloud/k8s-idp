apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-privilege-escalation-verbs
  annotations:
    policies.kyverno.io/title: escalate/impersonate 동사 차단
    policies.kyverno.io/category: RBAC
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      ClusterRole/Role 생성·수정 시 escalate, impersonate, bind 동사를 차단합니다.
      이 동사들은 권한 상승 공격에 사용될 수 있으며, 현재 클러스터의 모든 RBAC에서
      수동으로 제외되어 있습니다. 이 정책은 향후 신규 Role 생성 시에도 자동으로 차단합니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-escalate-in-clusterrole
      match:
        any:
          - resources:
              kinds:
                - ClusterRole
      exclude:
        any:
          - clusterRoles:
              - cluster-admin
              - system:*
              - admin
              - edit
              - argocd-application-controller
              - crossplane-rbac-manager
      validate:
        message: >-
          ClusterRole에 escalate, impersonate 또는 bind 동사를 포함할 수 없습니다.
          권한 상승 공격 방지를 위해 이 동사는 금지됩니다.
        foreach:
          - list: "request.object.rules[]"
            deny:
              conditions:
                any:
                  - key: escalate
                    operator: AnyIn
                    value: "{{ element.verbs[] }}"
                  - key: impersonate
                    operator: AnyIn
                    value: "{{ element.verbs[] }}"
                  - key: bind
                    operator: AnyIn
                    value: "{{ element.verbs[] }}"
    - name: deny-escalate-in-role
      match:
        any:
          - resources:
              kinds:
                - Role
      validate:
        message: >-
          Role에 escalate, impersonate 또는 bind 동사를 포함할 수 없습니다.
          권한 상승 공격 방지를 위해 이 동사는 금지됩니다.
        foreach:
          - list: "request.object.rules[]"
            deny:
              conditions:
                any:
                  - key: escalate
                    operator: AnyIn
                    value: "{{ element.verbs[] }}"
                  - key: impersonate
                    operator: AnyIn
                    value: "{{ element.verbs[] }}"
                  - key: bind
                    operator: AnyIn
                    value: "{{ element.verbs[] }}"
