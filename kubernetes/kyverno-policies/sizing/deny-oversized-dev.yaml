apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-oversized-dev
  annotations:
    policies.kyverno.io/title: Deny Oversized Dev Resources
    policies.kyverno.io/category: Resource Sizing
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      lifecycle-tier=dev мқё лҰ¬мҶҢмҠӨмқҳ кіјлҸ„н•ң мӮ¬мқҙмҰҲ мҡ”мІӯмқ„ м°ЁлӢЁн•©лӢҲлӢӨ.
      GKE/EKS/AKS нҒҙлҹ¬мҠӨн„°мқҳ nodeCount > 3, лҢҖнҳ• мқёмҠӨн„ҙмҠӨ нғҖмһ… л“ұмқ„ м ңн•ңн•©лӢҲлӢӨ.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-large-gke-cluster-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - Cluster
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ GKE нҒҙлҹ¬мҠӨн„°: nodeCountлҠ” 3 мқҙн•ҳм—¬м•ј н•©лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.nodeCount }}"
                operator: GreaterThan
                value: 3

    - name: deny-large-eks-cluster-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - EKSCluster
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ EKS нҒҙлҹ¬мҠӨн„°: nodeCountлҠ” 3 мқҙн•ҳ, instanceTypeмқҖ m5.xlarge лҜёл§Ңмқҙм–ҙм•ј н•©лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.nodeCount }}"
                operator: GreaterThan
                value: 3
              - key: "{{ request.object.spec.instanceType }}"
                operator: In
                value:
                  - m5.xlarge
                  - m5.2xlarge
                  - m5.4xlarge
                  - m5.8xlarge
                  - m5.16xlarge

    - name: deny-large-aks-cluster-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - AKSCluster
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ AKS нҒҙлҹ¬мҠӨн„°: nodeCountлҠ” 3 мқҙн•ҳ, vmSizeлҠ” Standard_D4 мқҙмғҒ л¶Ҳк°Җмһ…лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.nodeCount }}"
                operator: GreaterThan
                value: 3
              - key: "{{ request.object.spec.vmSize }}"
                operator: In
                value:
                  - Standard_D4s_v3
                  - Standard_D8s_v3
                  - Standard_D16s_v3
                  - Standard_D32s_v3

    - name: deny-large-gcp-vm-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - GCPInstance
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ GCP VM: diskSizeлҠ” 100GB мқҙн•ҳм—¬м•ј н•©лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.diskSize }}"
                operator: GreaterThan
                value: 100

    - name: deny-large-ec2-instance-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - EC2Instance
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ EC2: instanceTypeмқҖ m5.large мқҙн•ҳ, diskSizeлҠ” 100GB мқҙн•ҳм—¬м•ј н•©лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.instanceType }}"
                operator: In
                value:
                  - m5.xlarge
                  - m5.2xlarge
                  - m5.4xlarge
                  - m5.8xlarge
                  - m5.16xlarge
                  - c5.2xlarge
                  - c5.4xlarge
                  - r5.xlarge
                  - r5.2xlarge
              - key: "{{ request.object.spec.diskSize }}"
                operator: GreaterThan
                value: 100

    - name: deny-large-azure-vm-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - AzureVM
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ Azure VM: лҢҖнҳ• vmSize л¶Ҳк°Җ, diskSizeGbлҠ” 100GB мқҙн•ҳм—¬м•ј н•©лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.vmSize }}"
                operator: In
                value:
                  - Standard_D4s_v3
                  - Standard_D8s_v3
                  - Standard_D16s_v3
                  - Standard_D32s_v3
                  - Standard_E4s_v3
                  - Standard_E8s_v3
              - key: "{{ request.object.spec.diskSizeGb }}"
                operator: GreaterThan
                value: 100

    - name: deny-large-rds-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - RDSDatabase
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ RDS: instanceClassлҠ” db.t3.medium мқҙн•ҳ, diskSizeлҠ” 100GB мқҙн•ҳм—¬м•ј н•©лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.instanceClass }}"
                operator: In
                value:
                  - db.m5.large
                  - db.m5.xlarge
                  - db.m5.2xlarge
                  - db.r5.large
                  - db.r5.xlarge
              - key: "{{ request.object.spec.diskSize }}"
                operator: GreaterThan
                value: 100

    - name: deny-large-azure-db-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - AzureDatabase
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ Azure DB: diskSizeлҠ” 100GB мқҙн•ҳм—¬м•ј н•©лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.diskSize }}"
                operator: GreaterThan
                value: 100

    - name: deny-large-gcp-db-in-dev
      match:
        any:
          - resources:
              groups:
                - k8s-idp.example.org
              kinds:
                - Database
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"lifecycle-tier\" }}"
            operator: Equals
            value: dev
      validate:
        message: "dev нӢ°м–ҙ GCP DB: diskSizeлҠ” 100GB мқҙн•ҳм—¬м•ј н•©лӢҲлӢӨ."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.diskSize }}"
                operator: GreaterThan
                value: 100
