apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-imagepullsecrets
  annotations:
    policies.kyverno.io/title: imagePullSecrets 자동 주입
    policies.kyverno.io/category: Image
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      모든 Pod에 dockerhub-creds imagePullSecrets를 자동 주입합니다.
      Docker Hub unauthenticated rate limit(100 pull/6h) 방지.
spec:
  rules:
    - name: inject-pull-secret
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
      mutate:
        patchStrategicMerge:
          spec:
            imagePullSecrets:
              - name: dockerhub-creds
