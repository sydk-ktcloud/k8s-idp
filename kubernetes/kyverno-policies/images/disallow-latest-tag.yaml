apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: latest 태그 이미지 차단
    policies.kyverno.io/category: Image
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      컨테이너 이미지에 :latest 태그 또는 태그 미지정을 차단합니다.
      재현 불가능한 배포를 방지하고 이미지 추적 가능성을 보장합니다.

      현재 Audit 모드: 아래 8개 이미지가 :latest 사용 중이므로 즉시 Enforce 시
      Pod 재생성이 차단됩니다. 이미지 태그 고정 후 Enforce로 전환하세요.

      영향받는 이미지:
      - kylekim1223/trip-backend:latest (trip-app)
      - kylekim1223/trip-front:latest (trip-app, 3곳)
      - kylekim1223/chatops-bot:latest (chatops)
      - kylekim1223/backstage-backend:latest (backstage)
      - summerwind/actions-runner:latest (actions-runner)
      - ghcr.io/sydk-ktcloud/lifecycle-scanner:latest (lifecycle-scanner)
spec:
  # ⚠️ Audit 모드 — 기존 워크로드 8개가 :latest 사용 중
  # 이미지 태그 고정 완료 후 Enforce로 전환
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - crossplane-system
                - monitoring
      validate:
        message: >-
          이미지 '{{ element.image }}'에 :latest 태그가 사용되었습니다.
          명시적 버전 태그를 사용하세요 (예: myapp:v1.2.3).
          재현 가능한 배포를 위해 latest 태그는 금지됩니다.
        foreach:
          - list: "request.object.spec.containers[]"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "*:*"
    - name: validate-init-container-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - crossplane-system
                - monitoring
      preconditions:
        all:
          - key: "{{ request.object.spec.initContainers[] || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: >-
          initContainer 이미지 '{{ element.image }}'에 :latest 태그가 사용되었습니다.
        foreach:
          - list: "request.object.spec.initContainers[]"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "*:*"
