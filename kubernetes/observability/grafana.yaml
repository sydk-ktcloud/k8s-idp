apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: observability
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: 8.12.1
      helm:
        valueFiles:
          - $values/kubernetes/helm-releases/grafana/values.yaml
    - repoURL: https://github.com/sydk-ktcloud/k8s-idp.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
