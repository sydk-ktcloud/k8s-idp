apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: observability
spec:
  project: default
  source:
    chart: tempo
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.24.4
    helm:
      valuesObject:
        podLabels:
          team: platform
          owner: team-sre
          cost-center: internal-platform
          env: prod
          system: observability
          service: tempo
        tempo:
          extraArgs:
            config.expand-env: "true"
          reportingEnabled: false
          extraEnv:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tempo-minio-credentials
                  key: access_key
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tempo-minio-credentials
                  key: secret_access_key
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 512Mi
          retention: 168h
          storage:
            trace:
              backend: s3
              s3:
                bucket: tempo-traces
                endpoint: minio.minio-storage:9000
                region: us-east-1
                access_key: ${S3_ACCESS_KEY}
                secret_key: ${S3_SECRET_ACCESS_KEY}
                insecure: true
                forcepathstyle: true
              wal:
                path: /var/tempo/wal
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          metricsGenerator:
            enabled: true
            remoteWriteUrl: "http://prometheus-kube-prometheus-prometheus.monitoring:9090/api/v1/write"
          overrides:
            defaults:
              metrics_generator:
                processors:
                  - service-graphs
                  - span-metrics
        podSecurityContext:
          fsGroup: 10001
          runAsNonRoot: true
        persistence:
          enabled: true
          storageClassName: longhorn
          size: 10Gi
        service:
          type: ClusterIP
          labels:
            team: platform
            owner: team-sre
            cost-center: internal-platform
            env: prod
            system: observability
            service: tempo
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true