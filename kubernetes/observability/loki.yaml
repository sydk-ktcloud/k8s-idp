apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: observability
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.6.2
    helm:
      valuesObject:
        loki:
          podLabels:
            team: platform
            owner: team-sre
            cost-center: internal-platform
            env: prod
            system: observability
            service: loki
          serviceLabels:
            team: platform
            owner: team-sre
            cost-center: internal-platform
            env: prod
            system: observability
            service: loki
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          compactor:                          
            retention_enabled: true
            delete_request_store: filesystem
          limits_config:
            reject_old_samples: true
            reject_old_samples_max_age: 168h
            ingestion_rate_mb: 16
            ingestion_burst_size_mb: 32
            retention_period: 168h 
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          readinessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
        lokiCanary:
          enabled: true
          podLabels:
            team: platform
            owner: team-sre
            cost-center: internal-platform
            env: prod
            system: observability
            service: loki
        deploymentMode: SingleBinary
        singleBinary:
          replicas: 1
          service:
            labels:
              team: platform
              owner: team-sre
              cost-center: internal-platform
              env: prod
              system: observability
              service: loki
          resources:
            limits:
              cpu: 200m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 512Mi
          persistence:
            enabled: true
            storageClass: longhorn
            size: 10Gi
        gateway:
          enabled: false
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
