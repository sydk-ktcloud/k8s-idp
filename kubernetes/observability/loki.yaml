apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: observability
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.6.2
    helm:
      valuesObject:
        loki:
          podLabels:
            team: platform
            owner: team-sre
            cost-center: internal-platform
            env: prod
            system: observability
            service: loki
          serviceLabels:
            team: platform
            owner: team-sre
            cost-center: internal-platform
            env: prod
            system: observability
            service: loki
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          readinessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
