apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: minio-storage
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio-storage
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-01-16T16-07-38Z
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ROOT_PASSWORD
        ports:
        - containerPort: 9000
          name: s3-api
        - containerPort: 9001
          name: console
        volumeMounts:
        - mountPath: /data
          name: data
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 1Gi
            cpu: 500m
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-data
---
# ClusterIP 서비스 - 인-클러스터 S3 API 접근용 (minio.minio-storage:9000)
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio-storage
spec:
  type: ClusterIP
  ports:
  - port: 9000
    targetPort: 9000
    name: s3-api
  selector:
    app: minio
---
# NodePort 서비스 - 외부 S3 API 접근용
apiVersion: v1
kind: Service
metadata:
  name: minio-api
  namespace: minio-storage
spec:
  type: NodePort
  ports:
  - port: 9000
    targetPort: 9000
    nodePort: 30900
    name: s3-api
  selector:
    app: minio
---
# NodePort 서비스 - MinIO 콘솔 UI 접근용
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: minio-storage
spec:
  type: NodePort
  ports:
  - port: 9001
    targetPort: 9001
    nodePort: 30901
    name: console
  selector:
    app: minio
