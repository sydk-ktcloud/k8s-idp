# MinIO Storage Configuration
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: minio-storage
  labels:
    team: platform
    owner: platform-lead
    cost-center: internal-platform
    env: prod
    system: infra
    service: minio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio-storage
  labels:
    app: minio
    team: platform
    owner: platform-lead
    cost-center: internal-platform
    env: prod
    system: infra
    service: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        team: platform
        owner: platform-lead
        cost-center: internal-platform
        env: prod
        system: infra
        service: minio
    spec:
      securityContext:        
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-01-01T00-00-00Z
        securityContext:        
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        args:
          - server
          - /data
          - --console-address
          - ":9001"
        env:
        - name: MINIO_ROOT_USER
          value: "admin"
        - name: MINIO_ROOT_PASSWORD
          value: "K8sCluster@2026"
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        volumeMounts:
        - mountPath: /data
          name: data
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio-api
  namespace: minio-storage
  labels:
    team: platform
    owner: platform-lead
    cost-center: internal-platform
    env: prod
    system: infra
    service: minio
spec:
  type: NodePort
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900
  selector:
    app: minio
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: minio-storage
  labels:
    team: platform
    owner: platform-lead
    cost-center: internal-platform
    env: prod
    system: infra
    service: minio
spec:
  type: NodePort
  ports:
    - port: 9001
      targetPort: 9001
      nodePort: 30901
  selector:
    app: minio
