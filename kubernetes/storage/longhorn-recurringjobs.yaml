# 일일 스냅샷: 매일 02:00, 7개 보존
# 모든 볼륨의 로컬 스냅샷 (MinIO 독립적)
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshot
  namespace: longhorn-system
spec:
  name: daily-snapshot
  cron: "0 2 * * *"
  task: snapshot
  groups:
  - default
  retain: 7
  concurrency: 2
  labels:
    backup-tier: snapshot
---
# 일일 백업: 매일 03:00, 14개 보존
# 스냅샷 후 1시간 뒤 MinIO로 백업
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-backup
  namespace: longhorn-system
spec:
  name: daily-backup
  cron: "0 3 * * *"
  task: backup
  groups:
  - default
  retain: 14
  concurrency: 2
  labels:
    backup-tier: backup
