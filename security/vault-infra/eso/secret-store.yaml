apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-secret-store
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      # [수정] self-signed 인증서 사용 시 CA 번들 필요
      # vault-tls Secret의 ca.crt를 base64로 인코딩하여 아래에 입력하세요.
      # kubectl get secret vault-tls -n vault -o jsonpath='{.data.ca\.crt}'
      caBundle: "" # TODO: vault-tls Secret의 ca.crt (base64) 값을 채워주세요
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "default-app-role"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
