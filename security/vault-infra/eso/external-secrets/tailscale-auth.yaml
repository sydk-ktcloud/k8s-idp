apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-auth
  namespace: kube-system
  labels:
    managed-by: vault-eso
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: tailscale-auth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/kube-system/tailscale-auth
