apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-backend-secrets
  namespace: backstage
  labels:
    managed-by: vault-eso
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: backstage-backend-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/backstage/backstage-backend-secrets
