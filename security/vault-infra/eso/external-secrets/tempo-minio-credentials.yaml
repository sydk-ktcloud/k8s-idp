apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tempo-minio-credentials
  namespace: monitoring
  labels:
    managed-by: vault-eso
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: tempo-minio-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/monitoring/tempo-minio-credentials
