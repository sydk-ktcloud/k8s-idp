apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kubecost-cloud-integration
  namespace: kubecost
  labels:
    managed-by: vault-eso
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: kubecost-cloud-integration
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        cloud-integration.json: |
          {
            "aws": [
              {
                "projectID": "253571483088",
                "athenaBucketName": "s3://aws-athena-query-results-253571483088-us-east-1",
                "athenaRegion": "us-east-1",
                "athenaDatabase": "athenacurcfn",
                "athenaTable": "data",
                "athenaWorkgroup": "primary",
                "serviceKeyName": "{{ .aws_access_key_id }}",
                "serviceKeySecret": "{{ .aws_secret_access_key }}"
              }
            ],
            "gcp": [
              {
                "projectID": "sydk-ktcloud",
                "billingDataDataset": "billing_export.gcp_billing_export_v1_01B26E_30705E_19E209",
                "key": {{ .gcp_service_account_key }}
              }
            ],
            "azure": [
              {
                "subscriptionID": "167a7398-202a-4522-bb2e-fc2c1bf7d467",
                "azuretenantID": "ea65378a-b4c2-4945-836e-204480904282",
                "azureClientID": "{{ .azure_client_id }}",
                "azureClientSecret": "{{ .azure_client_secret }}"
              }
            ]
          }
  data:
    - secretKey: aws_access_key_id
      remoteRef:
        key: k8s/kubecost/cloud-integration
        property: aws_access_key_id
    - secretKey: aws_secret_access_key
      remoteRef:
        key: k8s/kubecost/cloud-integration
        property: aws_secret_access_key
    - secretKey: gcp_service_account_key
      remoteRef:
        key: k8s/kubecost/cloud-integration
        property: gcp_service_account_key
    - secretKey: azure_client_id
      remoteRef:
        key: k8s/kubecost/cloud-integration
        property: azure_client_id
    - secretKey: azure_client_secret
      remoteRef:
        key: k8s/kubecost/cloud-integration
        property: azure_client_secret
