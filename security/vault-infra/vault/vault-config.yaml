apiVersion: vault.banzaicloud.com/v1alpha1
kind: Vault
metadata:
  name: vault
  namespace: vault

spec:
  # HA cluster size
  size: 3

  # Vault image
  image: hashicorp/vault:1.15.6

  # Bank-vaults helper
  bankVaultsImage: ghcr.io/bank-vaults/bank-vaults:latest

  # ServiceAccount
  serviceAccount: vault

  # ServiceType
  serviceType: NodePort


  # Vault container resources
  resources:
    vault:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"


  # Vault configuration (vault.hcl)
  config:

    # Enable UI
    ui: true

    listener:
      tcp:
        address: "0.0.0.0:8200"
        tls_disable: true

    # Raft storage
    storage:
      raft:
        path: /vault/raft

    # API address
    api_addr: http://vault.vault:8200

    # Cluster communication
    cluster_addr: "http://${.Env.POD_NAME}:8201"


  # Volume mount for raft
  volumeMounts:
    - name: vault-raft
      mountPath: /vault/raft


  # Longhorn PVC
  volumeClaimTemplates:
    - metadata:
        name: vault-raft
      spec:
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi


  # Vault internal configuration
  externalConfig:

    # Policies
    policies:

      - name: admin
        rules: |
          path "*" {
            capabilities = ["create","read","update","delete","list","sudo"]
          }

      - name: allow_secrets
        rules: |
          path "secret/*" {
            capabilities = ["create","read","update","delete","list"]
          }


    # Authentication methods
    auth:
      - type: kubernetes
        roles:

          - name: vault-admin
            bound_service_account_names:
              - vault
            bound_service_account_namespaces:
              - vault
            policies:
              - admin
            ttl: 1h

          - name: external-secrets
            bound_service_account_names:
              - external-secrets
            bound_service_account_namespaces:
              - external-secrets
            policies:
              - allow_secrets
            ttl: 1h


    # Secret engines
    secrets:
      - path: secret
        type: kv
        description: General secrets
        options:
          version: 2


  # Register service
  serviceRegistrationEnabled: true

