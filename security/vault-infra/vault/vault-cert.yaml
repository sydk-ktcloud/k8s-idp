apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  # 이 이름으로 Secret이 생성됩니다.
  secretName: vault-tls 
  commonName: vault.vault.svc
  dnsNames:
  - vault
  - vault.vault
  - vault.vault.svc
  - vault.vault.svc.cluster.local
  - localhost
  
  ipAddresses:
  - 127.0.0.1
  
  issuerRef:
    name: selfsigned-ca-issuer
    kind: ClusterIssuer
