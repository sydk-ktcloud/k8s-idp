name: Backstage CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'backstage-app/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'backstage-app/**'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: kylekim1223/backstage-backend

jobs:
  ci:
    name: Build & Test
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backstage-app
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: backstage-app/yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Lint
        run: yarn lint:all

      - name: Test
        run: yarn test:all
        continue-on-error: true

  build-image:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backstage-app
          file: ./backstage-app/packages/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.meta.outputs.tags }}

  deploy:
    name: Trigger ArgoCD Sync
    runs-on: self-hosted
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Sync ArgoCD Application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
        run: |
          LOGIN_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${ARGOCD_SERVER}/api/v1/session" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${ARGOCD_USERNAME}\",\"password\":\"${ARGOCD_PASSWORD}\"}")
          
          HTTP_CODE=$(echo "$LOGIN_RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$LOGIN_RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Login failed with HTTP code: $HTTP_CODE"
            exit 1
          fi
          
          ARGOCD_TOKEN=$(echo "$RESPONSE_BODY" | jq -r '.token')
          
          SYNC_RESPONSE=$(curl -s -X POST "${ARGOCD_SERVER}/api/v1/applications/k8s-idp/sync" \
            -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"revision":"HEAD"}')
          
          echo "Sync triggered: ${SYNC_RESPONSE}"
          
          for i in {1..30}; do
            sleep 5
            STATUS=$(curl -s "${ARGOCD_SERVER}/api/v1/applications/k8s-idp" \
              -H "Authorization: Bearer ${ARGOCD_TOKEN}" | jq -r '.status.sync.status')
            
            echo "Sync status: ${STATUS}"
            
            if [ "${STATUS}" = "Synced" ]; then
              echo "Application synced successfully!"
              exit 0
            fi
          done
          
          echo "Sync timeout"
          exit 1
