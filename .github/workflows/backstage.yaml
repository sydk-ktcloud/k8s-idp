name: Backstage CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'backstage-app/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'backstage-app/**'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: kylekim1223/backstage-backend

jobs:
  ci:
    name: Build & Test
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backstage-app
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache yarn global cache
        uses: actions/cache@v4
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ hashFiles('backstage-app/yarn.lock') }}
          restore-keys: yarn-berry-

      - name: Install dependencies
        run: yarn install --immutable
        timeout-minutes: 10

      - name: Type check
        run: yarn tsc

      - name: Lint
        run: yarn lint:all

      - name: Test
        run: yarn test:all
        continue-on-error: true

  build-image:
    name: Build & Push Docker Image
    runs-on: self-hosted
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=true
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backstage-app
          file: ./backstage-app/packages/backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "${{ steps.meta.outputs.tags }}"

  deploy:
    name: 총 횟수
    needs: build-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    uses: ./.github/workflows/argocd-sync.yaml
    with:
      application: k8s-idp
    secrets: inherit
