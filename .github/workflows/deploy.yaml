name: Deploy to K8s

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync ArgoCD
        uses: ./.github/workflows/argocd-sync.yaml
        with:
          application: k8s-idp
