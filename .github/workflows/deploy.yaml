name: Deploy to K8s

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'backstage-app/**'
      - '*.md'
      - 'docs/**'
      - '.claude/**'
      - '.github/workflows/approval-gate.yaml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/argocd-sync.yaml
    with:
      application: k8s-idp
    secrets: inherit
