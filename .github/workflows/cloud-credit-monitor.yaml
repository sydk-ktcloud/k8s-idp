name: Cloud Credit Monitor CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/cloud-credit-monitor.py'
      - 'scripts/Dockerfile.cloud-credit-monitor'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: kylekim1223/cloud-credit-monitor

permissions:
  contents: write

jobs:
  build-image:
    name: Build & Push Docker Image
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./scripts
          file: ./scripts/Dockerfile.cloud-credit-monitor
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update CronJob image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|image: kylekim1223/cloud-credit-monitor:.*|image: kylekim1223/cloud-credit-monitor:sha-${SHORT_SHA}|" \
            kubernetes/manifests/cloud-credit-monitor/cronjob.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/manifests/cloud-credit-monitor/cronjob.yaml
          git diff --cached --quiet || git commit -m "ci: update cloud-credit-monitor image to sha-${SHORT_SHA}"
          git push

  deploy:
    name: Deploy to K8s
    needs: build-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    uses: ./.github/workflows/argocd-sync.yaml
    with:
      application: cloud-credit-monitor
    secrets: inherit
