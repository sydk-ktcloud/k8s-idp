name: CI-CD Base Setup
on:
  push:
    branches: [ cicd ]

jobs:
  connectivity-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      # 서버 접속 확인 (여기서 성공해야 다음 단계가 가능합니다)
      - name: Check K8s Connection
        run: kubectl get nodes

      # 인프라 폴더 내의 파일들이 잘 있는지 확인
      - name: Verify Infrastructure Files
        run: ls -R kubernetes/